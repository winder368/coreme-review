<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>COREME Midterm Flashcards — 120 Questions</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', 'Microsoft JhengHei', sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; }

  .header { background: #1e293b; padding: 16px 24px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; border-bottom: 2px solid #2e75b6; }
  .header h1 { font-size: 18px; color: #93c5fd; }
  .stats { display: flex; gap: 12px; font-size: 14px; color: #94a3b8; align-items: center; flex-wrap: wrap; }
  .stats .correct { color: #4ade80; }
  .stats .wrong { color: #f87171; }

  .filters { background: #1e293b; padding: 10px 24px; display: flex; gap: 8px; flex-wrap: wrap; border-bottom: 1px solid #334155; }
  .filters button { padding: 6px 14px; border: 1px solid #475569; border-radius: 20px; background: transparent; color: #94a3b8; cursor: pointer; font-size: 13px; transition: all 0.2s; }
  .filters button.active { background: #2e75b6; color: white; border-color: #2e75b6; }
  .filters button:hover { border-color: #93c5fd; color: #e2e8f0; }
  .filters .wrong-filter { border-color: #f87171; color: #f87171; }
  .filters .wrong-filter.active { background: #991b1b; color: white; border-color: #991b1b; }
  .filters .wrong-filter:hover { border-color: #fca5a5; color: #fca5a5; }
  .wrong-count-badge { background: #991b1b; color: white; font-size: 11px; padding: 1px 6px; border-radius: 10px; margin-left: 4px; }

  .progress-bar { height: 4px; background: #334155; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, #2e75b6, #60a5fa); transition: width 0.3s; }

  .container { max-width: 720px; margin: 0 auto; padding: 24px 16px; }

  .card-box { background: linear-gradient(135deg, #1e293b, #1a2332); border: 1px solid #334155; border-radius: 16px; padding: 28px; margin-bottom: 16px; }

  .card-number { font-size: 13px; color: #64748b; margin-bottom: 4px; }
  .card-week { display: inline-block; font-size: 11px; padding: 3px 10px; border-radius: 12px; background: #2e75b6; color: white; margin-bottom: 16px; }

  .question-text { font-size: 17px; line-height: 1.6; color: #f1f5f9; margin-bottom: 20px; }

  .options { list-style: none; display: flex; flex-direction: column; gap: 8px; }
  .options li { padding: 10px 14px; border-radius: 10px; background: #0f172a; border: 1px solid #334155; font-size: 15px; line-height: 1.5; color: #cbd5e1; cursor: pointer; transition: all 0.2s; user-select: none; }
  .options li:hover:not(.disabled) { border-color: #60a5fa; background: #172033; }
  .options li.selected { border-color: #60a5fa; background: #1e3a5f; color: #93c5fd; }
  .options li.correct-answer { border-color: #4ade80; background: #14532d; color: #86efac; cursor: default; }
  .options li.wrong-answer { border-color: #f87171; background: #450a0a; color: #fca5a5; cursor: default; }
  .options li.disabled { cursor: default; opacity: 0.7; }
  .options li.disabled:hover { border-color: #334155; background: #0f172a; }
  .options li.show-correct { border-color: #4ade80; background: #14532d; color: #86efac; cursor: default; }

  .explanation-box { margin-top: 20px; padding: 18px; background: #0c1a2e; border-left: 4px solid #2e75b6; border-radius: 0 10px 10px 0; display: none; animation: fadeIn 0.3s; }
  .explanation-box.show { display: block; }
  .exp-header { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
  .exp-icon { font-size: 20px; }
  .exp-label { font-size: 14px; color: #60a5fa; font-weight: bold; }
  .exp-correct { color: #4ade80; font-size: 15px; font-weight: bold; margin-bottom: 10px; }
  .exp-text { font-size: 15px; line-height: 1.8; color: #d1d5db; }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

  .nav { display: flex; justify-content: space-between; align-items: center; gap: 12px; margin-top: 8px; }
  .nav button { padding: 10px 28px; border: none; border-radius: 10px; font-size: 15px; cursor: pointer; transition: all 0.2s; }
  .btn-prev, .btn-next { background: #334155; color: #e2e8f0; }
  .btn-prev:hover, .btn-next:hover { background: #475569; }
  .btn-prev:disabled, .btn-next:disabled { opacity: 0.3; cursor: not-allowed; }
  .card-counter { font-size: 15px; color: #94a3b8; }

  .action-btns { display: flex; gap: 8px; flex-wrap: wrap; }
  .action-btns button { background: #475569; color: #e2e8f0; padding: 6px 14px; border: none; border-radius: 8px; cursor: pointer; font-size: 13px; transition: all 0.15s; }
  .action-btns button:hover { background: #64748b; }
  .action-btns .clear-wrong { background: #7f1d1d; }
  .action-btns .clear-wrong:hover { background: #991b1b; }

  .lang-toggle { display: flex; align-items: center; gap: 6px; }
  .lang-toggle .toggle-track { width: 48px; height: 24px; background: #334155; border-radius: 12px; cursor: pointer; position: relative; transition: background .2s; }
  .lang-toggle .toggle-track.zh { background: #2e75b6; }
  .lang-toggle .toggle-thumb { width: 20px; height: 20px; background: white; border-radius: 50%; position: absolute; top: 2px; left: 2px; transition: left .2s; }
  .lang-toggle .toggle-track.zh .toggle-thumb { left: 26px; }
  .lang-toggle span { font-size: 12px; color: #94a3b8; }
  .lang-toggle .active-lang { color: #93c5fd; font-weight: bold; }
  .keyboard-hint { text-align: center; color: #475569; font-size: 12px; margin-top: 16px; }

  .empty-msg { text-align: center; padding: 80px 20px; color: #64748b; font-size: 16px; }
  .empty-msg .emoji { font-size: 48px; margin-bottom: 16px; }

  @media (max-width: 600px) {
    .card-box { padding: 20px; }
    .question-text { font-size: 15px; }
    .options li { font-size: 14px; padding: 8px 12px; }
    .header { padding: 12px 16px; }
    .filters { padding: 8px 16px; }
    .container { padding: 16px 12px; }
  }

  /* ── Wrong List Toggle ── */
  .wrong-toggle-row { margin-top: 12px; padding-top: 10px; border-top: 1px solid #334155; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .btn-wrong-remove { background: #1a3a1a; border: 1px solid #4ade80; color: #4ade80; padding: 6px 14px; border-radius: 8px; cursor: pointer; font-size: 13px; transition: all .2s; }
  .btn-wrong-remove:hover { background: #14532d; border-color: #86efac; }
  .btn-wrong-add { background: #1a0a0a; border: 1px solid #f87171; color: #f87171; padding: 6px 14px; border-radius: 8px; cursor: pointer; font-size: 13px; transition: all .2s; }
  .btn-wrong-add:hover { background: #450a0a; border-color: #fca5a5; }
  body.light .wrong-toggle-row { border-top-color: #DDD5CB; }
  body.light .btn-wrong-remove { background: #DCFCE7; border-color: #166534; color: #166534; }
  body.light .btn-wrong-remove:hover { background: #BBF7D0; }
  body.light .btn-wrong-add { background: #FEE2E2; border-color: #dc2626; color: #dc2626; }
  body.light .btn-wrong-add:hover { background: #FECACA; }

  /* ── Flag / Bookmark ── */
  .flag-btn { background: none; border: none; cursor: pointer; font-size: 16px; padding: 2px 5px; opacity: 0.3; transition: opacity .15s, transform .15s; line-height: 1; vertical-align: middle; }
  .flag-btn:hover { opacity: 1; transform: scale(1.2); }
  .flag-btn.flagged { opacity: 1; }
  .card-number-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
  .flag-filter { border-color: #f59e0b; color: #f59e0b; }
  .flag-filter.active { background: #78350f; color: white; border-color: #78350f; }
  .flag-filter:hover { border-color: #fbbf24; color: #fbbf24; }
  .flag-count-badge { background: #78350f; color: white; font-size: 11px; padding: 1px 6px; border-radius: 10px; margin-left: 4px; }
  body.light .flag-filter { border-color: #d97706; color: #d97706; }
  body.light .flag-filter.active { background: #92400e; color: white; border-color: #92400e; }
  body.light .flag-filter:hover { border-color: #b45309; color: #b45309; }
  body.light .flag-count-badge { background: #92400e; }

  /* ── Light Mode ── */
  body.light{background:#FAF6F0;color:#2D2A26}
  body.light .header{background:#F0E8DF;border-bottom-color:#2e75b6}
  body.light .header h1{color:#1B5FAF}
  body.light .stats{color:#5A524D}
  body.light .stats .correct{color:#166534}
  body.light .stats .wrong{color:#991b1b}
  body.light .filters{background:#F0E8DF;border-bottom-color:#DDD5CB}
  body.light .filters button{border-color:#C9BDB2;color:#5A524D;background:transparent}
  body.light .filters button:hover{border-color:#1B5FAF;color:#1B5FAF}
  body.light .filters button.active{background:#2e75b6;color:white;border-color:#2e75b6}
  body.light .filters .wrong-filter{border-color:#dc2626;color:#dc2626}
  body.light .filters .wrong-filter.active{background:#991b1b;color:white;border-color:#991b1b}
  body.light .wrong-count-badge{background:#991b1b;color:white}
  body.light .progress-bar{background:#DDD5CB}
  body.light .card-box{background:linear-gradient(135deg,#FFFFFF,#F7F0E9);border-color:#DDD5CB}
  body.light .card-number{color:#8C837D}
  body.light .question-text{color:#1A1714}
  body.light .options li{background:#F0E8DF;border-color:#DDD5CB;color:#2D2A26}
  body.light .options li:hover:not(.disabled){border-color:#2e75b6;background:#E8DDD4}
  body.light .options li.selected{border-color:#2e75b6;background:#DBEAFE;color:#1B5FAF}
  body.light .options li.correct-answer{border-color:#166534;background:#DCFCE7;color:#14532d}
  body.light .options li.wrong-answer{border-color:#dc2626;background:#FEE2E2;color:#991b1b}
  body.light .options li.show-correct{border-color:#166534;background:#DCFCE7;color:#14532d}
  body.light .options li.disabled:hover{border-color:#DDD5CB;background:#F0E8DF}
  body.light .explanation-box{background:#FFF7ED;border-left-color:#2e75b6}
  body.light .exp-label{color:#1B5FAF}
  body.light .exp-correct{color:#166534}
  body.light .exp-text{color:#3D3630}
  body.light .btn-prev,body.light .btn-next{background:#DDD5CB;color:#2D2A26}
  body.light .btn-prev:hover,body.light .btn-next:hover{background:#C9BDB2}
  body.light .card-counter{color:#5A524D}
  body.light .action-btns button{background:#C9BDB2;color:#2D2A26}
  body.light .action-btns button:hover{background:#B5A99E}
  body.light .action-btns .clear-wrong{background:#FEE2E2;color:#991b1b}
  body.light .action-btns .clear-wrong:hover{background:#FECACA}
  body.light .lang-toggle .toggle-track{background:#C9BDB2}
  body.light .lang-toggle span{color:#5A524D}
  body.light .lang-toggle .active-lang{color:#1B5FAF}
  body.light .keyboard-hint{color:#8C837D}
  body.light .empty-msg{color:#8C837D}
  .theme-btn{background:none;border:1px solid #475569;border-radius:8px;padding:3px 8px;cursor:pointer;font-size:15px;line-height:1.4;color:inherit;transition:border-color .2s}
  .theme-btn:hover{border-color:#93c5fd}
  body.light .theme-btn{border-color:#C9BDB2}
  body.light .theme-btn:hover{border-color:#1B5FAF}
</style>
</head>
<body>

<div class="header">
  <h1>COREME 期中考 Flashcards (120)</h1>
  <div class="stats">
    <span>Score: <span class="correct" id="correctCount">0</span>✓ <span class="wrong" id="wrongCount">0</span>✗</span>
    <span id="pctDisplay">0%</span>
    <div class="action-btns">
      <button onclick="shuffleCards()">Shuffle</button>
      <button onclick="resetSession()">Reset</button>
      <button class="clear-wrong" onclick="clearWrongList()" id="clearWrongBtn" style="display:none">Clear Wrong List</button>
    </div>
    <div class="lang-toggle">
      <span id="langEN" class="active-lang">EN</span>
      <div class="toggle-track" id="langToggle" onclick="toggleLang()"><div class="toggle-thumb"></div></div>
      <span id="langZH">中文</span>
    </div>
    <button class="theme-btn" id="themeToggle" onclick="toggleTheme()" title="Toggle light/dark mode">🌙</button>
  </div>
</div>

<div class="filters" id="filters"></div>
<div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>

<div class="container">
  <div id="cardArea"></div>
  <div class="nav">
    <button class="btn-prev" id="btnPrev" onclick="prevCard()">← Prev</button>
    <span class="card-counter" id="cardCounter">1 / 100</span>
    <button class="btn-next" id="btnNext" onclick="nextCard()">Next →</button>
  </div>
  <div class="keyboard-hint">← → 切換 ｜ 1-4 選答案 ｜ N 下一題</div>
</div>

<script>
const ALL_QUESTIONS = [
  {q:"According to Keyton (p. 2), research is defined as:",o:["The process of reading and summarizing existing literature","The discovery of answers to questions through the application of scientific and systematic procedures","The formulation of personal opinions based on experience","The collection of data using computers and software"],a:1,w:"Week 1",e:"Keyton 定義研究為「透過科學且系統性的程序來發現問題答案的過程」。重點在 scientific（科學的）和 systematic procedures（系統性程序＝方法）。不是隨便 Google 查資料或憑個人經驗猜測。"},
  {q:"The \"Golden Hammer Fallacy\" in research methods refers to:",o:["Refusing to use any research method","Always choosing qualitative over quantitative methods","Using the most expensive method available","Relying on a single familiar method for every research problem"],a:3,w:"Week 1",e:"「金鎚謬誤」指只會一種方法，就用它解決所有問題。老師在第一堂課強調：你不應該只學一種方法，應該根據研究問題選擇最適合的方法。例如學生常說「我要做內容分析」，但其實實驗法可能更適合回答因果問題。"},
  {q:"Which of the following is NOT a characteristic of science according to Keyton (p. 10-11)?",o:["Replicable","Self-correcting","Based on personal authority","Testable"],a:2,w:"Week 1",e:"科學的十大特徵包括：基於證據、可測試、可複製、公開記錄、自我修正、依賴測量觀察、控制誤差、追求客觀、懷疑態度、可推論性、啟發性。「個人權威」不是科學特徵——科學依賴的是證據和方法，不是誰說了算。"},
  {q:"\"Is there a God?\" is not a scientific question because it is:",o:["Not testable through empirical observation","Not interesting enough","Too controversial","Already answered by philosophy"],a:0,w:"Week 1",e:"老師在課堂上舉此例：科學問題必須是可測試的（testable），能透過經驗觀察來檢驗或否證。「有沒有上帝」無法設計實驗或觀察來檢驗，所以不是科學問題。不是因為爭議性或無趣。"},
  {q:"According to Keyton (p. 12), which sources of research questions are NECESSARY?",o:["Social importance and personal interest","Theoretical significance and social importance","All three are equally necessary","Theoretical significance and personal interest"],a:1,w:"Week 1",e:"研究問題三個來源中，理論重要性和社會重要性是「必要」（necessary）的——你的研究必須能與理論對話，也必須對社會有意義。個人興趣很重要（老師特別鼓勵學生從興趣出發），但不是必要條件。"},
  {q:"The social scientific perspective primarily relies on:",o:["Empirical observation using quantitative and/or qualitative methods","Philosophical speculation about communication","Exposing hidden power structures in society","Rhetorical analysis of persuasive language"],a:0,w:"Week 1",e:"社會科學觀點以經驗觀察（empirical observation）為基礎，可以用量化方法（問卷、實驗）也可以用質化方法（訪談、焦點團體）。老師強調：「做社會科學研究不代表只能用量化方法」——關鍵是系統性和文件化。"},
  {q:"Which perspective focuses on how language is used to persuade, typically through case studies?",o:["Rhetorical perspective","Critical perspective","Social scientific perspective","Interpretive perspective"],a:0,w:"Week 1",e:"修辭學觀點（Rhetorical perspective）分析語言如何說服，通常用個案研究。批判觀點（Critical）揭露權力結構。社會科學觀點用系統性方法。三種都是合法的學術取向，本課程主要教社會科學觀點。"},
  {q:"The \"heuristic\" nature of science means that:",o:["Good research sparks further research","Researchers must use heuristic algorithms","Science relies on intuition","Science is always correct"],a:0,w:"Week 1",e:"啟發性（heuristic）是科學十大特徵之一——好的研究不只回答一個問題，還會激發更多新問題和新研究。科學知識就是這樣一塊一塊累積起來的。"},
  {q:"\"Does exposure to disinformation lower trust in politicians?\" is an example of:",o:["A question of definition","A question of cause and effect","A question of relationships","A question of policy"],a:1,w:"Week 1",e:"這是因果型問題（cause and effect）：「接觸假訊息是否『導致』信任下降？」用了 causal language。如果問的是「有沒有相關」就是關係型；如果問「假新聞是什麼」就是定義型。"},
  {q:"\"What are alternative media or fake news?\" is an example of:",o:["A question of value","A question of relationships","A question of cause and effect","A question of definition"],a:3,w:"Week 1",e:"定義型問題——目的是描述和定義一個現象「是什麼」。這是研究的起點：在探討因果關係之前，你得先搞清楚你要研究的東西到底是什麼。"},
  {q:"A researcher who evaluates the quality of others' published studies is acting as a:",o:["Rhetorician","Consumer of research","Critical theorist","Researcher"],a:1,w:"Week 1",e:"Keyton (p.3) 區分兩種角色：研究消費者（consumer）評估他人研究品質（讀論文、判斷方法是否可靠），研究者（researcher）自己做研究。兩種角色都需要方法論知識。"},
  {q:"Which characteristic of science ensures that incorrect findings can eventually be replaced?",o:["Skepticism","Self-correcting nature","Heuristic nature","Generalizability"],a:1,w:"Week 1",e:"自我修正（self-correcting）：因為研究是公開的（public record），其他人可以重複驗證，錯誤的發現最終會被新研究糾正。老師用 Enron 案例說明——研究發表後，高管改變了行為。"},
  {q:"The deductive approach to research moves from:",o:["Practice to theory and back","General theory to specific hypotheses and observations","Specific observations to general theory","Qualitative data to quantitative data"],a:1,w:"Week 2",e:"演繹法（deductive）從一般到特殊：先有理論 → 推導假設 → 收集資料 → 檢驗假設。例如：根據議題設定理論，假設「大量移民報導會讓人覺得移民更重要」，然後做實驗檢驗。"},
  {q:"The inductive approach is most commonly associated with:",o:["Qualitative research","Survey research","Quantitative research","Experiments"],a:0,w:"Week 2",e:"歸納法（inductive）從特殊到一般：先觀察 → 發現模式 → 形成暫定結論 → 建立理論。質化研究（如訪談、焦點團體）典型使用歸納法——從資料中「長出」理論，而不是從理論開始。"},
  {q:"According to Babbie (p. 57), a paradigm is:",o:["A specific research method","A model or frame of reference through which to observe and understand","A type of hypothesis","A statistical formula"],a:1,w:"Week 2",e:"Babbie 定義典範（paradigm）為「用來觀察和理解的模型或參考架構」。三種主要典範：社會科學（客觀、量化為主）、詮釋（主觀、質化為主）、批判（揭露權力）。"},
  {q:"Karl Popper is best known for the concept of:",o:["Middle-range theories","Paradigm shifts","Falsification","Positivism"],a:2,w:"Week 2",e:"Popper 提出否證論（Falsification）——科學理論必須「可被否證」。他的名言：看到再多白天鵝也不能證明「所有天鵝都是白的」，但只要看到一隻黑天鵝就能否證。科學不是「證明」，是「嘗試否證」。"},
  {q:"Thomas Kuhn is best known for the concept of:",o:["Scientific revolutions and paradigm shifts","Operational definitions","Positivism","Falsification"],a:0,w:"Week 2",e:"Kuhn 提出科學革命和典範轉移——科學不是線性進步，而是經歷「正常科學」→「危機」→「革命」→「新典範」的循環。不同典範之間有「不可通約性」（incommensurability），在社會科學中競爭的典範往往共存。"},
  {q:"Auguste Comte is associated with:",o:["Positivism","Middle-range theories","Falsification","Scientific revolutions"],a:0,w:"Week 2",e:"Comte 是實證主義（Positivism）的創始人——主張科學知識只能來自經驗觀察，不是神學或形而上學的推測。實證主義後來引發了批判理論和法蘭克福學派的反對。"},
  {q:"Agenda-Setting Theory, Framing Theory, and Spiral of Silence are examples of:",o:["Operational definitions","Middle-range theories","Paradigms","Master conceptual schemes"],a:1,w:"Week 2",e:"這是中程理論（Middle-range theories, Merton 提出）——介於日常工作假設和宏大理論（如 Habermas 的公共領域）之間。中程理論可以被經驗檢驗，是大多數傳播研究使用的理論層次。"},
  {q:"A directional hypothesis:",o:["Only predicts that a relationship exists","Explicitly predicts the direction of the relationship","States that there is no relationship","Cannot be tested"],a:1,w:"Week 2",e:"方向性假設明確預測方向，如「X 越多，Y 越高」或「A 組會高於 B 組」。非方向性假設只說「有關係」但不說方向。方向性假設需要更多理論支持，因為你要有理由預測特定方向。"},
  {q:"The null hypothesis (H\u2080) states that:",o:["The research hypothesis is correct","There is no effect or no relationship","The sample is too small","There is a significant relationship"],a:1,w:"Week 2",e:"虛無假設（H\u2080）= 沒有效果、沒有相關。統計檢驗的邏輯是嘗試「拒絕 H\u2080」。p < 0.05 就拒絕 H\u2080（統計顯著）；p > 0.05 就無法拒絕 H\u2080——但這不代表 H\u2080 為真，只代表證據不足。"},
  {q:"When should a researcher use a Research Question (RQ) instead of a hypothesis?",o:["When certain about the outcome","When the sample size is very large","When using quantitative methods only","When little is known about the phenomenon"],a:3,w:"Week 2",e:"當對某現象所知甚少、文獻不足以支持預測方向時，用 RQ 比較適當。RQ 是開放式的（如「X 和 Y 之間有什麼關係？」），假設是有方向的（如「X 會導致 Y 增加」）。"},
  {q:"In \"Emotional Twitter posts will trigger more user engagement,\" the IV is:",o:["Twitter","Number of followers","Emotional vs. non-emotional posts","User engagement"],a:2,w:"Week 2",e:"自變項（IV）= 研究者操弄或用來分組的變數——這裡是「情緒性 vs 非情緒性貼文」。依變項（DV）= 被影響的結果——「用戶互動（engagement）」。辨識 IV/DV 是考試重點。"},
  {q:"The three requirements for establishing causation are:",o:["Hypothesis, data collection, and analysis","Theory, method, and interpretation","Reliability, validity, and generalizability","Association, direction of influence, and elimination of rival explanations"],a:3,w:"Week 2",e:"因果關係三要件：(1) Association 關聯——兩個變數有相關；(2) Direction of influence 影響方向——因在果之前（時間順序）；(3) Elimination of plausible rival explanations 排除替代解釋——不是第三變數造成的。只有實驗（有隨機分配）能同時滿足三個。"},
  {q:"The ecological fallacy occurs when:",o:["Researchers use too small a sample","Researchers ignore environmental factors","Group-level conclusions are applied to individuals","Variables are measured at the wrong level"],a:2,w:"Week 2",e:"生態謬誤——把群體層次的結論套用到個體。簡報實例：美國各州外國出生比例 vs 高收入比例的相關 = .52（州層次），但個人層次相關只有 -.01。不能因為「外國出生比例高的州高收入比例也高」就說「外國出生的人收入高」。"},
  {q:"Shoe size correlating with math ability due to age is an example of:",o:["Spurious correlation","Measurement error","Ecological fallacy","Reverse causation"],a:0,w:"Week 2",e:"虛假相關（spurious correlation）——兩個變數看起來有關係，但其實是第三變數（年齡）同時影響了兩者。年紀大 → 腳大 + 數學好。控制年齡後，鞋子大小和數學能力的相關消失。另一個例子：消防員人數 vs 火災損害——第三變數是火災規模。"},
  {q:"If p < 0.05, the correct interpretation is:",o:["There is a 95% chance the hypothesis is correct","H\u2080 is proven true","We reject H\u2080; the result is statistically significant","The hypothesis is proven true"],a:2,w:"Week 2",e:"p < 0.05 的正確解讀：「在虛無假設為真的前提下，觀察到這樣（或更極端）的結果的機率小於 5%」→ 我們拒絕 H\u2080，結果統計顯著。注意：不是「證明假設為真」，也不是「有 95% 機率假設正確」。"},
  {q:"When p > 0.05, the instructor advised students to:",o:["Not interpret non-significant results","Increase sample size and retest","Interpret the non-significant result carefully","Lower the p-value threshold"],a:0,w:"Week 2",e:"老師在課堂上明確說：p > 0.05 時「不要解讀不顯著的結果」（do not interpret non-significant results）。不顯著只代表證據不足以拒絕 H\u2080，不代表 H\u2080 為真或兩組沒有差異。"},
  {q:"\"Correlation does not equal causation\" primarily means:",o:["Causation is impossible to establish","Two variables being associated does not prove one causes the other","Correlations are always wrong","Only experiments can find correlations"],a:1,w:"Week 2",e:"相關不等於因果——這是整門課最重要的概念之一。兩個變數有相關（correlation），不代表一個導致另一個（causation）。可能有第三變數、反向因果等替代解釋。要做因果聲稱，必須用實驗設計。"},
  {q:"In Kuhn's framework, \"incommensurability\" means:",o:["Paradigms can be easily compared","Paradigms are difficult to compare due to different assumptions","All paradigms are equally valid","Paradigms must be tested empirically"],a:1,w:"Week 2",e:"不可通約性（incommensurability）——不同典範有不同的基本假設、核心概念、甚至對什麼算「好的研究」的定義都不同，因此很難直接比較。例如量化研究者和質化研究者對「客觀性」的看法就根本不同。"},
  {q:"Which can ONLY be achieved through experimental design?",o:["Establishing causal relationships","Measuring correlation","Identifying patterns","Describing a phenomenon"],a:0,w:"Week 2",e:"只有實驗設計（有隨機分配和操弄）能同時滿足因果三要件，因此只有實驗能建立因果關係。問卷調查只能找到相關，內容分析只能描述模式。老師反覆強調這一點。"},
  {q:"More firefighters correlating with more fire damage is likely explained by:",o:["Firefighters cause damage","Reverse causation","The data is incorrect","A third variable (fire size) causes both"],a:3,w:"Week 2",e:"虛假相關——火災規模（第三變數）同時導致「派出更多消防員」和「更大的損害」。不能因此說消防員造成損害。這跟鞋子大小/數學能力的例子邏輯相同。"},
  {q:"Conceptualization is the process of:",o:["Collecting data","Making vague concepts more specific and precise","Running statistical tests","Writing a research report"],a:1,w:"Week 3",e:"概念化（conceptualization）是把模糊的抽象概念（如「社會資本」「民粹主義」「假新聞」）變得更具體、更精確的心理過程。這是測量的第一步——你必須先搞清楚你要測什麼，才能決定怎麼測。"},
  {q:"The correct order from abstract to concrete is:",o:["Concept \u2192 Dimension \u2192 Indicator \u2192 Operational definition","Dimension \u2192 Concept \u2192 Operational definition \u2192 Indicator","Indicator \u2192 Concept \u2192 Dimension \u2192 Operational definition","Operational definition \u2192 Concept \u2192 Indicator \u2192 Dimension"],a:0,w:"Week 3",e:"從抽象到具體四步驟：Concept（概念，最抽象）→ Dimension（面向）→ Indicator（指標）→ Operational definition（操作定義，最具體）。例如「社會資本」→「橋接型/黏著型」→「問卷題目」→「用 5-point Likert 量表測量」。"},
  {q:"Nationality is measured at which level?",o:["Interval","Nominal","Ordinal","Ratio"],a:1,w:"Week 3",e:"國籍是名義（nominal）——只是分類（台灣、日本、美國），沒有高低順序、沒有等距、沒有絕對零點。這是 Week 6 簡報中考題預告的原題：「What level of measurement describes Nationality?」"},
  {q:"A Likert scale (1-5) is typically treated as:",o:["Ordinal","Interval","Ratio","Nominal"],a:1,w:"Week 3",e:"Likert 量表（Strongly disagree 1 → Strongly agree 5）在社會科學中通常當作等距（interval）處理——假設每個數字間的距離相等。學術界對此有爭論（有人認為應該是 ordinal），但課程中按 interval 處理。"},
  {q:"Which measurement level has an absolute zero point?",o:["Ordinal","Nominal","Interval","Ratio"],a:3,w:"Week 3",e:"比率（ratio）層次有絕對零點。例如：收入 0 元 = 真的沒有收入；年齡 0 歲 = 剛出生。攝氏溫度 0 度不是「沒有溫度」，所以攝氏是 interval 不是 ratio。"},
  {q:"\"Bad, OK, Good, Best\" is which measurement level?",o:["Nominal","Interval","Ordinal","Ratio"],a:2,w:"Week 3",e:"順序（ordinal）——有明確排序（bad < ok < good < best），但間距不等。bad 到 ok 的差距不一定等於 good 到 best 的差距。所以不能計算平均數，只能做排名比較。"},
  {q:"Reliability refers to:",o:["Whether a measure produces consistent results on repeated observations","Whether a measure actually measures what it claims to","Whether the design is ethical","Whether findings can be generalized"],a:0,w:"Week 3",e:"信度（reliability）= 重複測量同一現象時產生相同結果的品質。強調「一致性」（consistency）。就像一把尺：每次量同一個東西都得到一樣的數字——但不保證數字是對的（那是效度的問題）。"},
  {q:"Validity refers to:",o:["Whether the sample is large enough","Whether a measure produces consistent results","Whether a measure actually measures what it claims to measure","Whether results are statistically significant"],a:2,w:"Week 3",e:"效度（validity）= 測量是否真正測量了你想測的東西。比信度更重要但更難達成。一個量表可以信度很高（每次結果一致）但效度很低（一致地測量了錯誤的東西）。"},
  {q:"Cronbach's alpha of 0.85 indicates:",o:["Sample too small","Acceptable internal consistency","Poor internal consistency","Poor validity"],a:1,w:"Week 3",e:"Cronbach's alpha 測量內部一致性——量表中的各題是否在測量類似的東西。門檻：\u03b1 \u2265 0.7 可接受。0.85 遠超門檻，表示量表內部一致性良好。簡報中 Jungherr & Rauchfleisch (2024) 的「支持管制」量表 \u03b1 = 0.86。"},
  {q:"Test-retest reliability assesses:",o:["Whether all items measure the same thing","Whether same respondents produce similar results over time","Whether different coders agree","Whether the measure correlates with an external criterion"],a:1,w:"Week 3",e:"再測信度（test-retest reliability）——讓同一群人在不同時間點（如隔兩週）做同樣的測量，看結果是否穩定一致。這測的是時間穩定性。如果一個人兩週後的答案完全不同，這個量表的再測信度就低。"},
  {q:"\"Attendance at religious services indicates religiosity\" is an example of:",o:["Criterion-related validity","Face validity","Construct validity","Content validity"],a:1,w:"Week 3",e:"表面效度（face validity）——這個指標「看起來」合理。出席宗教活動次數直覺上能反映宗教性。但表面效度是最弱的效度形式——「看起來合理」不代表真的合理。"},
  {q:"\"College Board tests predict college success\" is an example of:",o:["Construct validity","Face validity","Criterion-related validity","Content validity"],a:2,w:"Week 3",e:"效標關聯效度（criterion-related validity）/預測效度——測量能夠預測一個外部標準。College Board 的考試分數能預測大學成績（GPA），就表示它有高效標關聯效度。"},
  {q:"Political knowledge correlating with political interest supports:",o:["Convergent validity","Discriminant validity","Content validity","Face validity"],a:0,w:"Week 3",e:"收斂效度（convergent validity）是建構效度的一部分——理論上相關的概念在測量上也應該相關。政治知識和政治興趣理論上有關聯，如果測量結果也顯示相關，就支持收斂效度。"},
  {q:"Political knowledge NOT correlating with food preference supports:",o:["Discriminant validity","Convergent validity","Face validity","Criterion-related validity"],a:0,w:"Week 3",e:"區辨效度（discriminant validity）——理論上不相關的概念在測量上也不應該相關。政治知識和食物偏好沒有理論上的關聯，如果測量結果也不相關，就支持區辨效度。如果「什麼都相關」，你的量表可能有問題。"},
  {q:"The relationship between reliability and validity:",o:["Low reliability guarantees low validity","High validity requires high reliability","They are completely independent","High reliability guarantees high validity"],a:1,w:"Week 3",e:"關鍵觀念：高效度需要高信度（如果測量結果不一致，怎麼可能準確？）。但高信度不保證高效度（可以一致地測量錯的東西——比如用體重計量身高，每次結果很一致，但根本量錯了）。"},
  {q:"Quantitative methods tend to have higher ___, qualitative higher ___:",o:["reliability; validity","generalizability; heuristic value","validity; reliability","objectivity; subjectivity"],a:0,w:"Week 3",e:"量化方法有標準化程序（如固定問卷），所以信度較高。質化方法能深入了解脈絡和意義，所以效度較高（更能「真正測到」研究對象的經驗）。兩者互補。"},
  {q:"An operational definition:",o:["Is only used in qualitative research","Defines the abstract meaning of a concept","Describes how research operations specify values or categories of a variable","Is the same as a theoretical definition"],a:2,w:"Week 3",e:"操作定義描述「你在研究中具體怎麼測量這個變數」。例如理論定義「學術成就 = 認知學習成果」，操作定義可能是「GPA」或「期末考分數」。操作定義的選擇直接影響研究結果——不同的操作定義可能得到不同的結論。"},
  {q:"Different operational definitions of \"fake news\" can lead to:",o:["Significantly different findings","Higher reliability","Better face validity","Identical results"],a:0,w:"Week 3",e:"操作定義對結果有重大影響。老師用 MIT Fake News Study (Vosoughi et al., 2018) 說明：研究者定義的「假新聞」其實是「被事實查核組織認定為假的新聞」——這跟一般人理解的「假新聞」不同，推論範圍也不同。"},
  {q:"EPSEM stands for:",o:["Extended Purposive Sampling and Evaluation Method","Estimated Population Sampling Error Margin","Empirical Probability and Statistical Error Measurement","Equal Probability of Selection Method"],a:3,w:"Week 4",e:"EPSEM = Equal Probability of Selection Method，是機率抽樣的核心概念——母體中每個成員被選中的機率相同。簡單隨機抽樣（simple random sampling）就是最基本的 EPSEM。"},
  {q:"Snowball sampling involves:",o:["Selecting based on quotas","Simple random selection","Selecting participants based on referrals from existing participants","Stratifying the population first"],a:2,w:"Week 4",e:"滾雪球抽樣——先找到幾個符合條件的受訪者，再請他們推薦其他符合條件的人，像滾雪球一樣越滾越大。適合研究難以接觸的群體（如地下組織成員、非法移民）。缺點是樣本偏向同質性。"},
  {q:"The Literary Digest 1936 prediction failed primarily because of:",o:["Sampling error","Nonresponse bias only","Question wording bias","Coverage bias"],a:3,w:"Week 4",e:"經典案例：Literary Digest 用電話簿和汽車登記名冊寄出 1000 萬張選票，240 萬人回覆，預測 Landon 會贏——結果大錯。原因是覆蓋偏差（coverage bias）：1936 年有車有電話的都是較富裕的人，偏向共和黨。抽樣框沒有覆蓋窮人。"},
  {q:"Wang et al. (2015) predicted the 2012 election using Xbox users by applying:",o:["Simple random sampling","Post-stratification","Convenience sampling without adjustment","Quota sampling"],a:1,w:"Week 4",e:"Wang et al. 用 Xbox 使用者（超級偏的樣本：65% 是 18-29 歲、93% 是男性）成功預測選舉。關鍵技術是事後分層（post-stratification）——把 345,858 人切成 176,256 組（性別\u00d7種族\u00d7年齡\u00d7教育\u00d7州\u00d7黨派\u00d7意識形態\u00d72008投票），然後加權。"},
  {q:"The standard error (SE) decreases when:",o:["Confidence level increases","Sample size decreases","Sample size increases","Population becomes more diverse"],a:2,w:"Week 4",e:"標準誤 SE = s / \u221an。樣本越大（n 越大），分母越大，SE 越小。SE 越小代表估計越精確——這就是為什麼大樣本比小樣本的估計更可靠。"},
  {q:"The correct interpretation of a 95% confidence interval is:",o:["95% probability that the true value falls in this interval","The margin of error is 95%","95% of sample data falls within this interval","If we replicated 100 times, roughly 95 intervals would contain the true parameter"],a:3,w:"Week 4",e:"正確解讀（Chan & Rauchfleisch, 2023, p. 3705）：「如果用相同程序重複調查 100 次，大約 95 個信賴區間會包含真正的母體參數。」常見錯誤：說「有 95% 的機率真值在這個區間內」——真值要嘛在要嘛不在，不是機率問題。"},
  {q:"The Central Limit Theorem states that:",o:["All populations are normally distributed","Sample means approximate a normal distribution regardless of population distribution","Larger samples are always better","Sample mean always equals population mean"],a:1,w:"Week 4",e:"中央極限定理（CLT）：不論母體的分佈長什麼樣（歪斜的、雙峰的、均勻的），當你反覆抽樣並計算每次的樣本平均數，這些平均數的分佈會趨近常態分佈。這是推論統計的數學基礎。Week 4 的 R Swirl 練習有模擬示範。"},
  {q:"Coverage bias is a type of:",o:["Representation error","Sampling error","Processing error","Measurement error"],a:0,w:"Week 4",e:"在總體調查誤差框架（Salganik, ch 3.3）中，總誤差 = 代表性誤差 + 測量誤差。覆蓋偏差（抽樣框不涵蓋目標母體）屬於代表性誤差（representation error）。"},
  {q:"A \"double-barreled question\" is problematic because it:",o:["Uses technical jargon","Leads to social desirability bias","Asks about two things in one question","Is too short"],a:2,w:"Week 4",e:"雙管問題——一個問題問兩件事，受訪者無法分別回答。簡報範例：「The US should abandon its space program AND spend the money on domestic programs」——受訪者可能同意花在國內但不同意放棄太空計畫。應該拆成兩題。"},
  {q:"Bipolar scales (like-dislike) work best with:",o:["10-point scale","3-point scale","7-point scale","5-point scale"],a:2,w:"Week 4",e:"Krosnick 建議：雙極量表（如 like-dislike、agree-disagree）最佳為 7-point scale；單極量表（如 not at all important → extremely important）最佳為 5-point scale。較長量表（如 1-100）完成錯誤更多。"},
  {q:"A contingency question is:",o:["A follow-up asked only to those who gave a specific prior answer","A demographic question","An optional question","Asked to all respondents"],a:0,w:"Week 4",e:"條件問題——先問篩選題（如「你上個月有看電影嗎？」），只有回答 Yes 的人才需要回答追問題（「看了幾次？」）。這樣可以防止沒看電影的人亂填次數，減少偏差。"},
  {q:"The WVS trust question posed cross-cultural problems because:",o:["It used a ratio scale","It was double-barreled","It was too long","The word 'people' could mean different things in different cultures"],a:3,w:"Week 4",e:"WVS 信任問題：「most people can be trusted」——「people」在中國脈絡下可能指家人、鄰居、朋友或陌生人。中文版的「大多數人」被解讀範圍不同，導致 WVS 觀察到的高信任度與當地實際觀察不符。教訓：跨文化研究要注意概念的等價性。"},
  {q:"Obama birthplace question wording producing 58%-77% correct rates demonstrates:",o:["The effect of question wording on survey results","Interviewer bias","Nonresponse bias","Coverage bias"],a:0,w:"Week 4",e:"同一個事實問題用四種不同措辭，正確回答率差了 19 個百分點。這強烈說明問題措辭（question wording）對調查結果有巨大影響。問卷設計不是隨便寫問題——每個字都可能影響結果。"},
  {q:"\"Acquiescence response set\" refers to respondents tending to:",o:["Give socially desirable answers","Agree with statements regardless of content","Choose the middle option","Skip difficult questions"],a:1,w:"Week 4",e:"默認傾向（acquiescence response set）——受訪者傾向同意任何陳述，不管內容是什麼。解決方法：混合使用正向題和反向題（reverse-coded items），讓受訪者不能一路勾「同意」。"},
  {q:"Stratified sampling involves:",o:["Selecting based on researcher's judgment","Selecting whoever is available","Asking participants to refer others","Dividing population into homogeneous subgroups and sampling from each"],a:3,w:"Week 4",e:"分層抽樣——先按特定變數（如性別、年齡層、地區）將母體分成同質子群體（strata），再從每個子群體中分別隨機抽樣。好處：確保各群體都有代表，比簡單隨機抽樣更精確。"},
  {q:"The median is:",o:["The middle score in a distribution","The average of all scores","The most frequently occurring score","The range of scores"],a:0,w:"Week 4",e:"中位數（median）= 排序後正中間的值。不受極端值影響（unlike mean）。例如收入分佈：如果有一個億萬富翁，平均收入會被拉高，但中位數不會。Mean = 平均數，Mode = 眾數（最常出現的值）。"},
  {q:"Approximately 95% of values in a normal distribution fall within:",o:["\u00b11.96 standard deviations","\u00b13 standard deviations","\u00b11 standard deviation","\u00b10.5 standard deviations"],a:0,w:"Week 4",e:"常態分佈的「68-95-99.9 法則」：約 68% 在 \u00b11 SD，約 95% 在 \u00b11.96 SD（約 \u00b12 SD），約 99.9% 在 \u00b13 SD。95% 對應的 1.96 是信賴區間計算中最常用的數字。"},
  {q:"Nonresponse bias occurs when:",o:["Questions are double-barreled","People who respond differ systematically from those who do not","The sample is too large","The questionnaire is too long"],a:1,w:"Week 4",e:"無回應偏差——有回應的人和沒回應的人在特徵上有系統性差異。例如：政治調查中，對政治有興趣的人更可能回覆，導致樣本偏向政治積極者。問卷太長可能「增加」無回應，但不等於無回應偏差本身。"},
  {q:"Descriptive statistics are used to:",o:["Make inferences about a population","Establish causation","Describe the characteristics of a sample","Test hypotheses"],a:2,w:"Week 4",e:"描述統計描述樣本特徵（如平均數、中位數、標準差、頻率分佈），告訴你「資料長什麼樣」。推論統計（inferential statistics）才是從樣本推論母體、檢驗假設。兩者互補。"},
  {q:"Social desirability bias means respondents tend to:",o:["Give socially acceptable rather than truthful answers","Choose the first option","Skip sensitive questions","Agree with everything"],a:0,w:"Week 4",e:"社會期望性偏差——受訪者傾向給出社會認可的答案而非真實想法。例如：低報自己的種族歧視行為、高報自己的投票參與率、高報捐款金額。解決方法：匿名調查、間接問法。"},
  {q:"The primary purpose of random assignment is to:",o:["Make the study more ethical","Ensure groups are equivalent on average before treatment","Reduce cost","Increase sample size"],a:1,w:"Week 5",e:"隨機分配（random assignment）是實驗設計的核心。它確保實驗組和對照組在平均上是等同的——相同比例的男女、相同的平均年齡、相同的政治傾向等。這樣一來，如果兩組結果不同，就可以確信差異來自 treatment。"},
  {q:"In Pennycook et al. (2021), the treatment group was asked to:",o:["Rate the accuracy of a single non-partisan news headline","Watch a media literacy video","Read a political article","Share fake news headlines"],a:0,w:"Week 5",e:"Pennycook et al. (2021, Nature) 的實驗非常簡單但有效：treatment 組只是在開始前先評估一則新聞的準確性（shifting attention to accuracy）。結果：他們分享假新聞的比例降低，分享真新聞的比例提高。這是 mixed design 的經典例子。"},
  {q:"A between-subjects design means:",o:["Participants choose which group to join","No control group","Same person experiences all conditions","Different people are assigned to different groups"],a:3,w:"Week 5",e:"受試者間設計——不同人分到不同組，每人只經歷一個條件。優點：沒有順序效應（carryover effects）。缺點：需要更大樣本，因為個體差異增加了雜訊。"},
  {q:"A within-subjects design means:",o:["Only one group is studied","Different people in different groups","Only qualitative data","The same person experiences all conditions"],a:3,w:"Week 5",e:"受試者內設計——同一個人經歷所有條件。優點：每個人是自己的對照組，減少個體差異的雜訊，需要的樣本較小。缺點：可能有順序效應——經歷第一個條件會影響對第二個條件的反應。"},
  {q:"Internal validity refers to:",o:["Whether the study is ethical","Whether results generalize to the real world","Whether experimental conclusions accurately reflect what happened","Whether the measure is consistent"],a:2,w:"Week 5",e:"內部效度——實驗結論是否準確反映實驗中「真正發生的事」。確保條件：隨機分配、操弄 IV、測量 DV、至少一個對照組、各組條件一致。如果這些沒做好，你不知道結果是不是真的因為 treatment。"},
  {q:"Which is a threat to internal validity?",o:["Differential attrition","Post-stratification","Replication","Generalizability"],a:0,w:"Week 5",e:"差異性流失（differential attrition）——如果實驗組的退出率比對照組高很多，剩下的人可能跟退出的人不同，破壞了隨機分配建立的組間等同性。其他威脅：History（外部事件）、Maturation（成熟效應）、Testing（前測效應）、Selection（選擇偏差）。"},
  {q:"External validity refers to:",o:["Whether results can be generalized to the real world","Whether the hypothesis was confirmed","Whether measures are reliable","Whether the experiment was conducted correctly"],a:0,w:"Week 5",e:"外部效度——實驗結果能不能推論到真實世界的其他情境、其他人群、其他文化？實驗通常內部效度高（控制嚴格）但外部效度低（實驗室不像真實生活）。解決：複製研究（replication）、後設分析（meta-analysis）。"},
  {q:"The WEIRD problem refers to samples biased toward:",o:["Western, Educated, Industrialized, Rich, Democratic populations","Young tech-savvy users","Paid participants","Strange participants"],a:0,w:"Week 5",e:"WEIRD = Western, Educated, Industrialized, Rich, Democratic。大量心理學和社會科學研究的樣本來自這類人群（特別是美國大學生），但這些人只佔全球人口的一小部分。研究結果可能不適用於其他文化。"},
  {q:"Experimental realism (Aronson et al., 1985) means:",o:["The experiment mimics everyday life","The experiment uses real-world materials","The situation is involving and subjects take it seriously","Results are replicated in field settings"],a:2,w:"Week 5",e:"實驗現實主義——受試者是否認真對待實驗情境、是否真的受到影響。原文定義：「an experiment is realistic, if the situation is involving to the subjects, if they are forced to take it seriously, and if it has impact on them.」老師說這比 mundane realism 更重要。"},
  {q:"Mundane realism refers to:",o:["Whether the experiment uses randomization","Whether subjects take it seriously","Internal validity","The extent to which the research setting resembles everyday life"],a:3,w:"Week 5",e:"世俗現實主義——實驗情境是否類似日常生活。實驗室實驗的 mundane realism 通常較低（不像真實生活），但只要受試者認真投入（experimental realism 高），結果仍然有意義。"},
  {q:"A manipulation check is used to:",o:["Ensure random assignment worked","Verify that participants understood and were affected by the treatment","Test reliability","Check for statistical significance"],a:1,w:"Week 5",e:"操弄檢定確認受試者確實感受到 treatment 的效果。兩種類型：(1) 事實型（Factual）：問文章來源或內容是什麼；(2) 主觀型（Subjective）：問覺得貼文多有趣、看完後感覺如何。如果操弄檢定失敗，代表 treatment 可能沒有成功操弄。"},
  {q:"A t-test is used to:",o:["Compare means of more than three groups","Measure correlation","Compare means of exactly two groups","Test scale reliability"],a:2,w:"Week 5",e:"t-test 只能比較兩組的平均數（如實驗組 vs 對照組）。如果有超過兩組（如三種 treatment），或想加入交互效果和共變項（如年齡、性別），就需要用 linear regression。"},
  {q:"When should a researcher use linear regression instead of a t-test?",o:["When comparing exactly two groups","When sample size is small","When comparing more than two groups or adding interaction effects","When DV is categorical"],a:2,w:"Week 5",e:"Linear regression 的用途比 t-test 廣：可以比較多組、加入交互效果（interaction effects，如「AI moderation 的效果是否受 AI risk perception 調節」）、加入共變項（covariates，如年齡、性別）作為控制變數。"},
  {q:"Preregistration involves:",o:["Getting IRB approval","Replicating a previous study","Publishing results before data collection","Registering hypotheses, methods, and sample size before data collection"],a:3,w:"Week 5",e:"預注冊（如 osf.io）——在收集資料前就把假設、方法、預計樣本數公開登記。目的是防止 HARKing（Hypothesizing After Results are Known，看到結果才編假設）和 p-hacking（嘗試各種分析直到找到顯著結果）。"},
  {q:"An interaction effect means:",o:["Neither variable has an effect","Both variables have the same effect","Two variables are independent","The effect of one variable depends on the level of another"],a:3,w:"Week 5",e:"交互效果——一個變數的效果取決於另一個變數的水準。例如 Jungherr & Rauchfleisch (2025)：AI moderation 的效果（主效果差異 0.30）會因為受試者對 AI 風險的感知不同而有不同的影響——這就是交互效果。"},
  {q:"In Jungherr & Rauchfleisch (2025), the within-subjects factor was:",o:["AI moderator vs. human moderator","Number of tasks","Age","Political orientation"],a:0,w:"Week 5",e:"每位參與者各做 3 個 AI moderator 任務 + 3 個 human moderator 任務——同一個人經歷兩種條件，所以是受試者內因子（within-subjects factor）。DV 是參與意願和審議品質（7-point scale）。"},
  {q:"Power analysis ensures that:",o:["Sample size is large enough to detect an effect if it exists","The experiment is ethical","The hypothesis is correct","Results are generalizable"],a:0,w:"Week 5",e:"統計檢定力分析——確保樣本量夠大，如果效果真的存在，你有足夠的「力量」偵測到它。樣本太小的研究可能錯過真實效果（Type II error），浪費時間和資源。老師提到可以用 shiny.ieis.tue.nl/anova_power/ 做計算。"},
  {q:"Treatment must differ from control ONLY in:",o:["The manipulated variable","Location","Time of measurement","Sample size"],a:0,w:"Week 5",e:"Treatment 和 control 之間只能在「你操弄的變數」上不同，其他一切條件必須相同（constancy of conditions）。如果有其他差異（如 treatment 組在早上測、control 組在晚上測），你就不知道效果是因為操弄還是因為時間差。"},
  {q:"According to Babbie (p. 295), content analysis is:",o:["A type of experimental design","A statistical technique for survey data","A method for conducting interviews","The study of recorded human communications"],a:3,w:"Week 6",e:"Babbie 定義內容分析為「對已記錄的人類溝通的研究」——包括書籍、網站、繪畫、法律等。另一個重要定義來自 Neuendorf：「the systematic, objective, quantitative analysis of message characteristics」。內容分析屬於非干擾性研究（unobtrusive research）。"},
  {q:"Content analysis is characterized as:",o:["Automated and qualitative","Qualitative and interpretive","Rhetorical and critical","Manual and quantitative"],a:3,w:"Week 6",e:"傳統內容分析 = 手動（manual）+ 量化（quantitative）。它不是修辭分析、敘事分析、論述分析、符號學分析等質性方法。但現在有了 AI 和 LLM，自動內容分析越來越普遍——不過流程的其他步驟（定義、codebook、驗證）完全相同。"},
  {q:"A codebook in content analysis:",o:["Is only for automated analysis","Contains statistical results","Is the same as a code sheet","Guides coders on how to code and links unstructured to structured data"],a:3,w:"Week 6",e:"編碼簿（codebook）= 編碼的「說明書」，告訴編碼者每個變數怎麼編碼、每個類別的定義是什麼。它連結非結構化資料（原始文本/圖片/影片）和結構化資料（Excel 表格中的數字和類別）。老師強調：如果用 LLM 做自動內容分析，prompt 基本上就是 codebook。"},
  {q:"The acceptable threshold for Krippendorff's alpha is:",o:["\u2265 0.95","\u2265 0.80","\u2265 0.67","\u2265 0.50"],a:2,w:"Week 6",e:"Krippendorff's alpha \u2265 0.67 被認為可接受。低於 0.67 就要：(1) 討論不一致的案例 (2) 修改 codebook 使指示更清楚 (3) 重新取一組隨機樣本 (4) 再測。通常需要 3-4 輪。在 Jungherr & Rauchfleisch 的 GPT 驗證研究中，alpha = 0.81。"},
  {q:"Percentage agreement is insufficient because it:",o:["Only works with interval data","Does not account for chance agreement","Is too complicated","Requires too many coders"],a:1,w:"Week 6",e:"百分比一致性最大的問題是沒考慮偶然一致性（chance agreement）。例如：二分類變數（是/否）如果 50/50 分佈，隨機猜測就有 50% 一致性。Krippendorff's alpha 用公式 \u03b1 = 1 - (D_observed / D_expected) 去除了偶然因素。"},
  {q:"Manifest coding focuses on:",o:["Abstract underlying meanings","The researcher's interpretation","Latent themes","Directly visible, surface-level content"],a:3,w:"Week 6",e:"顯性編碼（manifest coding）= 直接可見的內容，如特定詞彙出現的次數、文章提到的來源數量。容易量化，適合自動分析。隱性編碼（latent coding）= 更抽象的含義，如框架分析、情感基調。過去需要人工，現在 LLM 也可以做。"},
  {q:"In a confusion matrix, a False Positive (FP) means:",o:["Actually positive, correctly identified","Actually negative, correctly identified","Actually positive, missed by classifier","Actually negative, incorrectly labeled as positive"],a:3,w:"Week 6",e:"混淆矩陣四格：TP（實際正、預測正 \u2713）、TN（實際負、預測負 \u2713）、FP（實際負、預測正 \u2717 = Type I error）、FN（實際正、預測負 \u2717 = Type II error）。FP 就是「狼來了」——沒有狼但你說有狼。"},
  {q:"Intercoder reliability testing typically requires:",o:["3-4 rounds","1 round","2 rounds","10+ rounds"],a:0,w:"Week 6",e:"通常需要 3-4 輪迭代：第一輪測試 → alpha 可能不夠高 → 討論不一致案例 → 修改 codebook → 重新取隨機樣本 → 再測。每輪都用新的隨機樣本，不能用上次測過的。這個過程雖然耗時，但是確保資料品質的關鍵。"},
  {q:"The instructor recommends starting automated content analysis with:",o:["Commercial APIs like ChatGPT","Neural network classifiers","The simplest method (e.g., keywords)","Fine-tuned LLMs"],a:2,w:"Week 6",e:"老師建議的順序：Keywords（最簡單）→ Transformer models → Fine-tuning → ChatGPT（最複雜）。從最簡單的開始試，如果效果好就不需要更複雜的方法。永遠要用幾百筆人工標記的資料驗證。Kappa/K-alpha \u2265 0.6 就可以繼續。"},
  {q:"In Jungherr & Rauchfleisch's GPT validation, Krippendorff's alpha was:",o:["0.67","0.95","0.81","0.50"],a:2,w:"Week 6",e:"在 Jungherr & Rauchfleisch 的研究中，用 50 筆隨機樣本做驗證：兩位人工編碼者 + GPT 分類器的 Krippendorff's alpha = 0.81，遠超 0.67 門檻。這說明 GPT 在這個任務上的表現與人工編碼者相當。"},
  {q:"In R, vectors have a type hierarchy of:",o:["character > logical > numeric","logical > numeric > character","numeric > character > logical","character > numeric > logical"],a:3,w:"Week 6",e:"R 向量的型別優先順序：character > numeric > logical。混合不同型別時，R 自動轉換成最高優先的型別。例如 c(TRUE, \"hello\", 3) → 全部變 character：\"TRUE\" \"hello\" \"3\"。"},
  {q:"In R, c(1, TRUE, FALSE, 555) produces:",o:["1 1 0 555","1 'TRUE' 'FALSE' 555","'1' 'TRUE' 'FALSE' '555'","An error"],a:0,w:"Week 6",e:"這裡只有 numeric 和 logical 兩種型別，numeric 優先級更高，所以 logical 被轉換成 numeric：TRUE \u2192 1，FALSE \u2192 0。結果是數值向量 1 1 0 555。如果有 character（如加入 \"hello\"），全部都會變成 character。"},
  // === Week R: R Code ===
  {q:"In R, running class(c(TRUE, 5, \"hello\")) returns:",o:["\"numeric\"","\"logical\"","\"character\"","\"mixed\""],a:2,w:"Week R",e:"R 向量只能存一種型別。c(TRUE, 5, \"hello\") 混入 logical、numeric、character 三種。型別優先順序：character > numeric > logical，所以 TRUE → \"TRUE\"，5 → \"5\"，全部強制轉換為 character。class() 回傳 \"character\"。"},
  {q:"A researcher runs t.test() and gets p-value = 0.004. The correct conclusion is:",o:["We accept H₀ as true","We fail to reject H₀","We reject H₀; the result is statistically significant","The result is inconclusive without an effect size"],a:2,w:"Week R",e:"p = 0.004 < 0.05，拒絕虛無假設（H₀），結果達統計顯著。注意：不是「H₁ 為真」也不是「接受 H₀」——p 值告訴你的是「在 H₀ 為真的情況下，觀察到這樣結果的機率」。"},
  {q:"t.test output: mean of x (treatment) = 3.82, mean of y (control) = 4.35. Which group scored higher?",o:["Treatment group (M = 3.82)","Control group (M = 4.35)","Both groups scored equally","Cannot be determined from this output"],a:1,w:"Week R",e:"直接比較兩平均數：treatment (x) = 3.82，control (y) = 4.35。4.35 > 3.82，控制組信任分數更高。t 值為負（t = -2.89）也印證了 x < y。"},
  {q:"The minimum acceptable value for Krippendorff's alpha in content analysis is:",o:["0.50","0.60","0.80","0.67"],a:3,w:"Week R",e:"Krippendorff's alpha ≥ 0.67 才算可接受的編碼者間信度。低於此值需要：討論不一致案例 → 修改 codebook → 重新取隨機樣本 → 再測，通常需 3-4 輪。"},
  {q:"After getting kripp.alpha = 0.55 (below threshold), what should a researcher do FIRST?",o:["Discuss disagreements and revise the codebook","Accept the results since 0.55 is close enough","Use only one coder to avoid inconsistency","Increase the total sample size"],a:0,w:"Week R",e:"標準流程第一步：兩位編碼者討論不一致案例，找出分歧原因，修改 codebook 讓定義更清晰。接著取新的隨機樣本（不能用同一批）重新測試。不可接受 0.55，必須達到 ≥ 0.67。"},
  {q:"In a confusion matrix, a False Negative (FN) means the classifier:",o:["Correctly detected a positive case","Flagged a negative as positive (false alarm)","Correctly identified a negative case","Missed an actual positive and labeled it negative"],a:3,w:"Week R",e:"False Negative（假陰性 / Type II Error）= 實際是正例，但分類器預測為負例。在癌症篩查中，FN 比 FP 更嚴重——病人實際有癌症卻被告知沒事，延誤治療。"},
  {q:"A False Positive (FP) in classifier evaluation corresponds to:",o:["Type II Error (β)","Type I Error (α)","True Positive Rate (Sensitivity)","Negative Predictive Value"],a:1,w:"Week R",e:"False Positive = Type I Error（α）：實際是負例，分類器卻預測為正例（誤報）。FP 對應顯著性水準 α（通常設 0.05）。False Negative = Type II Error（β）——兩者是不同方向的錯誤。"},
  {q:"Confusion matrix: TP=45, FP=10, FN=5, TN=40. What is the overall accuracy?",o:["45%","90%","85%","75%"],a:2,w:"Week R",e:"Accuracy = (TP + TN) / 總案例數 = (45 + 40) / (45 + 40 + 10 + 5) = 85 / 100 = 85%。注意：資料不平衡時 accuracy 會有誤導性，還需要看 precision 和 recall。"},
  {q:"In R, what does nrow(df) return?",o:["Number of columns","Number of rows","A list of column names","The class of each column"],a:1,w:"Week R",e:"nrow(df) 回傳資料框的列數（觀察值數量）。ncol(df) 回傳欄數（變數數量）。dim(df) 同時回傳兩者：c(rows, cols)。"},
  {q:"In R, head(df) displays by default:",o:["Last 6 rows","Summary statistics","First 6 rows","All column names"],a:2,w:"Week R",e:"head(df) 預設顯示前 6 列（rows）。可用 head(df, 10) 改為前 10 列。tail(df) 顯示最後 6 列。初步檢查資料格式最快的方式。"},
  {q:"In R, str(df) shows:",o:["A plot of each variable's distribution","Only the first row","Descriptive stats (mean, min, max)","Structure: variable names, types, and first few values"],a:3,w:"Week R",e:"str(df) 顯示資料框結構：每個變數的名稱、型別（int / chr / num / Factor / logi）和前幾個值。探索陌生資料集的第一步，搭配 head() 和 summary() 使用。"},
  {q:"In R, mean(c(1, 2, NA)) returns by default:",o:["1.5","2","3","NA"],a:3,w:"Week R",e:"資料含 NA 時，R 的 mean() 預設回傳 NA。必須加 na.rm = TRUE 才會忽略 NA 計算：mean(c(1, 2, NA), na.rm = TRUE) = 1.5。sd()、sum()、median() 也適用相同規則。"},

// --- Per-question option shuffle ---
// shuffledOpts[qid] = { order: [2,0,3,1], correctPos: newIndex }
// order[i] = original index that goes to display position i
let shuffledOpts = {};

function shuffleArray(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function getShuffled(qid) {
  if (!shuffledOpts[qid]) {
    const q = ALL_QUESTIONS[qid];
    const order = shuffleArray([0, 1, 2, 3]);
    const correctPos = order.indexOf(q.a);
    shuffledOpts[qid] = { order, correctPos };
  }
  return shuffledOpts[qid];
}

function reshuffleAll() {
  shuffledOpts = {};
}

// --- State ---
let questions = [...ALL_QUESTIONS];
let currentIndex = 0;
let sessionAnswered = {};  // qid -> display position chosen
let correctTotal = 0;
let wrongTotal = 0;
let activeFilter = "All";
let lang = 'en'; // 'en' or 'zh'

// --- Wrong questions: persisted in localStorage ---
function getWrongList() {
  try { return JSON.parse(localStorage.getItem('coreme_wrong') || '[]'); } catch { return []; }
}
function saveWrongList(list) {
  localStorage.setItem('coreme_wrong', JSON.stringify(list));
}
function addToWrong(qid) {
  const list = getWrongList();
  if (!list.includes(qid)) { list.push(qid); saveWrongList(list); }
  updateWrongBadge();
}
function removeFromWrong(qid) {
  const list = getWrongList().filter(id => id !== qid);
  saveWrongList(list);
  updateWrongBadge();
}
function updateWrongBadge() {
  const btn = document.getElementById('wrongFilterBtn');
  const badge = document.getElementById('wrongBadge');
  const count = getWrongList().length;
  if (badge) badge.textContent = count;
  if (btn) btn.style.display = count > 0 ? '' : 'none';
  document.getElementById('clearWrongBtn').style.display = count > 0 ? '' : 'none';
}

// --- Filters ---
const weeks = [...new Set(ALL_QUESTIONS.map(q => q.w))];

function initFilters() {
  const el = document.getElementById('filters');
  // "All" button
  const allBtn = document.createElement('button');
  allBtn.textContent = 'All';
  allBtn.className = 'active';
  allBtn.onclick = () => applyFilter('All', allBtn);
  el.appendChild(allBtn);
  // Week buttons
  weeks.forEach(w => {
    const btn = document.createElement('button');
    btn.textContent = w;
    btn.onclick = () => applyFilter(w, btn);
    el.appendChild(btn);
  });
  // Wrong questions button
  const wrongBtn = document.createElement('button');
  wrongBtn.id = 'wrongFilterBtn';
  wrongBtn.className = 'wrong-filter';
  wrongBtn.innerHTML = '\u2717 Wrong <span class="wrong-count-badge" id="wrongBadge">0</span>';
  wrongBtn.onclick = () => applyFilter('wrong', wrongBtn);
  wrongBtn.style.display = 'none';
  el.appendChild(wrongBtn);
  // Flagged button
  const flagBtn = document.createElement('button');
  flagBtn.id = 'flagFilterBtn';
  flagBtn.className = 'flag-filter';
  flagBtn.innerHTML = '📌 Flagged <span class="flag-count-badge" id="flagBadge">0</span>';
  flagBtn.onclick = () => applyFilter('flagged', flagBtn);
  flagBtn.style.display = 'none';
  el.appendChild(flagBtn);
}

function applyFilter(filter, btn) {
  activeFilter = filter;
  document.querySelectorAll('.filters button').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  if (filter === 'All') {
    questions = [...ALL_QUESTIONS];
  } else if (filter === 'wrong') {
    const wrongIds = getWrongList();
    questions = ALL_QUESTIONS.filter((_, i) => wrongIds.includes(i));
  } else if (filter === 'flagged') {
    const flaggedIds = getFlagged();
    questions = ALL_QUESTIONS.filter((_, i) => flaggedIds.includes(i));
  } else {
    questions = ALL_QUESTIONS.filter(q => q.w === filter);
  }
  currentIndex = 0;
  renderCard();
}

function toggleLang() {
  lang = lang === 'en' ? 'zh' : 'en';
  const track = document.getElementById('langToggle');
  const enLabel = document.getElementById('langEN');
  const zhLabel = document.getElementById('langZH');
  if (lang === 'zh') {
    track.classList.add('zh');
    enLabel.classList.remove('active-lang');
    zhLabel.classList.add('active-lang');
  } else {
    track.classList.remove('zh');
    enLabel.classList.add('active-lang');
    zhLabel.classList.remove('active-lang');
  }
  renderCard();
}

function getQText(q) {
  const qid = ALL_QUESTIONS.indexOf(q);
  const sh = getShuffled(qid);
  if (lang === 'en') {
    return { qt: q.q, ot: sh.order.map(i => q.o[i]), correctPos: sh.correctPos };
  }
  if (qid >= 0 && qid < ZH.length) {
    return { qt: ZH[qid].q, ot: sh.order.map(i => ZH[qid].o[i]), correctPos: sh.correctPos };
  }
  return { qt: q.q, ot: sh.order.map(i => q.o[i]), correctPos: sh.correctPos };
}

function shuffleCards() {
  reshuffleAll();
  for (let i = questions.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [questions[i], questions[j]] = [questions[j], questions[i]];
  }
  currentIndex = 0;
  renderCard();
}

function resetSession() {
  reshuffleAll();
  sessionAnswered = {};
  correctTotal = 0;
  wrongTotal = 0;
  currentIndex = 0;
  questions = activeFilter === 'All' ? [...ALL_QUESTIONS] :
              activeFilter === 'wrong' ? ALL_QUESTIONS.filter((_, i) => getWrongList().includes(i)) :
              ALL_QUESTIONS.filter(q => q.w === activeFilter);
  updateStats();
  renderCard();
}

function clearWrongList() {
  if (confirm('Clear all wrong questions? This cannot be undone.\n確定清除所有錯題記錄？')) {
    saveWrongList([]);
    updateWrongBadge();
    if (activeFilter === 'wrong') {
      questions = [];
      renderCard();
    }
  }
}

// --- Render ---
function renderCard() {
  const area = document.getElementById('cardArea');

  if (questions.length === 0) {
    area.innerHTML = '<div class="empty-msg"><div class="emoji">\ud83c\udf89</div>No questions in this set!<br>\u9019\u500b\u5206\u985e\u6c92\u6709\u984c\u76ee\u3002</div>';
    document.getElementById('cardCounter').textContent = '0 / 0';
    document.getElementById('btnPrev').disabled = true;
    document.getElementById('btnNext').disabled = true;
    updateProgress();
    return;
  }

  const q = questions[currentIndex];
  const qid = ALL_QUESTIONS.indexOf(q);
  const isAnswered = sessionAnswered[qid] !== undefined;
  const { qt, ot, correctPos } = getQText(q);
  const wasCorrect = isAnswered && sessionAnswered[qid] === correctPos;

  let optionsHtml = '';
  ot.forEach((opt, i) => {
    const letter = String.fromCharCode(65 + i);
    let cls = '';
    if (isAnswered) {
      cls = 'disabled ';
      if (i === correctPos) cls += 'show-correct';
      else if (i === sessionAnswered[qid] && sessionAnswered[qid] !== correctPos) cls += 'wrong-answer';
    }
    optionsHtml += `<li class="${cls}" data-idx="${i}" onclick="selectOption(${i})">(${letter}) ${opt}</li>`;
  });

  const correctLetter = String.fromCharCode(65 + correctPos);
  const inWrong = getWrongList().includes(qid);
  const wrongMark = inWrong ? ` <span id="wrongMark" style="color:#f87171;font-size:12px;">\u2717 in wrong list</span>` : `<span id="wrongMark"></span>`;

  let explanationHtml = '';
  if (isAnswered) {
    const icon = wasCorrect ? '\u2705' : '\u274c';
    const resultText = wasCorrect ? (lang==='zh'?'正確！':'Correct!') : `${lang==='zh'?'錯誤！答案':'Wrong! Answer'}: (${correctLetter}) ${ot[correctPos]}`;
    const resultColor = wasCorrect ? '#4ade80' : '#f87171';
    const nowInWrong = getWrongList().includes(qid);
    const wrongToggle = `<div class="wrong-toggle-row">
      <button id="wrongToggleBtn" class="${nowInWrong ? 'btn-wrong-remove' : 'btn-wrong-add'}" onclick="toggleWrongFromExplanation(${qid})">
        ${nowInWrong ? '✓ 已記住，移出錯題庫' : '＋ 加入錯題庫'}
      </button>
    </div>`;
    explanationHtml = `
      <div class="explanation-box show">
        <div class="exp-header">
          <span class="exp-icon">${icon}</span>
          <span class="exp-label" style="color:${resultColor}">${resultText}</span>
        </div>
        <div class="exp-text">${q.e}</div>
        ${wrongToggle}
      </div>
    `;
  }

  const flagged = isFlagged(qid);
  area.innerHTML = `
    <div class="card-box">
      <div class="card-number-row">
        <span class="card-number">Q${qid + 1}${wrongMark}</span>
        <button class="flag-btn ${flagged ? 'flagged' : ''}" onclick="toggleFlag(${qid})" title="${flagged ? '取消標記 Remove flag' : '標記複習 Flag for review'}">📌</button>
      </div>
      <span class="card-week">${q.w}</span>
      <div class="question-text">${qt}</div>
      <ul class="options">${optionsHtml}</ul>
      ${explanationHtml}
    </div>
  `;

  document.getElementById('cardCounter').textContent = `${currentIndex + 1} / ${questions.length}`;
  document.getElementById('btnPrev').disabled = currentIndex === 0;
  document.getElementById('btnNext').disabled = currentIndex === questions.length - 1;
  updateProgress();
}

function selectOption(idx) {
  const q = questions[currentIndex];
  const qid = ALL_QUESTIONS.indexOf(q);
  if (sessionAnswered[qid] !== undefined) return;

  const { correctPos } = getShuffled(qid);
  sessionAnswered[qid] = idx;
  if (idx === correctPos) {
    correctTotal++;
    // Do NOT auto-remove from wrong list — user decides via button after seeing explanation
  } else {
    wrongTotal++;
    addToWrong(qid);
  }
  updateStats();
  renderCard();
}

function nextCard() { if (currentIndex < questions.length - 1) { currentIndex++; renderCard(); } }
function prevCard() { if (currentIndex > 0) { currentIndex--; renderCard(); } }

function updateStats() {
  document.getElementById('correctCount').textContent = correctTotal;
  document.getElementById('wrongCount').textContent = wrongTotal;
  const total = correctTotal + wrongTotal;
  document.getElementById('pctDisplay').textContent = total > 0 ? Math.round(correctTotal / total * 100) + '%' : '0%';
}

function updateProgress() {
  const answeredCount = questions.filter(q => sessionAnswered[ALL_QUESTIONS.indexOf(q)] !== undefined).length;
  const pct = questions.length > 0 ? (answeredCount / questions.length * 100) : 0;
  document.getElementById('progressFill').style.width = pct + '%';
}

// --- Keyboard ---
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight') nextCard();
  else if (e.key === 'ArrowLeft') prevCard();
  else if (e.key === 'n' || e.key === 'N') nextCard();
  else if (e.key >= '1' && e.key <= '4') selectOption(parseInt(e.key) - 1);
});

// --- Wrong List Toggle (manual, from explanation) ---
function toggleWrongFromExplanation(qid) {
  const inWrong = getWrongList().includes(qid);
  if (inWrong) removeFromWrong(qid); else addToWrong(qid);
  const nowInWrong = getWrongList().includes(qid);
  // Update button in place
  const btn = document.getElementById('wrongToggleBtn');
  if (btn) {
    btn.textContent = nowInWrong ? '✓ 已記住，移出錯題庫' : '＋ 加入錯題庫';
    btn.className = nowInWrong ? 'btn-wrong-remove' : 'btn-wrong-add';
  }
  // Update wrongMark label in card header
  const wm = document.getElementById('wrongMark');
  if (wm) {
    wm.textContent = nowInWrong ? '✗ in wrong list' : '';
    wm.style.color = '#f87171';
  }
}

// --- Flag / Bookmark ---
function getFlagged() { try { return JSON.parse(localStorage.getItem('coreme_flagged') || '[]'); } catch { return []; } }
function saveFlagged(list) { localStorage.setItem('coreme_flagged', JSON.stringify(list)); }
function isFlagged(qid) { return getFlagged().includes(qid); }
function toggleFlag(qid) {
  const list = getFlagged();
  const idx = list.indexOf(qid);
  if (idx >= 0) list.splice(idx, 1); else list.push(qid);
  saveFlagged(list);
  updateFlagBadge();
  renderCard();
}
function updateFlagBadge() {
  const btn = document.getElementById('flagFilterBtn');
  const badge = document.getElementById('flagBadge');
  const count = getFlagged().length;
  if (badge) badge.textContent = count;
  if (btn) btn.style.display = count > 0 ? '' : 'none';
}

// --- Theme ---
function initTheme(){const t=localStorage.getItem('coreme_theme')||'light';document.body.classList.toggle('light',t==='light');updateThemeBtn()}
function toggleTheme(){const on=document.body.classList.toggle('light');localStorage.setItem('coreme_theme',on?'light':'dark');updateThemeBtn()}
function updateThemeBtn(){const btn=document.getElementById('themeToggle');if(btn)btn.textContent=document.body.classList.contains('light')?'🌙':'☀️'}

// --- Init ---
initTheme();
initFilters();
updateWrongBadge();
updateFlagBadge();
renderCard();
</script>

<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>COREME Short Answer Practice — AI Grading</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI','Microsoft JhengHei',sans-serif;background:#0f172a;color:#e2e8f0;min-height:100vh}
.header{background:#1e293b;padding:14px 20px;border-bottom:2px solid #2e75b6;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px}
.header h1{font-size:17px;color:#93c5fd}
.header-right{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.api-status{font-size:11px;padding:3px 10px;border-radius:12px;cursor:pointer}
.api-status.ok{background:#14532d;color:#4ade80}
.api-status.no{background:#450a0a;color:#f87171}
.btn{padding:5px 12px;border:none;border-radius:8px;cursor:pointer;font-size:12px;transition:all .15s}
.btn-blue{background:#2e75b6;color:#fff}.btn-blue:hover{background:#3b82f6}
.btn-gray{background:#475569;color:#e2e8f0}.btn-gray:hover{background:#64748b}
.btn-green{background:#14532d;color:#86efac}.btn-green:hover{background:#166534}

.sidebar{position:fixed;left:0;top:0;width:260px;height:100vh;background:#1e293b;border-right:1px solid #334155;overflow-y:auto;padding-top:60px;z-index:10}
.sidebar h3{padding:10px 14px 6px;font-size:12px;color:#64748b;text-transform:uppercase;letter-spacing:1px}
.type-filters{padding:4px 14px 8px;display:flex;gap:4px;flex-wrap:wrap}
.type-filters button{padding:3px 8px;border:1px solid #475569;border-radius:10px;background:transparent;color:#94a3b8;cursor:pointer;font-size:11px}
.type-filters button.active{background:#2e75b6;color:white;border-color:#2e75b6}
.q-list{list-style:none}
.q-list li{padding:8px 14px;cursor:pointer;font-size:12px;line-height:1.4;border-left:3px solid transparent;transition:all .1s;color:#94a3b8}
.q-list li:hover{background:#334155;color:#e2e8f0}
.q-list li.active{background:#1e3a5f;border-left-color:#2e75b6;color:#93c5fd}
.q-badge{display:inline-block;font-size:9px;padding:1px 5px;border-radius:6px;margin-left:3px}
.q-badge.graded{background:#14532d;color:#4ade80}
.q-badge.draft{background:#78350f;color:#fbbf24}
.type-tag{font-size:9px;padding:1px 5px;border-radius:4px;margin-right:4px;font-weight:bold}
.type-tag.A{background:#1e3a5f;color:#93c5fd}
.type-tag.B{background:#1a2e1a;color:#86efac}
.type-tag.C{background:#2e1a2e;color:#d8b4fe}
.type-tag.D{background:#2e2a1a;color:#fbbf24}

.main{margin-left:260px;padding:20px;max-width:860px}
.question-card{background:#1a2332;border:1px solid #334155;border-radius:12px;padding:20px;margin-bottom:16px}
.q-header{display:flex;align-items:center;gap:8px;margin-bottom:4px}
.q-number{font-size:11px;color:#64748b}
.q-week{font-size:10px;padding:2px 7px;border-radius:8px;background:#2e75b6;color:#fff}
.q-text{font-size:16px;line-height:1.7;color:#f1f5f9;margin:12px 0;white-space:pre-wrap}
.q-text code,.q-text pre{font-family:Consolas,'Courier New',monospace;background:#0f172a;padding:2px 6px;border-radius:4px;font-size:13px;color:#fbbf24}
.q-text pre{display:block;padding:12px;margin:8px 0;border:1px solid #334155;overflow-x:auto;white-space:pre}
.q-word-target{font-size:12px;color:#64748b;margin-bottom:12px}

.hint-section{margin-bottom:14px}
.hint-toggle{background:none;border:1px solid #475569;border-radius:8px;padding:6px 12px;color:#f59e0b;cursor:pointer;font-size:13px;transition:all .15s}
.hint-toggle:hover{background:#2e2a1a;border-color:#f59e0b}
.hint-box{display:none;margin-top:10px;border-radius:10px;overflow:hidden;animation:fadeIn .3s}
.hint-box.show{display:block}
.hint-strategy{background:#1a1a0f;border-left:3px solid #f59e0b;padding:10px 14px;font-size:13px;color:#fbbf24;line-height:1.5}
.hint-scaffold{background:#0f1a0f;border-left:3px solid #4ade80;padding:10px 14px;font-size:13px;color:#86efac;line-height:1.6;font-family:Consolas,'Courier New',monospace;white-space:pre-wrap}

.answer-area{margin-bottom:14px}
.answer-area label{font-size:13px;color:#94a3b8;display:block;margin-bottom:4px}
.answer-area textarea{width:100%;min-height:120px;background:#0f172a;border:1px solid #475569;border-radius:10px;padding:12px;color:#e2e8f0;font-size:14px;line-height:1.6;resize:vertical;font-family:inherit}
.answer-area textarea:focus{outline:none;border-color:#60a5fa}
.answer-area .meta{display:flex;justify-content:space-between;font-size:11px;color:#64748b;margin-top:3px}

.action-bar{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap}
.grade-result{background:#0c1a2e;border:1px solid #1e3a5f;border-radius:10px;padding:16px;margin-bottom:14px;display:none}
.grade-result.show{display:block;animation:fadeIn .3s}
.grade-score{font-size:32px;font-weight:bold;text-align:center;margin-bottom:10px}
.grade-score .sn{color:#60a5fa}.grade-score .st{color:#64748b;font-size:18px}
.grade-feedback{font-size:14px;line-height:1.7;color:#d1d5db;white-space:pre-wrap}

.model-answer{background:#0f172a;border:1px solid #334155;border-radius:8px;padding:14px;margin-top:14px;display:none;font-size:14px;line-height:1.6;color:#d1d5db}
.model-answer.show{display:block}
.model-answer h4{color:#4ade80;margin-bottom:6px;font-size:13px}

.history-section{margin-top:20px;border-top:1px solid #334155;padding-top:14px}
.history-section h4{color:#94a3b8;font-size:13px;margin-bottom:10px}
.history-item{background:#1a2332;border:1px solid #334155;border-radius:6px;padding:10px;margin-bottom:6px;font-size:12px}
.h-date{color:#64748b;font-size:10px}.h-score{color:#60a5fa;font-weight:bold}

.loading{text-align:center;padding:16px;color:#94a3b8}
.spinner{display:inline-block;width:20px;height:20px;border:2px solid #334155;border-top-color:#60a5fa;border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.6);z-index:100;display:none;align-items:center;justify-content:center}
.modal-overlay.show{display:flex}
.modal{background:#1e293b;border:1px solid #475569;border-radius:12px;padding:20px;width:90%;max-width:400px}
.modal h3{color:#93c5fd;margin-bottom:10px;font-size:16px}
.modal input{width:100%;padding:8px;background:#0f172a;border:1px solid #475569;border-radius:8px;color:#e2e8f0;font-size:13px;margin-bottom:10px}
.modal input:focus{outline:none;border-color:#60a5fa}
.modal .modal-btns{display:flex;gap:6px;justify-content:flex-end}
.modal p{font-size:12px;color:#94a3b8;margin-bottom:10px;line-height:1.4}

@media(max-width:768px){.sidebar{position:relative;width:100%;height:auto;max-height:180px;padding-top:0}.main{margin-left:0}}

/* ── Light Mode ── */
body.light{background:#FAF6F0;color:#2D2A26}
body.light .header{background:#F0E8DF;border-bottom-color:#2e75b6}
body.light .header h1{color:#1B5FAF}
body.light .api-status.ok{background:#DCFCE7;color:#166534}
body.light .api-status.no{background:#FEE2E2;color:#991b1b}
body.light .btn-gray{background:#C9BDB2;color:#2D2A26}
body.light .btn-gray:hover{background:#B5A99E}
body.light .sidebar{background:#F0E8DF;border-right-color:#DDD5CB}
body.light .sidebar h3{color:#8C837D}
body.light .type-filters button{border-color:#C9BDB2;color:#5A524D}
body.light .type-filters button.active{background:#2e75b6;color:white;border-color:#2e75b6}
body.light .q-list li{color:#5A524D}
body.light .q-list li:hover{background:#E8DDD4;color:#2D2A26}
body.light .q-list li.active{background:#DBEAFE;border-left-color:#2e75b6;color:#1B5FAF}
body.light .question-card{background:#FFFFFF;border-color:#DDD5CB}
body.light .q-number{color:#8C837D}
body.light .q-text{color:#1A1714}
body.light .q-text code{background:#F0E8DF;color:#92400e}
body.light .q-text pre{background:#F0E8DF;border-color:#DDD5CB;color:#92400e}
body.light .q-word-target{color:#8C837D}
body.light .hint-toggle{border-color:#C9BDB2;color:#92400e}
body.light .hint-toggle:hover{background:#FFF7ED;border-color:#D97706}
body.light .hint-strategy{background:#FFF7ED;border-left-color:#D97706;color:#92400e}
body.light .hint-scaffold{background:#F0FDF4;border-left-color:#166534;color:#14532d}
body.light .answer-area label{color:#5A524D}
body.light .answer-area textarea{background:#FFFFFF;border-color:#C9BDB2;color:#2D2A26}
body.light .answer-area textarea:focus{border-color:#2e75b6}
body.light .answer-area .meta{color:#8C837D}
body.light .grade-result{background:#FFF7ED;border-color:#DDD5CB}
body.light .grade-score .sn{color:#1B5FAF}
body.light .grade-score .st{color:#8C837D}
body.light .grade-feedback{color:#3D3630}

body.light .model-answer h4{color:#166534}
body.light .history-section{border-top-color:#DDD5CB}
body.light .history-section h4{color:#5A524D}
body.light .history-item{background:#FFFFFF;border-color:#DDD5CB;color:#3D3630}
body.light .h-date{color:#8C837D}
body.light .h-score{color:#1B5FAF}
body.light .modal{background:#F0E8DF;border-color:#C9BDB2}
body.light .modal h3{color:#1B5FAF}
body.light .modal input{background:#FFFFFF;border-color:#C9BDB2;color:#2D2A26}

.theme-btn{background:none;border:1px solid #475569;border-radius:8px;padding:3px 8px;cursor:pointer;font-size:15px;line-height:1.4;color:inherit;transition:border-color .2s}
.theme-btn:hover{border-color:#93c5fd}

body.light .theme-btn:hover{border-color:#1B5FAF}
</style>
</head>
<body>
<div class="header">
  <h1>COREME Short Answer Practice + AI Grading</h1>
  <div class="header-right">
    <span class="api-status no" id="apiStatus" onclick="showApiModal()">Set API Key</span>
    <button class="btn btn-gray" onclick="exportHistory()">Export</button>
    <button class="theme-btn" id="themeToggle" onclick="toggleTheme()" title="Toggle light/dark mode">🌙</button>
  </div>
</div>
<div class="sidebar">
  <h3>Questions</h3>
  <div class="type-filters" id="typeFilters"></div>
  <ul class="q-list" id="qList"></ul>
</div>
<div class="main" id="mainArea"></div>
<div class="modal-overlay" id="apiModal">
  <div class="modal">
    <h3>Anthropic API Key</h3>
    <p>Stored in localStorage only. Sent directly to Anthropic API, nowhere else.</p>
    <input type="password" id="apiKeyInput" placeholder="sk-ant-api03-...">
    <div class="modal-btns">
      <button class="btn btn-gray" onclick="closeApiModal()">Cancel</button>
      <button class="btn btn-blue" onclick="saveApiKey()">Save</button>
    </div>
  </div>
</div>
<script>
const Q = [
// === Type A: 判斷+解釋 (12) ===
{id:1,t:"A",w:"W3",title:"NOIR: Political party",q:"What level of measurement describes 'political party affiliation' (KMT, DPP, TPP, none)?",h1:"📖 NOIR 四層次：Nominal（名義＝分類無順序）、Ordinal（順序＝有排序但間距不等）、Interval（等距＝間距相等無絕對零點）、Ratio（比率＝有絕對零點）。\n\n判斷四特性：分類？順序？等距？絕對零點？",h2:'This is ___ level because it only ___. There is no ___ among categories.',m:"This is nominal level because it only categorizes respondents into groups. There is no inherent order — KMT is not 'higher' than DPP.",r:"Correct level (1pt) + explanation (1pt) = 2"},
{id:2,t:"A",w:"W3",title:"NOIR: Likert scale",q:"What level of measurement is a 5-point Likert scale (1=Strongly disagree to 5=Strongly agree)?",h1:"📖 NOIR 四層次：Nominal（分類）→ Ordinal（排序）→ Interval（等距）→ Ratio（絕對零點）。Likert 量表在課程中當作 interval 處理。\n\n課程中怎麼處理 Likert？有爭議嗎？",h2:'This is typically treated as ___ level because we assume ___.',m:"This is typically treated as interval level because we assume equal spacing between scale points. However, some argue it is ordinal. In this course, we treat it as interval.",r:"Correct level (1pt) + explanation (1pt) = 2"},
{id:3,t:"A",w:"W3",title:"NOIR: Monthly income",q:"What level of measurement is 'monthly income in NTD'?",h1:"📖 Ratio 層次有「絕對零點」——0 代表完全沒有。Income 0元＝沒收入、Age 0歲＝剛出生。攝氏 0°C 不是「沒有溫度」所以是 Interval。\n\n有沒有絕對零點？0 元代表什麼？",h2:'This is ___ level because it has ___. Zero NTD means ___.',m:"This is ratio level because it has an absolute zero point. Zero NTD means no income. We can say someone earns twice as much as another.",r:"Correct level (1pt) + explanation (1pt) = 2"},
{id:4,t:"A",w:"W2",title:"Directional vs nondirectional H",q:"Is this hypothesis directional or nondirectional? 'There will be a positive correlation between social media use and political knowledge.'",h1:"📖 Directional hypothesis 明確預測方向（如「正相關」「較高」）；Nondirectional 只說「有關係」不指方向。\n\n有沒有指出方向（正/負/高/低）？",h2:'This is a ___ hypothesis because it explicitly predicts ___.',m:"This is a directional hypothesis because it explicitly predicts a positive correlation. A nondirectional version would say 'there is a relationship' without specifying the direction.",r:"Correct identification (1pt) + explanation (1pt) = 2"},
{id:5,t:"A",w:"W2",title:"Hypothesis or RQ?",q:"A researcher wants to explore how Taiwanese journalists perceive AI tools but has found very little existing research. Should they use a hypothesis or a research question? Why?",h1:"📖 Hypothesis＝預測特定方向的關係（需要理論支持）。RQ＝開放式問題（用於文獻不足、探索性研究）。\n\n文獻不足的時候用哪個？",h2:'The researcher should use a ___ because ___. When little is known, it is premature to ___.',m:"The researcher should use a research question (RQ) because there is little existing literature to support a specific prediction. When little is known, it is premature to formulate a directional hypothesis.",r:"Correct choice (1pt) + reasoning (1pt) = 2"},
{id:6,t:"A",w:"W3",title:"Face validity example",q:"A researcher measures 'religiosity' by counting how often a person attends religious services. What type of validity does this demonstrate? Why is it considered the weakest form?",h1:"📖 效度四類型：Face（看起來合理）→ Content（涵蓋全部範圍）→ Criterion（預測外部標準）→ Construct（收斂＋區辨）。Face validity 最弱因為只靠直覺。\n\n這個指標「看起來」合不合理？為什麼最弱？",h2:'This demonstrates ___ validity because the indicator ___. It is the weakest because ___.',m:"This demonstrates face validity because the indicator appears reasonable on its face. It is the weakest because 'looking reasonable' does not guarantee the measure actually captures the full concept — someone could be deeply religious but never attend services.",r:"Correct type (1pt) + why weakest (1pt) = 2"},
{id:7,t:"A",w:"W2",title:"Identify IV/DV",q:"In the hypothesis 'Negative campaign messages on Facebook lead to higher willingness to share the post,' what is the IV and what is the DV?",h1:"📖 IV (Independent Variable) ＝研究者操弄或用來分組的變數。DV (Dependent Variable) ＝受影響的結果變數。\n\n誰被操弄？誰受影響？",h2:'The IV is ___. The DV is ___.',m:"The IV is the type of campaign message (negative vs. non-negative). The DV is willingness to share the post.",r:"IV correct (1pt) + DV correct (1pt) = 2"},
{id:8,t:"A",w:"W2",title:"Identify unit of analysis",q:"In a study analyzing how different newspapers cover climate change, what is the unit of analysis?",h1:"📖 Unit of analysis ＝你在分析的「個體」層級。可以是個人、組織、國家、文章、推文等。\n\n你在分析的「個體」是什麼？是人？報紙？國家？",h2:'The unit of analysis is ___.',m:"The unit of analysis is newspapers (or newspaper articles, depending on the design). The researcher compares coverage across different newspaper organizations.",r:"Correct unit (1pt) + brief explanation (1pt) = 2"},
{id:9,t:"A",w:"W4",title:"Identify bias type",q:"A researcher surveys people using an online form shared only on PTT and Dcard. Many older adults are excluded. What type of bias is this?",h1:"📖 Total Survey Error = Representation errors（誰回答）+ Measurement errors（怎麼問）。Representation 包括：Coverage bias（抽樣框不完整）、Sampling error、Nonresponse bias。\n\n是誰被排除了？問題出在抽樣框還是問卷？",h2:'This is ___ bias because the sampling frame ___.',m:"This is coverage bias because the sampling frame (PTT/Dcard users) does not cover the full target population — older adults who don't use these platforms are systematically excluded.",r:"Correct bias type (1pt) + explanation (1pt) = 2"},
{id:10,t:"A",w:"W2",title:"Correlation vs causation",q:"A survey finds that people who use TikTok more frequently have more positive attitudes toward China. Can the researcher claim TikTok causes positive attitudes? Why or why not?",h1:"📖 因果關係三要件：(1) Association 關聯 (2) Direction of influence 時間順序 (3) Elimination of rival explanations 排除替代解釋。只有實驗（有隨機分配）能同時滿足三者。\n\n這是問卷調查還是實驗？有沒有隨機分配？",h2:'No, because this is a ___ study, not an ___. Without ___, we cannot ___. There may be ___.',m:"No, because this is a survey (correlational study), not an experiment. Without random assignment and manipulation, we cannot establish causation. There may be third variables (e.g., age, political orientation) that explain both.",r:"Correct answer (1pt) + reasoning (1pt) = 2"},
{id:11,t:"A",w:"W4",title:"Double-barreled Q",q:'Is this a good survey question? "The government should ban TikTok AND invest more in domestic social media platforms." Why or why not?',h1:"📖 Double-barreled question ＝一個問題問兩件事。受訪者可能同意一個但不同意另一個，無法分別回答。解決：拆成兩題。\n\n一個問題問了幾件事？受訪者同意一個但不同意另一個怎麼辦？",h2:'This is a ___ question because it ___. The respondent might ___. It should be ___.',m:"This is a double-barreled question because it asks about two things at once (banning TikTok AND investing in domestic platforms). A respondent might agree with one but not the other. It should be split into two separate questions.",r:"Identify problem (1pt) + solution (1pt) = 2"},
{id:12,t:"A",w:"W2",title:"Deductive or inductive?",q:"A researcher starts by interviewing 15 Taiwanese influencers, identifies patterns in their responses, and develops a new framework. Is this deductive or inductive?",h1:"📖 Deductive（演繹）：Theory → Hypothesis → Observation → Test（一般→特殊，量化）。Inductive（歸納）：Observation → Pattern → Tentative conclusion → Theory（特殊→一般，質化）。\n\n從觀察出發還是從理論出發？",h2:'This is the ___ approach because the researcher starts with ___ and moves toward ___.',m:"This is the inductive approach because the researcher starts with specific observations (interviews), identifies patterns, and moves toward building a general framework/theory. Deductive would start with an existing theory and test specific hypotheses.",r:"Correct identification (1pt) + explanation (1pt) = 2"},

// === Type B: 簡答 (18) ===
{id:13,t:"B",w:"W2",title:"Popper's falsification",q:"Describe Karl Popper's main contribution to the philosophy of science. Give one example.",h1:"📖 Karl Popper 提出 Falsification（否證論）：科學理論必須是可被否證的。名言：看到再多白天鵝也不能證明所有天鵝都是白的，但一隻黑天鵝就能否證。\n\nPopper 的核心觀念是什麼？想想白天鵝和黑天鵝。",h2:'Popper proposed ___. His key idea is that scientific theories must be ___. For example, ___.',m:"Popper proposed falsification — the idea that scientific theories must be capable of being proven wrong. We can never fully verify a universal claim, but one counterexample can disprove it. For example, no number of white swans proves 'all swans are white,' but one black swan disproves it.",r:"Core concept (2pts) + example (1pt) = 3"},
{id:14,t:"B",w:"W2",title:"Kuhn's paradigm shifts",q:"What did Thomas Kuhn propose about how science progresses? How does this apply to social science?",h1:"📖 Thomas Kuhn 提出 Scientific Revolutions（科學革命）和 Paradigm shifts（典範轉移）。正常科學 → 危機 → 革命 → 新典範。在社會科學中，競爭典範往往共存。Incommensurability ＝不同典範難以比較。\n\n正常科學 vs 科學革命？社會科學跟自然科學有什麼不同？",h2:'Kuhn proposed ___. He argued that science progresses through ___. In social science, ___.',m:"Kuhn proposed that science progresses through paradigm shifts — periods of 'normal science' within a paradigm, followed by crises and revolutions that establish new paradigms. In social science, competing paradigms often coexist rather than one fully replacing another.",r:"Core concept (2pts) + social science application (1pt) = 3"},
{id:15,t:"B",w:"W2",title:"Ecological fallacy",q:"What is the ecological fallacy? Give the example from the slides.",h1:"📖 Ecological fallacy ＝把群體層次的結論套用到個體。簡報實例：美國各州 foreign-born vs high-income 相關 .52，但個人層次只有 -.01。\n\n群體層次 vs 個人層次的相關。記得那個 .52 vs -.01 的數據。",h2:'The ecological fallacy occurs when ___. For example, ___. At the state level ___, but at the individual level ___.',m:"The ecological fallacy occurs when group-level conclusions are applied to individuals. For example, US state-level data shows a correlation of .52 between fraction foreign-born and fraction high-income. But at the individual level, the correlation is only -.01. You cannot assume foreign-born individuals have high income just because states with more immigrants also have more high earners.",r:"Definition (1pt) + example with data (2pts) = 3"},
{id:16,t:"B",w:"W3",title:"Conceptualization process",q:"Describe the four steps from abstract concept to concrete measurement.",h1:"📖 從抽象到具體四步驟：Concept（概念）→ Dimensions（面向）→ Indicators（指標）→ Operational definition（操作定義）。\n\n從最抽象到最具體：Concept → ? → ? → ?",h2:'The process goes from abstract to concrete: (1) ___, (2) ___, (3) ___, (4) ___.',m:"The process goes from abstract to concrete: (1) Concept — the abstract mental construct (e.g., 'social capital'), (2) Dimensions — specifiable aspects (e.g., bridging vs. bonding), (3) Indicators — observable items selected to reflect the variable, (4) Operational definition — how research operations specify values (e.g., a 5-item survey scale).",r:"All 4 steps correct (2pts) + example (1pt) = 3"},
{id:17,t:"B",w:"W3",title:"Cronbach's alpha",q:"What does Cronbach's alpha measure? What is the acceptable threshold? Give the example from the slides.",h1:"📖 Cronbach's alpha 測量 Internal consistency（內部一致性）——量表中各題是否在測類似的東西。門檻 α ≥ 0.7。簡報例：Jungherr & Rauchfleisch (2024) α = 0.86。\n\n內部一致性。門檻是多少？Jungherr & Rauchfleisch 的量表。",h2:"Cronbach's alpha measures ___. A value of ___ or higher is considered acceptable. For example, ___.",m:"Cronbach's alpha measures internal consistency — whether all items in a scale measure similar things. A value of 0.7 or higher is considered acceptable. For example, Jungherr & Rauchfleisch (2024) found alpha = 0.86 for their 3-item 'support for regulation' scale.",r:"Definition (1pt) + threshold (1pt) + example (1pt) = 3"},
{id:18,t:"B",w:"W3",title:"Convergent vs discriminant validity",q:"Explain convergent validity and discriminant validity. Give one example of each from the slides.",h1:"📖 Construct validity 的兩面：Convergent（收斂）＝理論上相關的概念測量上也相關（政治知識↔政治興趣）。Discriminant（區辨）＝理論上不相關的概念測量上也不相關（政治知識↔食物偏好）。\n\n相關概念應該相關，不相關概念不應該相關。想想政治知識。",h2:'Convergent validity means ___. For example, ___. Discriminant validity means ___. For example, ___.',m:"Convergent validity means theoretically related concepts should be correlated in measurement. For example, political knowledge correlates with political interest. Discriminant validity means theoretically unrelated concepts should not correlate. For example, political knowledge does not correlate with food preference.",r:"Convergent definition + example (1.5pts) + Discriminant definition + example (1.5pts) = 3"},
{id:19,t:"B",w:"W3",title:"Reliability vs validity relationship",q:"What is the relationship between reliability and validity? Can a measure be reliable but not valid?",h1:"📖 Reliability＝一致性（consistency），重複測量得到相同結果。Validity＝準確性，測量是否測到你想測的東西。高信度不保證高效度（可以一致地測錯東西），高效度需要高信度。\n\n高信度不保證高效度。想想用體重計量身高的比喻。",h2:'High reliability does not guarantee ___. However, high validity requires ___. For example, ___.',m:"High reliability does not guarantee high validity — you can consistently measure the wrong thing. However, high validity requires high reliability — inconsistent measurements cannot be accurate. For example, a broken scale that always shows 70kg is reliable but not valid if you weigh 60kg.",r:"Relationship (1.5pts) + example (1.5pts) = 3"},
{id:20,t:"B",w:"W4",title:"Confidence interval interpretation",q:"What is the correct interpretation of a 95% confidence interval? What is the common WRONG interpretation?",h1:"📖 95% CI 正確解讀：「重複抽樣 100 次，約 95 個信賴區間會包含真正的母體參數。」錯誤：「有 95% 機率真值在區間內。」真值是固定的，不是機率。\n\n不是「95% 機率真值在區間內」。想想重複 100 次。",h2:'The correct interpretation is: if we ___. The WRONG interpretation is ___.',m:"Correct: If we replicated the same survey 100 times, roughly 95 of the confidence intervals would contain the true population parameter. WRONG: 'There is a 95% probability that the true value falls in this interval.' The true value is fixed — it either is or isn't in the interval.",r:"Correct interpretation (1.5pts) + wrong interpretation (1.5pts) = 3"},
{id:21,t:"B",w:"W4",title:"Literary Digest 1936",q:"Why did the Literary Digest 1936 election prediction fail? What type of bias caused it?",h1:"📖 Literary Digest 1936：用電話簿和汽車登記名冊寄 10M 選票 → 2.4M 回覆 → 預測 Landon 贏 → 大錯。原因：Coverage bias（1936 年有車有電話＝富裕＝偏共和黨）。\n\n用什麼名冊寄選票？1936 年有車有電話的是什麼人？",h2:'The Literary Digest sent ___ based on ___. This caused ___ bias because in 1936, ___.',m:"The Literary Digest sent 10 million ballots using telephone directories and automobile registration records. They got 2.4 million replies predicting Landon would win — he lost badly. This was coverage bias: in 1936, people with telephones and cars were wealthier and more likely Republican. The sampling frame did not cover lower-income voters.",r:"What happened (1pt) + bias type (1pt) + explanation (1pt) = 3"},
{id:22,t:"B",w:"W5",title:"Randomization purpose",q:"What is the purpose of random assignment in experiments? Why is it essential for causal claims?",h1:"📖 Random assignment 確保各組在治療前平均等同（性別比例、年齡等）。目的：排除替代解釋（因果三要件之三），讓差異可歸因於 treatment。\n\n隨機分配確保什麼？沒有它就不能做什麼聲稱？",h2:'Random assignment ensures that groups are ___. This is essential because without it, we cannot ___.',m:"Random assignment ensures that experimental groups are equivalent on average before treatment — same proportion of gender, age, etc. This is essential because it eliminates plausible rival explanations (the third requirement for causation). Without it, observed differences could be due to pre-existing group differences rather than the treatment.",r:"Purpose (1.5pts) + link to causation (1.5pts) = 3"},
{id:23,t:"B",w:"W5",title:"Internal vs external validity",q:"What is the difference between internal and external validity in experiments?",h1:"📖 Internal validity＝實驗結論是否準確反映實驗中發生的事。External validity＝結果能否推論到真實世界。實驗通常 internal 高（控制嚴格）但 external 低（實驗室≠真實生活）。\n\n一個問「實驗裡面準不準」，一個問「推論到外面行不行」。",h2:'Internal validity refers to ___. External validity refers to ___. Experiments typically have high ___ but low ___.',m:"Internal validity refers to whether the experimental conclusions accurately reflect what happened in the experiment. External validity refers to whether results can be generalized to the real world. Experiments typically have high internal validity (tight control) but low external validity (lab settings differ from everyday life).",r:"Internal definition (1pt) + External definition (1pt) + tradeoff (1pt) = 3"},
{id:24,t:"B",w:"W5",title:"Experimental realism vs mundane",q:"What is the difference between experimental realism and mundane realism? Which one did the instructor say is more important?",h1:"📖 Experimental realism＝受試者是否認真投入實驗（更重要）。Mundane realism＝實驗情境是否類似日常生活。Aronson et al. (1985)：「realistic if the situation is involving to the subjects.」\n\n受試者有沒有認真對待 vs 像不像日常生活。",h2:'Experimental realism means ___. Mundane realism means ___. The instructor emphasized that ___ is more important.',m:"Experimental realism means the situation is involving to subjects and they take it seriously. Mundane realism means the research setting resembles everyday life. The instructor emphasized experimental realism is more important — as long as participants engage seriously, the findings are meaningful even if the setting is artificial.",r:"Experimental realism (1pt) + Mundane realism (1pt) + which more important (1pt) = 3"},
{id:25,t:"B",w:"W6",title:"Codebook purpose",q:"What is a codebook in content analysis? What does it do?",h1:"📖 Codebook＝編碼者的指導手冊。定義每個變數和類別、連結非結構化資料→結構化資料、記錄研究過程。用 LLM 做自動分析時，prompt ≈ codebook。\n\n編碼簿＝編碼者的說明書。連結什麼和什麼？",h2:'A codebook ___. It guides ___. It links ___.',m:"A codebook guides coders on how to code content. It defines every variable, category, and coding instruction. It links unstructured data (raw text, images, videos) to structured data (numbers and categories in a spreadsheet). If using LLMs for automated content analysis, the prompt essentially serves as the codebook.",r:"Definition (1pt) + function (1pt) + link explanation (1pt) = 3"},
{id:26,t:"B",w:"W6",title:"Krippendorff's alpha",q:"Why is Krippendorff's alpha better than percentage agreement for measuring intercoder reliability?",h1:"📖 Krippendorff's alpha 考慮 chance agreement（偶然一致性）。百分比一致性不考慮——二分類 50/50 隨機猜就有 50%。公式：α = 1 - (D_observed / D_expected)。門檻 ≥ 0.67。\n\n百分比一致性沒考慮什麼？二分類 50/50 隨機猜就有多少一致性？",h2:"Percentage agreement does not account for ___. For example, ___. Krippendorff's alpha corrects for this by ___.",m:"Percentage agreement does not account for chance agreement. For example, with a dichotomous variable (yes/no) and 50/50 distribution, random guessing produces 50% agreement. Krippendorff's alpha corrects for this by comparing observed disagreement to expected disagreement by chance. The threshold is alpha >= 0.67.",r:"Why % is insufficient (1pt) + example (1pt) + alpha explanation (1pt) = 3"},
{id:27,t:"B",w:"W4",title:"Post-stratification",q:"How did Wang et al. (2015) use a biased Xbox sample to correctly predict the 2012 US election?",h1:"📖 Wang et al. (2015) 用 Xbox 使用者（65% 是 18-29 歲、93% 男性）預測選舉。關鍵技術：Post-stratification（事後分層）——分成 176,256 組加權。\n\n樣本偏差有多大？用什麼技術修正？",h2:'The Xbox sample was biased: ___. Wang et al. used ___ to correct this by ___.',m:"The Xbox sample was heavily biased — 65% were 18-29 (vs 19% of electorate), 93% male (vs 47%). Wang et al. used post-stratification: dividing 345,858 participants into 176,256 groups by demographics, estimating each group's preference, then computing a weighted average to match the actual electorate.",r:"Bias described (1pt) + technique (1pt) + how it works (1pt) = 3"},
{id:28,t:"B",w:"W5",title:"WEIRD problem",q:"What does WEIRD stand for? Why is it a problem for research?",h1:"📖 WEIRD = Western, Educated, Industrialized, Rich, Democratic。大量研究樣本來自這類人群（特別是美國大學生），無法代表全球人口，限制 external validity。\n\n這五個字母代表什麼？為什麼影響外部效度？",h2:'WEIRD stands for ___. This is problematic because ___.',m:"WEIRD stands for Western, Educated, Industrialized, Rich, Democratic. Most psychology and social science research uses samples from these populations (especially US college students), but they represent a small fraction of humanity. Findings may not generalize to other cultures, limiting external validity.",r:"Acronym (1pt) + why problematic (2pts) = 3"},
{id:29,t:"B",w:"W6",title:"Manifest vs latent coding",q:"What is the difference between manifest and latent coding in content analysis?",h1:"📖 Manifest coding＝直接可見的內容（詞彙頻率），信度高，適合自動分析。Latent coding＝抽象含義（框架、情感），需要更多解讀，效度可能更高。\n\n一個看得見（詞彙頻率），一個看不見（框架、情感）。",h2:'Manifest coding focuses on ___. Latent coding focuses on ___. Manifest is easier to ___ while latent requires ___.',m:"Manifest coding focuses on directly visible, surface-level content (e.g., counting specific word frequencies). Latent coding focuses on abstract underlying meanings (e.g., identifying frames or sentiment). Manifest is easier to automate and has higher reliability, while latent requires more interpretation but may have higher validity.",r:"Manifest definition (1pt) + Latent definition (1pt) + comparison (1pt) = 3"},
{id:30,t:"B",w:"W1",title:"Three perspectives",q:"Name the three perspectives in communication research and briefly describe each.",h1:"📖 三種觀點：Social scientific（經驗觀察、量化/質化）、Rhetorical（語言說服、個案研究）、Critical（揭露權力結構）。本課程主要教社會科學觀點。\n\n社會科學、修辭學、批判。各自關注什麼？",h2:'The three perspectives are: (1) ___, which focuses on ___; (2) ___, which focuses on ___; (3) ___, which focuses on ___.',m:"(1) Social scientific — uses empirical observation with quantitative/qualitative methods to study communication systematically. (2) Rhetorical — focuses on how language is used to persuade, typically through case studies. (3) Critical — exposes hidden assumptions and power structures that serve certain interests.",r:"Each perspective: name + description (1pt each) = 3"},

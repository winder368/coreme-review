<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>COREME Short Answer Practice — AI Grading</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI','Microsoft JhengHei',sans-serif;background:#0f172a;color:#e2e8f0;min-height:100vh}
.header{background:#1e293b;padding:14px 20px;border-bottom:2px solid #2e75b6;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px}
.header h1{font-size:17px;color:#93c5fd}
.header-right{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.api-status{font-size:11px;padding:3px 10px;border-radius:12px;cursor:pointer}
.api-status.ok{background:#14532d;color:#4ade80}
.api-status.no{background:#450a0a;color:#f87171}
.btn{padding:5px 12px;border:none;border-radius:8px;cursor:pointer;font-size:12px;transition:all .15s}
.btn-blue{background:#2e75b6;color:#fff}.btn-blue:hover{background:#3b82f6}
.btn-gray{background:#475569;color:#e2e8f0}.btn-gray:hover{background:#64748b}
.btn-green{background:#14532d;color:#86efac}.btn-green:hover{background:#166534}

.sidebar{position:fixed;left:0;top:0;width:260px;height:100vh;background:#1e293b;border-right:1px solid #334155;overflow-y:auto;padding-top:60px;z-index:10}
.sidebar h3{padding:10px 14px 6px;font-size:12px;color:#64748b;text-transform:uppercase;letter-spacing:1px}
.type-filters{padding:4px 14px 8px;display:flex;gap:4px;flex-wrap:wrap}
.type-filters button{padding:3px 8px;border:1px solid #475569;border-radius:10px;background:transparent;color:#94a3b8;cursor:pointer;font-size:11px}
.type-filters button.active{background:#2e75b6;color:white;border-color:#2e75b6}
.q-list{list-style:none}
.q-list li{padding:8px 14px;cursor:pointer;font-size:12px;line-height:1.4;border-left:3px solid transparent;transition:all .1s;color:#94a3b8}
.q-list li:hover{background:#334155;color:#e2e8f0}
.q-list li.active{background:#1e3a5f;border-left-color:#2e75b6;color:#93c5fd}
.q-badge{display:inline-block;font-size:9px;padding:1px 5px;border-radius:6px;margin-left:3px}
.q-badge.graded{background:#14532d;color:#4ade80}
.q-badge.draft{background:#78350f;color:#fbbf24}
.type-tag{font-size:9px;padding:1px 5px;border-radius:4px;margin-right:4px;font-weight:bold}
.type-tag.A{background:#1e3a5f;color:#93c5fd}
.type-tag.B{background:#1a2e1a;color:#86efac}
.type-tag.C{background:#2e1a2e;color:#d8b4fe}
.type-tag.D{background:#2e2a1a;color:#fbbf24}

.main{margin-left:260px;padding:20px;max-width:860px}
.question-card{background:#1a2332;border:1px solid #334155;border-radius:12px;padding:20px;margin-bottom:16px}
.q-header{display:flex;align-items:center;gap:8px;margin-bottom:4px}
.q-number{font-size:11px;color:#64748b}
.q-week{font-size:10px;padding:2px 7px;border-radius:8px;background:#2e75b6;color:#fff}
.q-text{font-size:16px;line-height:1.7;color:#f1f5f9;margin:12px 0;white-space:pre-wrap}
.q-text code,.q-text pre{font-family:Consolas,'Courier New',monospace;background:#0f172a;padding:2px 6px;border-radius:4px;font-size:13px;color:#fbbf24}
.q-text pre{display:block;padding:12px;margin:8px 0;border:1px solid #334155;overflow-x:auto;white-space:pre}
.q-word-target{font-size:12px;color:#64748b;margin-bottom:12px}

.hint-section{margin-bottom:14px}
.hint-toggle{background:none;border:1px solid #475569;border-radius:8px;padding:6px 12px;color:#f59e0b;cursor:pointer;font-size:13px;transition:all .15s}
.hint-toggle:hover{background:#2e2a1a;border-color:#f59e0b}
.hint-box{display:none;margin-top:10px;border-radius:10px;overflow:hidden;animation:fadeIn .3s}
.hint-box.show{display:block}
.hint-strategy{background:#1a1a0f;border-left:3px solid #f59e0b;padding:10px 14px;font-size:13px;color:#fbbf24;line-height:1.5}
.hint-scaffold{background:#0f1a0f;border-left:3px solid #4ade80;padding:10px 14px;font-size:13px;color:#86efac;line-height:1.6;font-family:Consolas,'Courier New',monospace;white-space:pre-wrap}

.answer-area{margin-bottom:14px}
.answer-area label{font-size:13px;color:#94a3b8;display:block;margin-bottom:4px}
.answer-area textarea{width:100%;min-height:120px;background:#0f172a;border:1px solid #475569;border-radius:10px;padding:12px;color:#e2e8f0;font-size:14px;line-height:1.6;resize:vertical;font-family:inherit}
.answer-area textarea:focus{outline:none;border-color:#60a5fa}
.answer-area .meta{display:flex;justify-content:space-between;font-size:11px;color:#64748b;margin-top:3px}

.action-bar{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap}
.grade-result{background:#0c1a2e;border:1px solid #1e3a5f;border-radius:10px;padding:16px;margin-bottom:14px;display:none}
.grade-result.show{display:block;animation:fadeIn .3s}
.grade-score{font-size:32px;font-weight:bold;text-align:center;margin-bottom:10px}
.grade-score .sn{color:#60a5fa}.grade-score .st{color:#64748b;font-size:18px}
.grade-feedback{font-size:14px;line-height:1.7;color:#d1d5db;white-space:pre-wrap}

.model-answer{background:#0f172a;border:1px solid #334155;border-radius:8px;padding:14px;margin-top:14px;display:none;font-size:14px;line-height:1.6;color:#d1d5db}
.model-answer.show{display:block}
.model-answer h4{color:#4ade80;margin-bottom:6px;font-size:13px}

.history-section{margin-top:20px;border-top:1px solid #334155;padding-top:14px}
.history-section h4{color:#94a3b8;font-size:13px;margin-bottom:10px}
.history-item{background:#1a2332;border:1px solid #334155;border-radius:6px;padding:10px;margin-bottom:6px;font-size:12px}
.h-date{color:#64748b;font-size:10px}.h-score{color:#60a5fa;font-weight:bold}

.loading{text-align:center;padding:16px;color:#94a3b8}
.spinner{display:inline-block;width:20px;height:20px;border:2px solid #334155;border-top-color:#60a5fa;border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.6);z-index:100;display:none;align-items:center;justify-content:center}
.modal-overlay.show{display:flex}
.modal{background:#1e293b;border:1px solid #475569;border-radius:12px;padding:20px;width:90%;max-width:400px}
.modal h3{color:#93c5fd;margin-bottom:10px;font-size:16px}
.modal input{width:100%;padding:8px;background:#0f172a;border:1px solid #475569;border-radius:8px;color:#e2e8f0;font-size:13px;margin-bottom:10px}
.modal input:focus{outline:none;border-color:#60a5fa}
.modal .modal-btns{display:flex;gap:6px;justify-content:flex-end}
.modal p{font-size:12px;color:#94a3b8;margin-bottom:10px;line-height:1.4}

@media(max-width:768px){.sidebar{position:relative;width:100%;height:auto;max-height:180px;padding-top:0}.main{margin-left:0}}
</style>
</head>
<body>
<div class="header">
  <h1>COREME Short Answer Practice + AI Grading</h1>
  <div class="header-right">
    <span class="api-status no" id="apiStatus" onclick="showApiModal()">Set API Key</span>
    <button class="btn btn-gray" onclick="exportHistory()">Export</button>
  </div>
</div>
<div class="sidebar">
  <h3>Questions</h3>
  <div class="type-filters" id="typeFilters"></div>
  <ul class="q-list" id="qList"></ul>
</div>
<div class="main" id="mainArea"></div>
<div class="modal-overlay" id="apiModal">
  <div class="modal">
    <h3>Anthropic API Key</h3>
    <p>Stored in localStorage only. Sent directly to Anthropic API, nowhere else.</p>
    <input type="password" id="apiKeyInput" placeholder="sk-ant-api03-...">
    <div class="modal-btns">
      <button class="btn btn-gray" onclick="closeApiModal()">Cancel</button>
      <button class="btn btn-blue" onclick="saveApiKey()">Save</button>
    </div>
  </div>
</div>
<script>
const Q = [
// === Type A: 判斷+解釋 (12) ===
{id:1,t:"A",w:"W3",title:"NOIR: Political party",q:"What level of measurement describes 'political party affiliation' (KMT, DPP, TPP, none)?",h1:"判斷四特性：分類？順序？等距？絕對零點？",h2:'This is ___ level because it only ___. There is no ___ among categories.',m:"This is nominal level because it only categorizes respondents into groups. There is no inherent order — KMT is not 'higher' than DPP.",r:"Correct level (1pt) + explanation (1pt) = 2"},
{id:2,t:"A",w:"W3",title:"NOIR: Likert scale",q:"What level of measurement is a 5-point Likert scale (1=Strongly disagree to 5=Strongly agree)?",h1:"課程中怎麼處理 Likert？有爭議嗎？",h2:'This is typically treated as ___ level because we assume ___.',m:"This is typically treated as interval level because we assume equal spacing between scale points. However, some argue it is ordinal. In this course, we treat it as interval.",r:"Correct level (1pt) + explanation (1pt) = 2"},
{id:3,t:"A",w:"W3",title:"NOIR: Monthly income",q:"What level of measurement is 'monthly income in NTD'?",h1:"有沒有絕對零點？0 元代表什麼？",h2:'This is ___ level because it has ___. Zero NTD means ___.',m:"This is ratio level because it has an absolute zero point. Zero NTD means no income. We can say someone earns twice as much as another.",r:"Correct level (1pt) + explanation (1pt) = 2"},
{id:4,t:"A",w:"W2",title:"Directional vs nondirectional H",q:"Is this hypothesis directional or nondirectional? 'There will be a positive correlation between social media use and political knowledge.'",h1:"有沒有指出方向（正/負/高/低）？",h2:'This is a ___ hypothesis because it explicitly predicts ___.',m:"This is a directional hypothesis because it explicitly predicts a positive correlation. A nondirectional version would say 'there is a relationship' without specifying the direction.",r:"Correct identification (1pt) + explanation (1pt) = 2"},
{id:5,t:"A",w:"W2",title:"Hypothesis or RQ?",q:"A researcher wants to explore how Taiwanese journalists perceive AI tools but has found very little existing research. Should they use a hypothesis or a research question? Why?",h1:"文獻不足的時候用哪個？",h2:'The researcher should use a ___ because ___. When little is known, it is premature to ___.',m:"The researcher should use a research question (RQ) because there is little existing literature to support a specific prediction. When little is known, it is premature to formulate a directional hypothesis.",r:"Correct choice (1pt) + reasoning (1pt) = 2"},
{id:6,t:"A",w:"W3",title:"Face validity example",q:"A researcher measures 'religiosity' by counting how often a person attends religious services. What type of validity does this demonstrate? Why is it considered the weakest form?",h1:"這個指標「看起來」合不合理？為什麼最弱？",h2:'This demonstrates ___ validity because the indicator ___. It is the weakest because ___.',m:"This demonstrates face validity because the indicator appears reasonable on its face. It is the weakest because 'looking reasonable' does not guarantee the measure actually captures the full concept — someone could be deeply religious but never attend services.",r:"Correct type (1pt) + why weakest (1pt) = 2"},
{id:7,t:"A",w:"W2",title:"Identify IV/DV",q:"In the hypothesis 'Negative campaign messages on Facebook lead to higher willingness to share the post,' what is the IV and what is the DV?",h1:"誰被操弄？誰受影響？",h2:'The IV is ___. The DV is ___.',m:"The IV is the type of campaign message (negative vs. non-negative). The DV is willingness to share the post.",r:"IV correct (1pt) + DV correct (1pt) = 2"},
{id:8,t:"A",w:"W2",title:"Identify unit of analysis",q:"In a study analyzing how different newspapers cover climate change, what is the unit of analysis?",h1:"你在分析的「個體」是什麼？是人？報紙？國家？",h2:'The unit of analysis is ___.',m:"The unit of analysis is newspapers (or newspaper articles, depending on the design). The researcher compares coverage across different newspaper organizations.",r:"Correct unit (1pt) + brief explanation (1pt) = 2"},
{id:9,t:"A",w:"W4",title:"Identify bias type",q:"A researcher surveys people using an online form shared only on PTT and Dcard. Many older adults are excluded. What type of bias is this?",h1:"是誰被排除了？問題出在抽樣框還是問卷？",h2:'This is ___ bias because the sampling frame ___.',m:"This is coverage bias because the sampling frame (PTT/Dcard users) does not cover the full target population — older adults who don't use these platforms are systematically excluded.",r:"Correct bias type (1pt) + explanation (1pt) = 2"},
{id:10,t:"A",w:"W2",title:"Correlation vs causation",q:"A survey finds that people who use TikTok more frequently have more positive attitudes toward China. Can the researcher claim TikTok causes positive attitudes? Why or why not?",h1:"這是問卷調查還是實驗？有沒有隨機分配？",h2:'No, because this is a ___ study, not an ___. Without ___, we cannot ___. There may be ___.',m:"No, because this is a survey (correlational study), not an experiment. Without random assignment and manipulation, we cannot establish causation. There may be third variables (e.g., age, political orientation) that explain both.",r:"Correct answer (1pt) + reasoning (1pt) = 2"},
{id:11,t:"A",w:"W4",title:"Double-barreled Q",q:'Is this a good survey question? "The government should ban TikTok AND invest more in domestic social media platforms." Why or why not?',h1:"一個問題問了幾件事？受訪者同意一個但不同意另一個怎麼辦？",h2:'This is a ___ question because it ___. The respondent might ___. It should be ___.',m:"This is a double-barreled question because it asks about two things at once (banning TikTok AND investing in domestic platforms). A respondent might agree with one but not the other. It should be split into two separate questions.",r:"Identify problem (1pt) + solution (1pt) = 2"},
{id:12,t:"A",w:"W2",title:"Deductive or inductive?",q:"A researcher starts by interviewing 15 Taiwanese influencers, identifies patterns in their responses, and develops a new framework. Is this deductive or inductive?",h1:"從觀察出發還是從理論出發？",h2:'This is the ___ approach because the researcher starts with ___ and moves toward ___.',m:"This is the inductive approach because the researcher starts with specific observations (interviews), identifies patterns, and moves toward building a general framework/theory. Deductive would start with an existing theory and test specific hypotheses.",r:"Correct identification (1pt) + explanation (1pt) = 2"},

// === Type B: 簡答 (18) ===
{id:13,t:"B",w:"W2",title:"Popper's falsification",q:"Describe Karl Popper's main contribution to the philosophy of science. Give one example.",h1:"Popper 的核心觀念是什麼？想想白天鵝和黑天鵝。",h2:'Popper proposed ___. His key idea is that scientific theories must be ___. For example, ___.',m:"Popper proposed falsification — the idea that scientific theories must be capable of being proven wrong. We can never fully verify a universal claim, but one counterexample can disprove it. For example, no number of white swans proves 'all swans are white,' but one black swan disproves it.",r:"Core concept (2pts) + example (1pt) = 3"},
{id:14,t:"B",w:"W2",title:"Kuhn's paradigm shifts",q:"What did Thomas Kuhn propose about how science progresses? How does this apply to social science?",h1:"正常科學 vs 科學革命？社會科學跟自然科學有什麼不同？",h2:'Kuhn proposed ___. He argued that science progresses through ___. In social science, ___.',m:"Kuhn proposed that science progresses through paradigm shifts — periods of 'normal science' within a paradigm, followed by crises and revolutions that establish new paradigms. In social science, competing paradigms often coexist rather than one fully replacing another.",r:"Core concept (2pts) + social science application (1pt) = 3"},
{id:15,t:"B",w:"W2",title:"Ecological fallacy",q:"What is the ecological fallacy? Give the example from the slides.",h1:"群體層次 vs 個人層次的相關。記得那個 .52 vs -.01 的數據。",h2:'The ecological fallacy occurs when ___. For example, ___. At the state level ___, but at the individual level ___.',m:"The ecological fallacy occurs when group-level conclusions are applied to individuals. For example, US state-level data shows a correlation of .52 between fraction foreign-born and fraction high-income. But at the individual level, the correlation is only -.01. You cannot assume foreign-born individuals have high income just because states with more immigrants also have more high earners.",r:"Definition (1pt) + example with data (2pts) = 3"},
{id:16,t:"B",w:"W3",title:"Conceptualization process",q:"Describe the four steps from abstract concept to concrete measurement.",h1:"從最抽象到最具體：Concept → ? → ? → ?",h2:'The process goes from abstract to concrete: (1) ___, (2) ___, (3) ___, (4) ___.',m:"The process goes from abstract to concrete: (1) Concept — the abstract mental construct (e.g., 'social capital'), (2) Dimensions — specifiable aspects (e.g., bridging vs. bonding), (3) Indicators — observable items selected to reflect the variable, (4) Operational definition — how research operations specify values (e.g., a 5-item survey scale).",r:"All 4 steps correct (2pts) + example (1pt) = 3"},
{id:17,t:"B",w:"W3",title:"Cronbach's alpha",q:"What does Cronbach's alpha measure? What is the acceptable threshold? Give the example from the slides.",h1:"內部一致性。門檻是多少？Jungherr & Rauchfleisch 的量表。",h2:"Cronbach's alpha measures ___. A value of ___ or higher is considered acceptable. For example, ___.",m:"Cronbach's alpha measures internal consistency — whether all items in a scale measure similar things. A value of 0.7 or higher is considered acceptable. For example, Jungherr & Rauchfleisch (2024) found alpha = 0.86 for their 3-item 'support for regulation' scale.",r:"Definition (1pt) + threshold (1pt) + example (1pt) = 3"},
{id:18,t:"B",w:"W3",title:"Convergent vs discriminant validity",q:"Explain convergent validity and discriminant validity. Give one example of each from the slides.",h1:"相關概念應該相關，不相關概念不應該相關。想想政治知識。",h2:'Convergent validity means ___. For example, ___. Discriminant validity means ___. For example, ___.',m:"Convergent validity means theoretically related concepts should be correlated in measurement. For example, political knowledge correlates with political interest. Discriminant validity means theoretically unrelated concepts should not correlate. For example, political knowledge does not correlate with food preference.",r:"Convergent definition + example (1.5pts) + Discriminant definition + example (1.5pts) = 3"},
{id:19,t:"B",w:"W3",title:"Reliability vs validity relationship",q:"What is the relationship between reliability and validity? Can a measure be reliable but not valid?",h1:"高信度不保證高效度。想想用體重計量身高的比喻。",h2:'High reliability does not guarantee ___. However, high validity requires ___. For example, ___.',m:"High reliability does not guarantee high validity — you can consistently measure the wrong thing. However, high validity requires high reliability — inconsistent measurements cannot be accurate. For example, a broken scale that always shows 70kg is reliable but not valid if you weigh 60kg.",r:"Relationship (1.5pts) + example (1.5pts) = 3"},
{id:20,t:"B",w:"W4",title:"Confidence interval interpretation",q:"What is the correct interpretation of a 95% confidence interval? What is the common WRONG interpretation?",h1:"不是「95% 機率真值在區間內」。想想重複 100 次。",h2:'The correct interpretation is: if we ___. The WRONG interpretation is ___.',m:"Correct: If we replicated the same survey 100 times, roughly 95 of the confidence intervals would contain the true population parameter. WRONG: 'There is a 95% probability that the true value falls in this interval.' The true value is fixed — it either is or isn't in the interval.",r:"Correct interpretation (1.5pts) + wrong interpretation (1.5pts) = 3"},
{id:21,t:"B",w:"W4",title:"Literary Digest 1936",q:"Why did the Literary Digest 1936 election prediction fail? What type of bias caused it?",h1:"用什麼名冊寄選票？1936 年有車有電話的是什麼人？",h2:'The Literary Digest sent ___ based on ___. This caused ___ bias because in 1936, ___.',m:"The Literary Digest sent 10 million ballots using telephone directories and automobile registration records. They got 2.4 million replies predicting Landon would win — he lost badly. This was coverage bias: in 1936, people with telephones and cars were wealthier and more likely Republican. The sampling frame did not cover lower-income voters.",r:"What happened (1pt) + bias type (1pt) + explanation (1pt) = 3"},
{id:22,t:"B",w:"W5",title:"Randomization purpose",q:"What is the purpose of random assignment in experiments? Why is it essential for causal claims?",h1:"隨機分配確保什麼？沒有它就不能做什麼聲稱？",h2:'Random assignment ensures that groups are ___. This is essential because without it, we cannot ___.',m:"Random assignment ensures that experimental groups are equivalent on average before treatment — same proportion of gender, age, etc. This is essential because it eliminates plausible rival explanations (the third requirement for causation). Without it, observed differences could be due to pre-existing group differences rather than the treatment.",r:"Purpose (1.5pts) + link to causation (1.5pts) = 3"},
{id:23,t:"B",w:"W5",title:"Internal vs external validity",q:"What is the difference between internal and external validity in experiments?",h1:"一個問「實驗裡面準不準」，一個問「推論到外面行不行」。",h2:'Internal validity refers to ___. External validity refers to ___. Experiments typically have high ___ but low ___.',m:"Internal validity refers to whether the experimental conclusions accurately reflect what happened in the experiment. External validity refers to whether results can be generalized to the real world. Experiments typically have high internal validity (tight control) but low external validity (lab settings differ from everyday life).",r:"Internal definition (1pt) + External definition (1pt) + tradeoff (1pt) = 3"},
{id:24,t:"B",w:"W5",title:"Experimental realism vs mundane",q:"What is the difference between experimental realism and mundane realism? Which one did the instructor say is more important?",h1:"受試者有沒有認真對待 vs 像不像日常生活。",h2:'Experimental realism means ___. Mundane realism means ___. The instructor emphasized that ___ is more important.',m:"Experimental realism means the situation is involving to subjects and they take it seriously. Mundane realism means the research setting resembles everyday life. The instructor emphasized experimental realism is more important — as long as participants engage seriously, the findings are meaningful even if the setting is artificial.",r:"Experimental realism (1pt) + Mundane realism (1pt) + which more important (1pt) = 3"},
{id:25,t:"B",w:"W6",title:"Codebook purpose",q:"What is a codebook in content analysis? What does it do?",h1:"編碼簿＝編碼者的說明書。連結什麼和什麼？",h2:'A codebook ___. It guides ___. It links ___.',m:"A codebook guides coders on how to code content. It defines every variable, category, and coding instruction. It links unstructured data (raw text, images, videos) to structured data (numbers and categories in a spreadsheet). If using LLMs for automated content analysis, the prompt essentially serves as the codebook.",r:"Definition (1pt) + function (1pt) + link explanation (1pt) = 3"},
{id:26,t:"B",w:"W6",title:"Krippendorff's alpha",q:"Why is Krippendorff's alpha better than percentage agreement for measuring intercoder reliability?",h1:"百分比一致性沒考慮什麼？二分類 50/50 隨機猜就有多少一致性？",h2:"Percentage agreement does not account for ___. For example, ___. Krippendorff's alpha corrects for this by ___.",m:"Percentage agreement does not account for chance agreement. For example, with a dichotomous variable (yes/no) and 50/50 distribution, random guessing produces 50% agreement. Krippendorff's alpha corrects for this by comparing observed disagreement to expected disagreement by chance. The threshold is alpha >= 0.67.",r:"Why % is insufficient (1pt) + example (1pt) + alpha explanation (1pt) = 3"},
{id:27,t:"B",w:"W4",title:"Post-stratification",q:"How did Wang et al. (2015) use a biased Xbox sample to correctly predict the 2012 US election?",h1:"Xbox 樣本偏差有多大？用什麼技術修正？分成幾組？",h2:'The Xbox sample was biased: ___. Wang et al. used ___ to correct this by ___.',m:"The Xbox sample was heavily biased — 65% were 18-29 (vs 19% of electorate), 93% male (vs 47%). Wang et al. used post-stratification: dividing 345,858 participants into 176,256 groups by demographics, estimating each group's preference, then computing a weighted average to match the actual electorate.",r:"Bias described (1pt) + technique (1pt) + how it works (1pt) = 3"},
{id:28,t:"B",w:"W5",title:"WEIRD problem",q:"What does WEIRD stand for? Why is it a problem for research?",h1:"這五個字母代表什麼？為什麼影響外部效度？",h2:'WEIRD stands for ___. This is problematic because ___.',m:"WEIRD stands for Western, Educated, Industrialized, Rich, Democratic. Most psychology and social science research uses samples from these populations (especially US college students), but they represent a small fraction of humanity. Findings may not generalize to other cultures, limiting external validity.",r:"Acronym (1pt) + why problematic (2pts) = 3"},
{id:29,t:"B",w:"W6",title:"Manifest vs latent coding",q:"What is the difference between manifest and latent coding in content analysis?",h1:"一個看得見（詞彙頻率），一個看不見（框架、情感）。",h2:'Manifest coding focuses on ___. Latent coding focuses on ___. Manifest is easier to ___ while latent requires ___.',m:"Manifest coding focuses on directly visible, surface-level content (e.g., counting specific word frequencies). Latent coding focuses on abstract underlying meanings (e.g., identifying frames or sentiment). Manifest is easier to automate and has higher reliability, while latent requires more interpretation but may have higher validity.",r:"Manifest definition (1pt) + Latent definition (1pt) + comparison (1pt) = 3"},
{id:30,t:"B",w:"W1",title:"Three perspectives",q:"Name the three perspectives in communication research and briefly describe each.",h1:"社會科學、修辭學、批判。各自關注什麼？",h2:'The three perspectives are: (1) ___, which focuses on ___; (2) ___, which focuses on ___; (3) ___, which focuses on ___.',m:"(1) Social scientific — uses empirical observation with quantitative/qualitative methods to study communication systematically. (2) Rhetorical — focuses on how language is used to persuade, typically through case studies. (3) Critical — exposes hidden assumptions and power structures that serve certain interests.",r:"Each perspective: name + description (1pt each) = 3"},

// === Type C: 應用 (11) ===
{id:31,t:"C",w:"W4",title:"Write a contingency Q",q:"Write a contingency question about AI chatbot usage. Include a filter question and a follow-up question with response options.",h1:"先問 yes/no 篩選，再追問頻率或細節。記得寫出完整選項。",h2:'Filter: "___?" (Yes / No)\nIf Yes → Follow-up: "___?"\n(a) ___ (b) ___ (c) ___ (d) ___',m:'Filter: "Have you used any AI chatbot (e.g., ChatGPT, Claude) in the past month?" (Yes / No → skip to next section)\nIf Yes: "Approximately how many times?" (a) 1-2 times (b) 3-5 times (c) 6-10 times (d) More than 10 times',r:"Filter question (1pt) + follow-up with options (2pts) + correct logic (1pt) = 4"},
{id:32,t:"C",w:"W5",title:"Design an experiment",q:'Design a simple experiment to test: "Seeing a fact-check label on a social media post reduces sharing intention." Describe IV, DV, groups, and assignment.',h1:"IV = 操弄什麼？DV = 測量什麼？兩組怎麼分？",h2:'IV: ___. DV: ___.\nTreatment group: ___. Control group: ___.\nParticipants are randomly assigned to ensure ___.',m:"IV: presence of fact-check label (label vs. no label). DV: sharing intention (measured on 1-7 scale). Treatment: sees the post WITH fact-check label. Control: sees the SAME post WITHOUT label. Participants randomly assigned to groups to ensure equivalence. If treatment group shows lower sharing intention (p < 0.05), we can make a causal claim.",r:"IV (1pt) + DV (1pt) + groups (1pt) + random assignment (1pt) = 4"},
{id:33,t:"C",w:"W2",title:"Identify IV/DV/Unit (multiple)",q:'For this hypothesis, identify IV, DV, and unit of analysis:\n"Countries with higher press freedom will have lower levels of political corruption."',h1:"分析的「個體」是國家。注意生態謬誤的風險。",h2:'The IV is ___. The DV is ___. The unit of analysis is ___.\nNote: this is ___ data, so we should be cautious about ___.',m:"IV: level of press freedom. DV: level of political corruption. Unit of analysis: countries. Note: this uses aggregated (country-level) data, so we should be cautious about ecological fallacy — we cannot conclude that individual journalists reduce individual corruption.",r:"IV (1pt) + DV (1pt) + Unit (1pt) + ecological fallacy note (1pt) = 4"},
{id:34,t:"C",w:"W5",title:"Pennycook study design",q:"Describe the Pennycook et al. (2021) study design. What was the between-subjects factor? What was the within-subjects factor? What was the key finding?",h1:"Mixed design。Between = accuracy prompt。Within = 24 headlines。結果是什麼 interaction？",h2:'This was a ___ design.\nBetween-subjects: ___.\nWithin-subjects: ___.\nKey finding: ___.',m:"This was a mixed design. Between-subjects: control (nothing) vs. treatment (asked to rate accuracy of one headline first). Within-subjects: all participants saw 24 headlines (12 true, 12 false). Key finding: treatment group was less likely to share false headlines AND more likely to share true ones — a crossover interaction effect.",r:"Design type (1pt) + between factor (1pt) + within factor (1pt) + finding (1pt) = 4"},
{id:35,t:"C",w:"W4",title:"Interpret statistics",q:'A t-test result shows: t(198) = 3.21, p = 0.002, 95% CI [0.25, 0.85]. The treatment group mean is 4.6 and the control group mean is 4.05. Interpret these results.',h1:"p < 0.05 → 顯著 → 拒絕 H₀。CI 不包含 0。能不能做因果聲稱要看是不是實驗。",h2:'The treatment group scored higher than control (M = ___ vs ___). The difference is statistically significant (p = ___, which is below 0.05), so we reject H₀. The 95% CI [___] does not include 0, confirming ___.',m:"The treatment group (M=4.6) scored higher than control (M=4.05), a difference of 0.55. This is statistically significant (p=0.002, below 0.05), so we reject H₀. The 95% CI [0.25, 0.85] does not include 0, confirming the difference is unlikely due to chance. If this is a randomized experiment, we can make a causal claim.",r:"Describe finding (1pt) + p-value (1pt) + CI (1pt) + causal caveat (1pt) = 4"},
{id:36,t:"C",w:"W6",title:"Content analysis steps",q:"List the 9 steps of conducting a quantitative content analysis.",h1:"Research Q → 定義單位 → 抽樣 → Codebook → Code sheet → 信度測試 → 編碼 → 統計 → 報告",h2:'1. ___\n2. ___\n3. ___\n...\n9. ___',m:"1. Define research question. 2. Define unit of data collection. 3. Define sampling (census vs sample). 4. Create codebook. 5. Create code sheet. 6. Intercoder reliability test (random sample, 2 coders, Krippendorff's alpha, if <0.67 revise, 3-4 rounds). 7. Code full sample. 8. Calculate statistics. 9. Report results.",r:"7+ steps correct (3pts) + reliability detail (1pt) = 4"},
{id:37,t:"C",w:"W4",title:"Fix a bad questionnaire",q:'This survey question has problems: "Don\'t you agree that social media is harmful to democracy and should be regulated by the government?" Identify at least 2 problems and rewrite it.',h1:"引導性措辭？雙管問題？怎麼改？",h2:'Problem 1: ___. Problem 2: ___.\nImproved version: "___"',m:'Problem 1: Leading question — "Don\'t you agree" pushes respondents toward agreement. Problem 2: Double-barreled — asks about harm AND regulation in one question. Improved: Split into two neutral questions: (1) "To what extent do you think social media affects democracy?" (1=very negatively to 7=very positively). (2) "To what extent should the government regulate social media?" (1=not at all to 7=very strongly).',r:"2 problems identified (2pts) + improved version (2pts) = 4"},
{id:38,t:"C",w:"W5",title:"Identify validity threats",q:"A researcher runs a 4-week experiment on media literacy. During week 3, a major fake news scandal dominates the news. How might this affect the study? What type of threat is this?",h1:"外部事件影響了實驗——這是哪一種內部效度威脅？",h2:'This is a ___ threat to internal validity. It means ___. The researcher cannot be sure whether the results are due to ___ or ___.',m:"This is a history threat to internal validity. An external event (the fake news scandal) occurred during the experiment that could independently affect participants' media literacy attitudes. The researcher cannot be sure whether changes in the DV are due to the treatment (media literacy program) or the external event.",r:"Correct threat type (2pts) + explanation (2pts) = 4"},
{id:39,t:"C",w:"W2",title:"Three causation requirements",q:'A researcher finds that people who watch more political satire also report higher political cynicism. Using the three requirements for causation, explain why this correlation alone is not sufficient to claim causation.',h1:"因果三要件哪些被滿足了？哪些沒有？",h2:'The three requirements are: (1) ___, (2) ___, (3) ___. In this survey, requirement 1 is met because ___. However, requirements 2 and 3 are NOT met because ___.',m:"The three requirements are: (1) Association — met, there is a correlation. (2) Direction of influence — NOT met, the survey measures both at the same time, so we don't know which came first. (3) Elimination of rival explanations — NOT met, there could be third variables (e.g., political interest causes both). Only an experiment with random assignment could meet all three.",r:"Three requirements listed (1pt) + which met/not met (2pts) + experiment solution (1pt) = 4"},
{id:40,t:"C",w:"W4",title:"Scale design",q:"You want to measure how much people agree or disagree with a policy statement. Should you use a 5-point or 7-point scale? Why?",h1:"Bipolar（同意-不同意）vs unipolar（完全不重要-非常重要）。Krosnick 怎麼說？",h2:'This is a ___ scale (agree-disagree). According to Krosnick, bipolar scales work best with ___ points because ___.',m:"This is a bipolar scale (agree-disagree). According to Krosnick, bipolar scales work best with 7 points because they provide enough discrimination between positions while minimizing completion errors. Unipolar scales (e.g., not important → very important) work best with 5 points.",r:"Correct recommendation (1pt) + reasoning (1pt) + Krosnick reference (1pt) = 3"},
{id:41,t:"C",w:"W6",title:"Validate a classifier",q:"You used ChatGPT to classify 1,000 news articles as 'positive' or 'negative.' How should you validate the classifier?",h1:"先用人工編碼者建立 gold standard。取隨機樣本。計算什麼？門檻多少？",h2:'First, ___. Then, take a random sample of ___ and ___. Calculate ___ between the human coding and GPT classification. The threshold is ___.',m:"First, have two human coders independently code a random sample (e.g., 50-100 articles) to establish a gold standard. Then compare the GPT classification against human coding using Krippendorff's alpha (or Cohen's Kappa). The threshold is >= 0.67. Also examine the confusion matrix (TP, TN, FP, FN) to check precision and recall.",r:"Human gold standard (1pt) + comparison method (1pt) + threshold (1pt) + confusion matrix (1pt) = 4"},

// === Type D: R Code (7) ===
{id:42,t:"D",w:"W1",title:"R: Vector type coercion",q:'Look at this R code and output:\n\n> x <- c(TRUE, 5, "hello")\n> x\n[1] "TRUE" "5" "hello"\n> class(x)\n[1] "character"\n\nWhy are TRUE and 5 converted to characters?',h1:"向量只能有一種型別。型別優先順序是什麼？",h2:'R vectors can only hold ___. When types are mixed, R applies type coercion following the hierarchy: ___. Since "hello" is ___, everything becomes ___.',m:'R vectors can only hold one data type. When types are mixed, R coerces to the highest priority type. The hierarchy is: character > numeric > logical. Since "hello" is character (the highest priority), TRUE becomes "TRUE" and 5 becomes "5" — all converted to character strings.',r:"One type rule (1pt) + hierarchy (1pt) + application (1pt) = 3"},
{id:43,t:"D",w:"W1",title:"R: TRUE/FALSE as numbers",q:"What is the output of c(1, TRUE, FALSE, 555) in R? Explain why.",h1:"沒有 character，所以 logical 轉成什麼？TRUE = ? FALSE = ?",h2:'The output is ___. Since there is no character type, logical values are converted to numeric: TRUE becomes ___ and FALSE becomes ___.',m:"The output is: 1 1 0 555. Since there is no character type present, only numeric and logical, R coerces logical to numeric: TRUE becomes 1 and FALSE becomes 0.",r:"Correct output (1pt) + explanation (2pts) = 3"},
{id:44,t:"D",w:"W5",title:"R: Interpret t-test",q:'A researcher runs this R code:\n\n> t.test(treatment$trust, control$trust)\n\n  t = -2.89, df = 148, p-value = 0.004\n  mean of x: 3.82\n  mean of y: 4.35\n\nWhat can the researcher conclude?',h1:"p < 0.05 → 顯著。哪組平均較高？能不能說因果？",h2:'The p-value is ___, which is below 0.05. This means we ___. The treatment group (M = ___) scored ___ than the control group (M = ___). If this is a randomized experiment, we can ___.',m:"The p-value is 0.004, below 0.05, so we reject H₀ — the difference is statistically significant. The treatment group (M=3.82) scored lower than control (M=4.35) on trust. If this is a randomized experiment, we can claim the treatment caused a decrease in trust.",r:"p-value interpretation (1pt) + group comparison (1pt) + causal caveat (1pt) = 3"},
{id:45,t:"D",w:"W6",title:"R: Krippendorff's alpha",q:'A researcher calculates intercoder reliability in R:\n\n> kripp.alpha(coding_matrix)\n  Krippendorff\'s alpha\n  Subjects = 50, Raters = 2\n  alpha = 0.58\n\nIs this acceptable? What should the researcher do next?',h1:"門檻是 0.67。低於門檻要怎麼做？",h2:'The alpha is ___, which is ___ the threshold of 0.67. This means ___. The researcher should ___.',m:"The alpha is 0.58, which is below the acceptable threshold of 0.67. This means intercoder reliability is insufficient. The researcher should: discuss disagreements with the other coder, revise the codebook with clearer definitions, take a NEW random sample, and retest. This process typically takes 3-4 rounds.",r:"Below threshold (1pt) + what to do (2pts) = 3"},
{id:46,t:"D",w:"W6",title:"R: Confusion matrix",q:'Look at this confusion matrix from an automatic classifier:\n\n              Predicted\n           Pos    Neg\nActual Pos  45      5\nActual Neg  10     40\n\nIdentify TP, TN, FP, FN. Which errors are more serious in a cancer screening context?',h1:"TP = 實際正預測正。FP = 實際負預測正（狼來了）。FN = 實際正預測負（漏掉了）。",h2:'TP = ___, TN = ___, FP = ___, FN = ___.\nIn cancer screening, ___ errors are more serious because ___.',m:"TP = 45 (correctly identified positives). TN = 40 (correctly identified negatives). FP = 10 (false alarm — predicted positive but actually negative). FN = 5 (missed — predicted negative but actually positive). In cancer screening, FN errors are more serious because missing actual cancer cases (telling sick people they're healthy) has worse consequences than false alarms.",r:"All 4 correct (2pts) + which more serious + why (1pt) = 3"},
{id:47,t:"D",w:"W1",title:"R: Data frame basics",q:"What is the difference between a vector and a data frame in R?",h1:"向量 = 一維，一種型別。資料框 = 二維，每欄可以不同型別。",h2:'A vector is ___. A data frame is ___. In a data frame, rows represent ___ and columns represent ___.',m:"A vector is a one-dimensional array that holds only one data type (all numeric, all character, or all logical). A data frame is a two-dimensional structure where rows represent observations and columns represent variables. Each column can have a different data type, but within one column all values are the same type.",r:"Vector definition (1pt) + data frame definition (1pt) + rows/columns (1pt) = 3"},
{id:48,t:"D",w:"W4",title:"R: Central Limit Theorem",q:"In the R swirl exercise, you simulated the Central Limit Theorem. What did the simulation demonstrate?",h1:"反覆抽樣、計算平均數、觀察分佈。不論母體長什麼樣，結果都趨近什麼？",h2:'The simulation demonstrated that when you repeatedly ___ and compute ___, the distribution of these ___ approximates a ___ regardless of ___.',m:"The simulation demonstrated that when you repeatedly take random samples from any population and compute the sample means, the distribution of these means approximates a normal distribution regardless of the original population's shape. This is the Central Limit Theorem — the foundation of inferential statistics.",r:"What was simulated (1pt) + result (1pt) + significance (1pt) = 3"},

// === 混合題 (2) ===
{id:49,t:"B",w:"W2",title:"Comte's positivism",q:"What did Auguste Comte propose? How does his idea relate to the social scientific perspective?",h1:"實證主義 = 知識來自哪裡？跟社會科學觀點的關聯？",h2:'Comte proposed ___. This means that knowledge should come from ___, not from ___. This directly connects to the social scientific perspective because ___.',m:"Comte proposed positivism — the idea that scientific knowledge comes from empirical observation, not theology or metaphysical speculation. This directly connects to the social scientific perspective, which relies on systematic empirical observation using quantitative and qualitative methods to study communication.",r:"Positivism defined (1.5pts) + connection to social science (1.5pts) = 3"},
{id:50,t:"C",w:"W5",title:"Between vs within design",q:"A researcher wants to study whether AI-generated art is perceived differently from human art. They show each participant 10 AI artworks and 10 human artworks. Is this between-subjects or within-subjects? What is one advantage and one disadvantage?",h1:"同一個人看了所有條件 → 哪種設計？優缺點各一。",h2:'This is a ___ design because ___.\nAdvantage: ___.\nDisadvantage: ___.',m:"This is a within-subjects design because the same person experiences both conditions (AI and human art). Advantage: reduces noise from individual differences — each person is their own control, so fewer participants needed. Disadvantage: order effects — seeing AI art first might influence how they judge human art afterward. Solution: randomize the presentation order.",r:"Design type (1pt) + advantage (1pt) + disadvantage (1pt) + solution (1pt) = 4"},
];

const TYPES = {A:"Type A: Judge+Explain 判斷+解釋",B:"Type B: Short Answer 簡答",C:"Type C: Apply 應用",D:"Type D: R Code"};
let currentQid=1;
let activeType="All";

function getRecords(){try{return JSON.parse(localStorage.getItem('coreme_sa_records')||'{}')}catch{return {}}}
function saveRecords(r){localStorage.setItem('coreme_sa_records',JSON.stringify(r))}
function getApiKey(){return localStorage.getItem('coreme_api_key')||''}

function initTypeFilters(){
  const el=document.getElementById('typeFilters');
  ['All','A','B','C','D'].forEach(t=>{
    const btn=document.createElement('button');
    btn.textContent=t==='All'?'All':t;
    btn.className=t===activeType?'active':'';
    btn.onclick=()=>{activeType=t;document.querySelectorAll('.type-filters button').forEach(b=>b.classList.remove('active'));btn.classList.add('active');renderSidebar()};
    el.appendChild(btn);
  });
}

function renderSidebar(){
  const records=getRecords();
  const filtered=activeType==='All'?Q:Q.filter(q=>q.t===activeType);
  document.getElementById('qList').innerHTML=filtered.map(q=>{
    const rec=records[q.id];
    let badge='';
    if(rec&&rec.grades&&rec.grades.length>0){const s=rec.grades[rec.grades.length-1].score;badge=`<span class="q-badge graded">${s}pts</span>`}
    else if(rec&&rec.draft)badge='<span class="q-badge draft">Draft</span>';
    return `<li class="${q.id===currentQid?'active':''}" onclick="selectQ(${q.id})"><span class="type-tag ${q.t}">${q.t}</span>Q${q.id} ${q.title} ${badge}</li>`;
  }).join('');
}

function selectQ(id){saveDraft();currentQid=id;renderSidebar();renderMain()}

function renderMain(){
  const q=Q.find(x=>x.id===currentQid);
  const rec=getRecords()[q.id]||{};
  const draft=rec.draft||'';
  const grades=rec.grades||[];
  const isCode=q.t==='D';
  const qText=isCode?formatCodeInQ(q.q):esc(q.q);

  let hist='';
  if(grades.length>0){
    hist='<div class="history-section"><h4>Past Attempts ('+grades.length+')</h4>';
    grades.slice().reverse().forEach(g=>{
      hist+=`<div class="history-item"><span class="h-date">${g.date}</span> — <span class="h-score">${g.score}pts</span><details style="margin-top:4px"><summary style="cursor:pointer;color:#64748b;font-size:11px">Details</summary><div style="margin-top:6px;font-size:12px;color:#94a3b8"><b>Your answer:</b><pre style="white-space:pre-wrap;color:#d1d5db;margin:4px 0 6px">${esc(g.answer)}</pre><b>Feedback:</b><pre style="white-space:pre-wrap;color:#d1d5db;margin-top:4px">${esc(g.feedback)}</pre></div></details></div>`;
    });
    hist+='</div>';
  }

  document.getElementById('mainArea').innerHTML=`
    <div class="question-card">
      <div class="q-header">
        <span class="q-number">Q${q.id}/${Q.length}</span>
        <span class="type-tag ${q.t}" style="font-size:11px">${TYPES[q.t]}</span>
        <span class="q-week">${q.w}</span>
      </div>
      <div class="q-text">${qText}</div>
      <div class="q-word-target">Target: ${q.t==='A'?'1-2 sentences':q.t==='D'?'2-4 sentences':'3-5 sentences'}</div>
      <div class="hint-section">
        <button class="hint-toggle" onclick="toggleHint()">💡 Hint</button>
        <div class="hint-box" id="hintBox">
          <div class="hint-strategy">📌 策略：${esc(q.h1)}</div>
          <div class="hint-scaffold">✏️ English scaffold:\n${esc(q.h2)}</div>
        </div>
      </div>
    </div>
    <div class="answer-area">
      <label>Your Answer:</label>
      <textarea id="answerInput" placeholder="Write ${q.t==='A'?'1-2':q.t==='D'?'2-4':'3-5'} sentences in English...">${esc(draft)}</textarea>
      <div class="meta"><span id="charCount">${draft.length} chars</span><span>${q.t==='A'?'~20-40 words':q.t==='D'?'~30-60 words':'~40-80 words'}</span></div>
    </div>
    <div class="action-bar">
      <button class="btn btn-blue" onclick="submitGrade()" id="gradeBtn">🤖 AI Grade</button>
      <button class="btn btn-gray" onclick="saveDraft()">💾 Save</button>
      <button class="btn btn-green" onclick="toggleModel()">📖 Model Answer</button>
      <button class="btn btn-gray" onclick="nextQ()">Next →</button>
    </div>
    <div class="grade-result" id="gradeResult"></div>
    <div class="model-answer" id="modelAnswer"><h4>📖 Model Answer</h4>${esc(q.m)}</div>
    ${hist}`;
  document.getElementById('answerInput').addEventListener('input',e=>{document.getElementById('charCount').textContent=e.target.value.length+' chars'});
}

function formatCodeInQ(text){
  return esc(text).replace(/^(&gt;.*)$/gm,'<code>$1</code>').replace(/\n\n/g,'</p><p>');
}
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function toggleHint(){document.getElementById('hintBox').classList.toggle('show')}
function toggleModel(){document.getElementById('modelAnswer').classList.toggle('show')}
function saveDraft(){const ta=document.getElementById('answerInput');if(!ta)return;const r=getRecords();if(!r[currentQid])r[currentQid]={};r[currentQid].draft=ta.value;saveRecords(r);renderSidebar()}
function nextQ(){saveDraft();const i=Q.findIndex(q=>q.id===currentQid);const filtered=activeType==='All'?Q:Q.filter(q=>q.t===activeType);const ci=filtered.findIndex(q=>q.id===currentQid);if(ci<filtered.length-1)selectQ(filtered[ci+1].id)}

async function submitGrade(){
  const ans=document.getElementById('answerInput').value.trim();
  if(!ans){alert('Write an answer first!');return}
  const key=getApiKey();
  if(!key){showApiModal();return}
  const q=Q.find(x=>x.id===currentQid);
  const el=document.getElementById('gradeResult');
  const btn=document.getElementById('gradeBtn');
  btn.disabled=true;btn.textContent='⏳...';
  el.className='grade-result show';
  el.innerHTML='<div class="loading"><div class="spinner"></div> AI grading...</div>';

  const sys=`You are grading a COREME midterm exam (Communication Research Methods, NTU). This is a SHORT ANSWER exam.

RUBRIC: ${q.r}
MODEL ANSWER: ${q.m}

GRADING CRITERIA:
- Correct use of English terminology (MOST important)
- Conceptual accuracy
- Concrete example when required
- Concise expression is IDEAL — do NOT penalize brief answers if correct

DO NOT penalize for: grammar mistakes (if meaning is clear), short answers (if key terms are correct)

RESPOND IN THIS FORMAT:
SCORE: [number] / [total from rubric]

STRENGTHS: (1-2 bullet points in Chinese)

MISSING: (key English terms or concepts the student should have included, in Chinese)

IMPROVED VERSION: (Write a corrected/improved version of the student's answer in English, keeping their structure but fixing errors and adding missing terms)`;

  try{
    const resp=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','x-api-key':key,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},body:JSON.stringify({model:'claude-haiku-4-5-20251001',max_tokens:800,system:sys,messages:[{role:'user',content:`QUESTION: ${q.q}\n\nSTUDENT ANSWER:\n${ans}`}]})});
    if(!resp.ok){const err=await resp.json().catch(()=>({}));throw new Error(err.error?.message||'API error '+resp.status)}
    const data=await resp.json();
    const fb=data.content[0].text;
    const sm=fb.match(/SCORE:\s*(\d+)/i);
    const score=sm?sm[1]:'?';
    const r=getRecords();if(!r[currentQid])r[currentQid]={};if(!r[currentQid].grades)r[currentQid].grades=[];
    r[currentQid].grades.push({date:new Date().toLocaleString('zh-TW'),answer:ans,score,feedback:fb});
    r[currentQid].draft='';saveRecords(r);
    const sc=parseInt(score);const color=sc>=3?'#4ade80':sc>=2?'#fbbf24':'#f87171';
    el.innerHTML=`<div class="grade-score"><span class="sn" style="color:${color}">${score}</span><span class="st"> pts</span></div><div class="grade-feedback">${esc(fb)}</div>`;
    renderSidebar();
  }catch(err){el.innerHTML=`<div style="color:#f87171;padding:12px">Error: ${esc(err.message)}</div>`}
  finally{btn.disabled=false;btn.textContent='🤖 AI Grade'}
}

function showApiModal(){document.getElementById('apiModal').classList.add('show')}
function closeApiModal(){document.getElementById('apiModal').classList.remove('show')}
function saveApiKey(){const k=document.getElementById('apiKeyInput').value.trim();if(k){localStorage.setItem('coreme_api_key',k);updateApi();closeApiModal()}}
function updateApi(){const el=document.getElementById('apiStatus');if(getApiKey()){el.className='api-status ok';el.textContent='✓ API Key Set'}else{el.className='api-status no';el.textContent='Set API Key'}}

function exportHistory(){
  const r=getRecords();let md='# COREME Short Answer Records\n\n';
  Q.forEach(q=>{const rec=r[q.id];if(rec&&rec.grades&&rec.grades.length>0){md+=`## Q${q.id}: ${q.title}\n\n`;rec.grades.forEach((g,i)=>{md+=`### Attempt ${i+1} — ${g.date} — ${g.score}pts\n\n**Answer:**\n${g.answer}\n\n**Feedback:**\n${g.feedback}\n\n---\n\n`})}});
  const blob=new Blob([md],{type:'text/markdown'});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download=`coreme_practice_${new Date().toISOString().slice(0,10)}.md`;a.click();URL.revokeObjectURL(url);
}

updateApi();initTypeFilters();renderSidebar();renderMain();
</script>

{id:31,t:"C",w:"W4",title:"Write a contingency Q",q:"Write a contingency question about AI chatbot usage. Include a filter question and a follow-up question with response options.",h1:"📖 Contingency question＝兩段式結構：先問篩選題（yes/no），只有符合條件的人才回答追問題。減少過度報告偏差。\n\n先問 yes/no 篩選，再追問頻率或細節。記得寫出完整選項。",h2:'Filter: "___?" (Yes / No)\nIf Yes → Follow-up: "___?"\n(a) ___ (b) ___ (c) ___ (d) ___',m:'Filter: "Have you used any AI chatbot (e.g., ChatGPT, Claude) in the past month?" (Yes / No → skip to next section)\nIf Yes: "Approximately how many times?" (a) 1-2 times (b) 3-5 times (c) 6-10 times (d) More than 10 times',r:"Filter question (1pt) + follow-up with options (2pts) + correct logic (1pt) = 4"},
{id:32,t:"C",w:"W5",title:"Design an experiment",q:'Design a simple experiment to test: "Seeing a fact-check label on a social media post reduces sharing intention." Describe IV, DV, groups, and assignment.',h1:"📖 實驗設計基本要素：IV（操弄什麼）、DV（測量什麼）、Treatment group vs Control group、Random assignment（隨機分配）。Treatment 只能在操弄變數上不同。\n\nIV = 操弄什麼？DV = 測量什麼？兩組怎麼分？",h2:'IV: ___. DV: ___.\nTreatment group: ___. Control group: ___.\nParticipants are randomly assigned to ensure ___.',m:"IV: presence of fact-check label (label vs. no label). DV: sharing intention (measured on 1-7 scale). Treatment: sees the post WITH fact-check label. Control: sees the SAME post WITHOUT label. Participants randomly assigned to groups to ensure equivalence. If treatment group shows lower sharing intention (p < 0.05), we can make a causal claim.",r:"IV (1pt) + DV (1pt) + groups (1pt) + random assignment (1pt) = 4"},
{id:33,t:"C",w:"W2",title:"Identify IV/DV/Unit (multiple)",q:'For this hypothesis, identify IV, DV, and unit of analysis:\n"Countries with higher press freedom will have lower levels of political corruption."',h1:"📖 IV＝研究者操弄/分組的變數。DV＝受影響的結果變數。Unit of analysis＝分析的個體層級。注意 aggregated data 的生態謬誤風險。\n\nIV = 預測/操弄變數，DV = 結果變數，Unit of analysis = 你在分析什麼層級的「個體」。",h2:'The IV is ___. The DV is ___. The unit of analysis is ___.\nNote: this is ___ data, so we should be cautious about ___.',m:"IV: level of press freedom. DV: level of political corruption. Unit of analysis: countries. Note: this uses aggregated (country-level) data, so we should be cautious about ecological fallacy — we cannot conclude that individual journalists reduce individual corruption.",r:"IV (1pt) + DV (1pt) + Unit (1pt) + ecological fallacy note (1pt) = 4"},
{id:34,t:"C",w:"W5",title:"Pennycook study design",q:"Describe the Pennycook et al. (2021) study design. What was the between-subjects factor? What was the within-subjects factor? What was the key finding?",h1:"📖 Pennycook et al. (2021, Nature)：Mixed design。Between = accuracy prompt vs control。Within = 24 headlines（12 true + 12 false）。結果：treatment 組分享假新聞↓、真新聞↑ → crossover interaction。\n\nMixed design。Between = accuracy prompt。Within = 24 headlines。結果是什麼 interaction？",h2:'This was a ___ design.\nBetween-subjects: ___.\nWithin-subjects: ___.\nKey finding: ___.',m:"This was a mixed design. Between-subjects: control (nothing) vs. treatment (asked to rate accuracy of one headline first). Within-subjects: all participants saw 24 headlines (12 true, 12 false). Key finding: treatment group was less likely to share false headlines AND more likely to share true ones — a crossover interaction effect.",r:"Design type (1pt) + between factor (1pt) + within factor (1pt) + finding (1pt) = 4"},
{id:35,t:"C",w:"W4",title:"Interpret statistics",q:'A t-test result shows: t(198) = 3.21, p = 0.002, 95% CI [0.25, 0.85]. The treatment group mean is 4.6 and the control group mean is 4.05. Interpret these results.',h1:"📖 統計解讀：p < 0.05 → 拒絕 H₀、統計顯著。95% CI 不包含 0 → 差異顯著。如果是隨機實驗 → 可做因果聲稱。如果是問卷 → 只能說相關。\n\np < 0.05 → 顯著 → 拒絕 H₀。CI 不包含 0。能不能做因果聲稱要看是不是實驗。",h2:'The treatment group scored higher than control (M = ___ vs ___). The difference is statistically significant (p = ___, which is below 0.05), so we reject H₀. The 95% CI [___] does not include 0, confirming ___.',m:"The treatment group (M=4.6) scored higher than control (M=4.05), a difference of 0.55. This is statistically significant (p=0.002, below 0.05), so we reject H₀. The 95% CI [0.25, 0.85] does not include 0, confirming the difference is unlikely due to chance. If this is a randomized experiment, we can make a causal claim.",r:"Describe finding (1pt) + p-value (1pt) + CI (1pt) + causal caveat (1pt) = 4"},
{id:36,t:"C",w:"W6",title:"Content analysis steps",q:"List the 9 steps of conducting a quantitative content analysis.",h1:"📖 內容分析 9 步驟：(1) Research Q (2) Define unit (3) Sampling (4) Codebook (5) Code sheet (6) Intercoder reliability test（3-4 輪，alpha ≥ 0.67）(7) Code full sample (8) Statistics (9) Report。\n\nResearch Q → 定義單位 → 抽樣 → Codebook → Code sheet → 信度測試 → 編碼 → 統計 → 報告",h2:'1. ___\n2. ___\n3. ___\n...\n9. ___',m:"1. Define research question. 2. Define unit of data collection. 3. Define sampling (census vs sample). 4. Create codebook. 5. Create code sheet. 6. Intercoder reliability test (random sample, 2 coders, Krippendorff's alpha, if <0.67 revise, 3-4 rounds). 7. Code full sample. 8. Calculate statistics. 9. Report results.",r:"7+ steps correct (3pts) + reliability detail (1pt) = 4"},
{id:37,t:"C",w:"W4",title:"Fix a bad questionnaire",q:'This survey question has problems: "Don\'t you agree that social media is harmful to democracy and should be regulated by the government?" Identify at least 2 problems and rewrite it.',h1:"📖 問卷設計四原則：(1) Univocality 一題一概念 (2) Uniformity 對所有人意義相同 (3) Economy of words 精簡 (4) 避免 double-barreled questions。\n\n引導性措辭？雙管問題？怎麼改？",h2:'Problem 1: ___. Problem 2: ___.\nImproved version: "___"',m:'Problem 1: Leading question — "Don\'t you agree" pushes respondents toward agreement. Problem 2: Double-barreled — asks about harm AND regulation in one question. Improved: Split into two neutral questions: (1) "To what extent do you think social media affects democracy?" (1=very negatively to 7=very positively). (2) "To what extent should the government regulate social media?" (1=not at all to 7=very strongly).',r:"2 problems identified (2pts) + improved version (2pts) = 4"},
{id:38,t:"C",w:"W5",title:"Identify validity threats",q:"A researcher runs a 4-week experiment on media literacy. During week 3, a major fake news scandal dominates the news. How might this affect the study? What type of threat is this?",h1:"📖 內部效度五大威脅：History（外部事件）、Maturation（自然成熟）、Testing（前測效應）、Selection（選擇偏差）、Differential attrition（差異性流失）。\n\n外部事件影響了實驗——這是哪一種內部效度威脅？",h2:'This is a ___ threat to internal validity. It means ___. The researcher cannot be sure whether the results are due to ___ or ___.',m:"This is a history threat to internal validity. An external event (the fake news scandal) occurred during the experiment that could independently affect participants' media literacy attitudes. The researcher cannot be sure whether changes in the DV are due to the treatment (media literacy program) or the external event.",r:"Correct threat type (2pts) + explanation (2pts) = 4"},
{id:39,t:"C",w:"W2",title:"Three causation requirements",q:'A researcher finds that people who watch more political satire also report higher political cynicism. Using the three requirements for causation, explain why this correlation alone is not sufficient to claim causation.',h1:"📖 因果三要件：(1) Association 關聯 (2) Direction of influence 時間順序 (3) Elimination of rival explanations 排除替代解釋（非虛假）。\n\n因果三要件哪些被滿足了？哪些沒有？",h2:'The three requirements are: (1) ___, (2) ___, (3) ___. In this survey, requirement 1 is met because ___. However, requirements 2 and 3 are NOT met because ___.',m:"The three requirements are: (1) Association — met, there is a correlation. (2) Direction of influence — NOT met, the survey measures both at the same time, so we don't know which came first. (3) Elimination of rival explanations — NOT met, there could be third variables (e.g., political interest causes both). Only an experiment with random assignment could meet all three.",r:"Three requirements listed (1pt) + which met/not met (2pts) + experiment solution (1pt) = 4"},
{id:40,t:"C",w:"W4",title:"Scale design",q:"You want to measure how much people agree or disagree with a policy statement. Should you use a 5-point or 7-point scale? Why?",h1:"📖 Krosnick 建議：Bipolar scale（同意-不同意）→ 7-point 最佳。Unipolar scale（完全不重要-非常重要）→ 5-point 最佳。較長量表（1-100）完成錯誤更多。\n\nBipolar（同意-不同意）vs unipolar（完全不重要-非常重要）。Krosnick 怎麼說？",h2:'This is a ___ scale (agree-disagree). According to Krosnick, bipolar scales work best with ___ points because ___.',m:"This is a bipolar scale (agree-disagree). According to Krosnick, bipolar scales work best with 7 points because they provide enough discrimination between positions while minimizing completion errors. Unipolar scales (e.g., not important → very important) work best with 5 points.",r:"Correct recommendation (1pt) + reasoning (1pt) + Krosnick reference (1pt) = 3"},
{id:41,t:"C",w:"W6",title:"Validate a classifier",q:"You used ChatGPT to classify 1,000 news articles as 'positive' or 'negative.' How should you validate the classifier?",h1:"📖 自動分類器驗證流程：(1) 兩位人工編碼者獨立編碼建立 gold standard (2) 取隨機樣本比較分類器 vs 人工 (3) 計算 Kappa 或 Krippendorff's alpha ≥ 0.67 (4) 檢查 confusion matrix。\n\n先用人工編碼者建立 gold standard。取隨機樣本。計算什麼？門檻多少？",h2:'First, ___. Then, take a random sample of ___ and ___. Calculate ___ between the human coding and GPT classification. The threshold is ___.',m:"First, have two human coders independently code a random sample (e.g., 50-100 articles) to establish a gold standard. Then compare the GPT classification against human coding using Krippendorff's alpha (or Cohen's Kappa). The threshold is >= 0.67. Also examine the confusion matrix (TP, TN, FP, FN) to check precision and recall.",r:"Human gold standard (1pt) + comparison method (1pt) + threshold (1pt) + confusion matrix (1pt) = 4"},

// === Type D: R Code (7) ===
{id:42,t:"D",w:"W1",title:"R: Vector type coercion",q:'Look at this R code and output:\n\n> x <- c(TRUE, 5, "hello")\n> x\n[1] "TRUE" "5" "hello"\n> class(x)\n[1] "character"\n\nWhy are TRUE and 5 converted to characters?',h1:"📖 R 向量型別優先順序：character > numeric > logical。混合時自動轉換成最高優先型別。c(TRUE, \"hello\", 3) → 全變 character。\n\n向量只能有一種型別。型別優先順序是什麼？",h2:'R vectors can only hold ___. When types are mixed, R applies type coercion following the hierarchy: ___. Since "hello" is ___, everything becomes ___.',m:'R vectors can only hold one data type. When types are mixed, R coerces to the highest priority type. The hierarchy is: character > numeric > logical. Since "hello" is character (the highest priority), TRUE becomes "TRUE" and 5 becomes "5" — all converted to character strings.',r:"One type rule (1pt) + hierarchy (1pt) + application (1pt) = 3"},
{id:43,t:"D",w:"W1",title:"R: TRUE/FALSE as numbers",q:"What is the output of c(1, TRUE, FALSE, 555) in R? Explain why.",h1:"📖 R 向量：只有 numeric 和 logical 混合時，logical 轉成 numeric（TRUE → 1, FALSE → 0）。只有加入 character 時才全變文字。\n\n沒有 character，所以 logical 轉成什麼？TRUE = ? FALSE = ?",h2:'The output is ___. Since there is no character type, logical values are converted to numeric: TRUE becomes ___ and FALSE becomes ___.',m:"The output is: 1 1 0 555. Since there is no character type present, only numeric and logical, R coerces logical to numeric: TRUE becomes 1 and FALSE becomes 0.",r:"Correct output (1pt) + explanation (2pts) = 3"},
{id:44,t:"D",w:"W5",title:"R: Interpret t-test",q:'A researcher runs this R code:\n\n> t.test(treatment$trust, control$trust)\n\n  t = -2.89, df = 148, p-value = 0.004\n  mean of x: 3.82\n  mean of y: 4.35\n\nWhat can the researcher conclude?',h1:"📖 t-test 解讀：p < 0.05 → 統計顯著 → 拒絕 H₀。比較兩組平均數。如果是隨機實驗可做因果聲稱；如果是觀察研究只能說相關。\n\np < 0.05 → 顯著。哪組平均較高？能不能說因果？",h2:'The p-value is ___, which is below 0.05. This means we ___. The treatment group (M = ___) scored ___ than the control group (M = ___). If this is a randomized experiment, we can ___.',m:"The p-value is 0.004, below 0.05, so we reject H₀ — the difference is statistically significant. The treatment group (M=3.82) scored lower than control (M=4.35) on trust. If this is a randomized experiment, we can claim the treatment caused a decrease in trust.",r:"p-value interpretation (1pt) + group comparison (1pt) + causal caveat (1pt) = 3"},
{id:45,t:"D",w:"W6",title:"R: Krippendorff's alpha",q:'A researcher calculates intercoder reliability in R:\n\n> kripp.alpha(coding_matrix)\n  Krippendorff\'s alpha\n  Subjects = 50, Raters = 2\n  alpha = 0.58\n\nIs this acceptable? What should the researcher do next?',h1:"📖 Krippendorff's alpha 門檻 ≥ 0.67。低於門檻：(1) 討論不一致案例 (2) 修改 codebook (3) 取新隨機樣本 (4) 重新測試。通常 3-4 輪。\n\n門檻是 0.67。低於門檻要怎麼做？",h2:'The alpha is ___, which is ___ the threshold of 0.67. This means ___. The researcher should ___.',m:"The alpha is 0.58, which is below the acceptable threshold of 0.67. This means intercoder reliability is insufficient. The researcher should: discuss disagreements with the other coder, revise the codebook with clearer definitions, take a NEW random sample, and retest. This process typically takes 3-4 rounds.",r:"Below threshold (1pt) + what to do (2pts) = 3"},
{id:46,t:"D",w:"W6",title:"R: Confusion matrix",q:'Look at this confusion matrix from an automatic classifier:\n\n              Predicted\n           Pos    Neg\nActual Pos  45      5\nActual Neg  10     40\n\nIdentify TP, TN, FP, FN. Which errors are more serious in a cancer screening context?',h1:"📖 Confusion Matrix：TP（實際正、預測正 ✓）、TN（實際負、預測負 ✓）、FP（實際負、預測正 ✗ = Type I）、FN（實際正、預測負 ✗ = Type II）。\n\nTP = 實際正預測正。FP = 實際負預測正（狼來了）。FN = 實際正預測負（漏掉了）。",h2:'TP = ___, TN = ___, FP = ___, FN = ___.\nIn cancer screening, ___ errors are more serious because ___.',m:"TP = 45 (correctly identified positives). TN = 40 (correctly identified negatives). FP = 10 (false alarm — predicted positive but actually negative). FN = 5 (missed — predicted negative but actually positive). In cancer screening, FN errors are more serious because missing actual cancer cases (telling sick people they're healthy) has worse consequences than false alarms.",r:"All 4 correct (2pts) + which more serious + why (1pt) = 3"},
{id:47,t:"D",w:"W1",title:"R: Data frame basics",q:"What is the difference between a vector and a data frame in R?",h1:"📖 Vector＝一維陣列，只能有一種資料型別。Data frame＝二維表格，rows = observations, columns = variables，不同欄可以不同型別。\n\n向量 = 一維，一種型別。資料框 = 二維，每欄可以不同型別。",h2:'A vector is ___. A data frame is ___. In a data frame, rows represent ___ and columns represent ___.',m:"A vector is a one-dimensional array that holds only one data type (all numeric, all character, or all logical). A data frame is a two-dimensional structure where rows represent observations and columns represent variables. Each column can have a different data type, but within one column all values are the same type.",r:"Vector definition (1pt) + data frame definition (1pt) + rows/columns (1pt) = 3"},
{id:48,t:"D",w:"W4",title:"R: Central Limit Theorem",q:"In the R swirl exercise, you simulated the Central Limit Theorem. What did the simulation demonstrate?",h1:"📖 Central Limit Theorem：不論母體分佈為何，反覆抽樣計算的樣本平均數分佈會趨近常態分佈。這是推論統計的數學基礎。\n\n反覆抽樣、計算平均數、觀察分佈。不論母體長什麼樣，結果都趨近什麼？",h2:'The simulation demonstrated that when you repeatedly ___ and compute ___, the distribution of these ___ approximates a ___ regardless of ___.',m:"The simulation demonstrated that when you repeatedly take random samples from any population and compute the sample means, the distribution of these means approximates a normal distribution regardless of the original population's shape. This is the Central Limit Theorem — the foundation of inferential statistics.",r:"What was simulated (1pt) + result (1pt) + significance (1pt) = 3"},

// === 混合題 (2) ===
{id:49,t:"B",w:"W2",title:"Comte's positivism",q:"What did Auguste Comte propose? How does his idea relate to the social scientific perspective?",h1:"📖 Auguste Comte 提出 Positivism（實證主義）：科學知識來自經驗觀察（empirical observation），不是神學或形而上學。這是社會科學觀點的哲學基礎。\n\n實證主義 = 知識來自哪裡？跟社會科學觀點的關聯？",h2:'Comte proposed ___. This means that knowledge should come from ___, not from ___. This directly connects to the social scientific perspective because ___.',m:"Comte proposed positivism — the idea that scientific knowledge comes from empirical observation, not theology or metaphysical speculation. This directly connects to the social scientific perspective, which relies on systematic empirical observation using quantitative and qualitative methods to study communication.",r:"Positivism defined (1.5pts) + connection to social science (1.5pts) = 3"},
{id:50,t:"C",w:"W5",title:"Between vs within design",q:"A researcher wants to study whether AI-generated art is perceived differently from human art. They show each participant 10 AI artworks and 10 human artworks. Is this between-subjects or within-subjects? What is one advantage and one disadvantage?",h1:"📖 Between-subjects＝不同人分到不同組（無順序效應，但需要更大樣本）。Within-subjects＝同一人經歷所有條件（減少個體差異雜訊，但可能有順序效應）。\n\n同一個人看了所有條件 → 哪種設計？優缺點各一。",h2:'This is a ___ design because ___.\nAdvantage: ___.\nDisadvantage: ___.',m:"This is a within-subjects design because the same person experiences both conditions (AI and human art). Advantage: reduces noise from individual differences — each person is their own control, so fewer participants needed. Disadvantage: order effects — seeing AI art first might influence how they judge human art afterward. Solution: randomize the presentation order.",r:"Design type (1pt) + advantage (1pt) + disadvantage (1pt) + solution (1pt) = 4"},
// === NEW Q51-Q90: Gap-fill questions ===
{id:51,t:"B",w:"W2",title:"Merton's middle-range theories",q:"What are 'theories of the middle range' as proposed by Robert K. Merton? Give one example from communication science.",h1:"📖 Middle-range theories (Merton)＝介於日常工作假設和宏大理論（如 Habermas 公共領域）之間的理論。可被經驗檢驗。例：Agenda-Setting、Framing、Spiral of Silence。\n\n介於日常假設和宏觀理論之間的理論，想想課堂上的例子。",h2:"Merton defined middle-range theories as ___. Unlike grand theories such as ___, they focus on ___. An example is ___.",m:"Merton defined middle-range theories as theories intermediate between minor working hypotheses and grand conceptual schemes. Unlike grand theories such as Luhmann's system theory, they are testable and focus on measurable aspects of social phenomena. Examples include Agenda-Setting Theory, Framing Theory, and the Spiral of Silence.",r:"Definition (1pt) + distinction from grand theory (1pt) + example (1pt) = 3"},
{id:52,t:"A",w:"W4",title:"Social desirability bias",q:"A survey asks 'How often do you read fake news and share it without checking?' Most respondents answer 'never.' What type of response bias is this?",h1:"📖 Social desirability bias＝受訪者給出社會認可的答案而非真實想法。例：低報偏見行為、高報投票參與。解決：匿名調查、間接問法。\n\n受訪者會不會為了顯得更好而選擇社會認可的答案？",h2:"This is ___ bias, where respondents tend to ___ rather than report ___.",m:"This is social desirability bias, where respondents tend to give answers that make them look good rather than report their actual behavior. People are unlikely to admit sharing fake news because it is socially undesirable.",r:"Correct identification (1pt) + explanation (1pt) = 2"},
{id:53,t:"A",w:"W4",title:"Acquiescence bias",q:"A researcher notices that respondents tend to agree with every statement in a long questionnaire, regardless of content. What type of bias is this?",h1:"📖 Acquiescence response set（默認傾向）＝受訪者傾向同意任何陳述，不論內容。解決：混合正向題和反向題（reverse-coded items）。\n\n不管題目內容如何都傾向同意——這叫什麼？",h2:"This is ___ response set, where respondents tend to ___ regardless of ___.",m:"This is acquiescence response set (yes-saying bias), where respondents tend to agree with statements regardless of content. It is a common problem with long questionnaires using Likert scales. Researchers counter it by including reverse-coded items.",r:"Correct identification (1pt) + explanation (1pt) = 2"},
{id:54,t:"B",w:"W4",title:"Obama birthplace wording",q:"The slides showed four different wordings of a question about Obama's birthplace. What was the range of correct answers, and what does this demonstrate?",h1:"📖 Question wording effect：同一個問題用不同措辭，結果差異巨大。Obama 出生地四種問法，正確率從 58% 到 77%——差 19 個百分點。\n\n不同問法得到的「正確」回答比例差多少？這說明了什麼問題？",h2:"The percentage of correct answers ranged from ___% to ___%. This demonstrates that ___.",m:"The percentage of correct answers ranged from 58% to 77% depending on wording. This demonstrates that question wording has a strong impact on survey results. Even factual questions can produce different distributions based on how options are framed, whether a middle option is offered, and whether suggestive preambles are included.",r:"Range mentioned (1pt) + lesson about wording effects (1pt) + example of difference (1pt) = 3"},
{id:55,t:"B",w:"W4",title:"WVS trust question problem",q:"The WVS asks: 'Would you say that most people can be trusted?' What problem does this have in cross-cultural research?",h1:"📖 Cross-cultural validity 問題：WVS 信任問題中「most people」在不同文化指不同對象（家人？鄰居？陌生人？）。中國的高信任度與當地觀察不符 → 當演繹法失敗，退一步用歸納法。\n\n「大多數人」在不同文化中可能指不同對象。中國的高信任度有什麼問題？",h2:"The problem is that the word '___' can be interpreted differently. In some cultures it means ___, in others ___. Research in ___ found that ___.",m:"The problem is that 'most people' can be interpreted differently across cultures. In some cultures it means strangers, in others neighbors or family. Research in China found that high trust scores did not match local observations, because Chinese respondents interpreted 'people' as in-group members. This shows why deductive approaches sometimes fail and inductive methods are needed.",r:"Identify ambiguity (1pt) + cross-cultural interpretation (1pt) + China example (1pt) = 3"},
{id:56,t:"A",w:"W3",title:"NOIR: Education ranking",q:"What level of measurement is 'education level' coded as: high school < bachelor's < master's < PhD?",h1:"📖 Ordinal＝有排序但間距不等。High school < Bachelor's < Master's < PhD 有明確順序，但 HS→BA 的「距離」不等於 MA→PhD 的「距離」。\n\n有順序嗎？各等級之間的距離相等嗎？",h2:"This is ___ level because the categories have ___ but the intervals are ___.",m:"This is ordinal level because the categories have a meaningful rank order (PhD is higher than master's), but the intervals between levels are not necessarily equal.",r:"Correct level (1pt) + explanation (1pt) = 2"},
{id:57,t:"B",w:"W3",title:"Content validity",q:"Explain content validity. How is it different from face validity?",h1:"📖 Content validity＝測量是否涵蓋概念的全部範圍。比 face validity 更強——不只「看起來合理」，而是系統性地檢查所有面向都被涵蓋。\n\n內容效度關注測量是否涵蓋概念的所有面向，而表面效度只是「看起來合理」。",h2:"Content validity is ___. Unlike face validity which only asks ___, content validity requires ___.",m:"Content validity is the degree to which a measure covers the full range of meanings included within a concept. Unlike face validity, which only asks whether a measure seems reasonable on the surface, content validity requires systematic examination of whether all dimensions are represented. For example, a political knowledge test with content validity would cover domestic policy, foreign policy, and institutions.",r:"Definition (1pt) + distinction from face (1pt) + example (1pt) = 3"},
{id:58,t:"B",w:"W3",title:"Criterion-related validity",q:"Explain criterion-related validity. Give the example from the slides.",h1:"📖 Criterion-related validity（效標關聯效度 / 預測效度）＝測量與外部標準的相關程度。簡報例：College Board tests → 能預測大學成績 GPA。\n\n效標效度看測量工具是否能預測某個外部標準。課堂例子是？",h2:"Criterion-related validity is ___. The example is ___, shown by its ability to ___.",m:"Criterion-related validity is the degree to which a measure relates to some external criterion. The example from the slides is College Board test scores, whose validity is demonstrated by their ability to predict students' college success (GPA).",r:"Definition (1pt) + example (1pt) + explanation (1pt) = 3"},
{id:59,t:"B",w:"W4",title:"Mean, median, mode",q:"Define mean, median, and mode. If a few billionaires are in your income dataset, which measure is most misleading?",h1:"📖 三種集中趨勢量數：Mean（平均數）＝所有值的平均、Median（中位數）＝排序後中間的值（不受極端值影響）、Mode（眾數）＝最常出現的值。\n\n平均數受極端值影響最大。中位數不受影響。",h2:"Mean is ___. Median is ___. Mode is ___. The ___ would be most misleading because ___.",m:"Mean is the average score. Median is the middle score in a distribution. Mode is the most frequently occurring score. The mean would be most misleading because a few billionaires would pull the average far above what most people earn. The median would better represent typical income.",r:"Three definitions (1pt each) + misleading measure (1pt) = 4"},
{id:60,t:"B",w:"W4",title:"SD vs SE",q:"What is the difference between standard deviation and standard error?",h1:"📖 SD（Standard Deviation）＝描述樣本的離散程度。SE（Standard Error）＝描述樣本平均數估計母體平均數的精確度。SE = SD / √n → 樣本越大，SE 越小。\n\nSD 描述樣本的離散程度，SE 用於推論統計。SE = SD / √n。",h2:"SD measures ___. SE measures ___. The formula SE = ___ shows that as n increases, SE ___.",m:"Standard deviation measures how spread out individual observations are around the sample mean. Standard error measures how precisely the sample mean estimates the population mean. SE = SD / sqrt(n), so as sample size increases, SE decreases, meaning our estimate becomes more precise.",r:"SD definition (1pt) + SE definition (1pt) + relationship (1pt) = 3"},
{id:61,t:"A",w:"W4",title:"p-value interpretation",q:"A t-test returns p = 0.03. What does this mean? What is the threshold for statistical significance?",h1:"📖 p-value＝在 H₀ 為真的前提下，觀察到這種（或更極端）結果的機率。p < 0.05 → 拒絕 H₀ → 統計顯著。不是「假設為真的機率」！\n\np 值不是「假設為真的機率」。門檻是 0.05。",h2:"A p-value of 0.03 means ___. The threshold is ___. Since 0.03 ___ 0.05, we ___.",m:"A p-value of 0.03 means that if the null hypothesis were true, there would only be a 3% probability of observing data this extreme. The threshold is p < 0.05. Since 0.03 < 0.05, we reject the null hypothesis; the result is statistically significant.",r:"Correct interpretation (1pt) + threshold + decision (1pt) = 2"},
{id:62,t:"B",w:"W2",title:"Null hypothesis",q:"What is a null hypothesis? Why do we test H₀ rather than directly proving H₁?",h1:"📖 Null hypothesis (H₀)＝沒有效果/沒有關係。統計邏輯：嘗試拒絕 H₀。p < 0.05 → 拒絕 H₀。p > 0.05 → 無法拒絕（不代表 H₀ 為真）。\n\nH₀ = 沒有效果/沒有關係。我們是測試能否「拒絕」它。",h2:"The null hypothesis states ___. We test it because ___. If p < 0.05, we ___.",m:"The null hypothesis states that there is no effect or no relationship between variables. We test it because we cannot directly prove a hypothesis is true; we can only show the null hypothesis is unlikely. If p < 0.05, we reject H₀ and say our data supports the research hypothesis.",r:"Definition (1pt) + why we test H₀ (1pt) + example (1pt) = 3"},
{id:63,t:"B",w:"W4",title:"Four sampling types",q:"Name and briefly describe two probability and two nonprobability sampling methods.",h1:"📖 機率抽樣：SRS（簡單隨機）、Stratified（分層）。非機率抽樣：Convenience（便利）、Snowball（滾雪球）、Quota（配額）、Purposive（立意）。EPSEM＝每個成員等機率被選中。\n\n機率：簡單隨機、分層。非機率：便利、滾雪球。",h2:"Probability: (1) ___, where ___; (2) ___, where ___. Nonprobability: (1) ___, where ___; (2) ___, where ___.",m:"Probability: (1) Simple random sampling — every member has equal chance of selection. (2) Stratified sampling — population divided into homogeneous subgroups, then random samples drawn from each. Nonprobability: (1) Convenience sampling — using whoever is readily available. (2) Snowball sampling — participants recruit additional participants from their networks.",r:"Each method described (1pt each) = 4"},
{id:64,t:"A",w:"W4",title:"EPSEM",q:"What does EPSEM stand for? Why is it important?",h1:"📖 EPSEM = Equal Probability of Selection Method。每個成員被選中的機率相同。機率抽樣的核心原則，確保樣本代表性。\n\n每個成員被選中的機率相等。代表性的基礎。",h2:"EPSEM stands for ___. It means ___. It ensures ___.",m:"EPSEM stands for Equal Probability of Selection Method. It means each member of the population has the same chance of being selected. This ensures the sample is representative, allowing valid inferences from sample to population.",r:"Acronym (1pt) + importance (1pt) = 2"},
{id:65,t:"A",w:"W4",title:"Nonresponse bias",q:"In the Literary Digest poll, 10M ballots sent but only 2.4M returned. Besides coverage bias, what other representation error is this?",h1:"📖 Nonresponse bias＝有回應的人與沒回應的人在特徵上有系統性差異。與 coverage bias（抽樣框不完整）不同——nonresponse 是「寄到了但沒回」。\n\n寄出但只有部分人回覆——回覆的人可能和沒回覆的不同。",h2:"This illustrates ___ bias, which occurs when ___.",m:"This illustrates nonresponse bias, which occurs when people who respond differ systematically from those who do not. The 24% who responded may have been more politically motivated (particularly Landon supporters), creating a biased sample.",r:"Correct identification (1pt) + explanation (1pt) = 2"},
{id:66,t:"B",w:"W5",title:"Manipulation check",q:"What is a manipulation check? Give an example of a factual and a subjective type.",h1:"📖 Manipulation check＝確認受試者確實接收到 treatment。Factual type：問來源/內容。Subjective type：問感受/趣味性。放在測量 DV 之後。\n\n確認受試者確實接收到實驗操弄。有事實性和主觀性兩種。",h2:"A manipulation check is ___. A factual check: ___. A subjective check: ___.",m:"A manipulation check verifies that participants perceived the experimental manipulation as intended. A factual check might ask 'What was the source of the article you read?' A subjective check might ask 'How funny did you find the post?' If the check fails, the treatment may not have worked.",r:"Definition (1pt) + factual example (1pt) + subjective example (1pt) = 3"},
{id:67,t:"A",w:"W5",title:"Preregistration",q:"What is preregistration? Why is it recommended for experiments?",h1:"📖 Preregistration（如 osf.io）＝在收集資料前公開登記假設、方法、樣本量。防止 HARKing（看結果才編假設）和 p-hacking（嘗試各種分析找顯著）。\n\n在 osf.io 上預先登記假設和方法。防止事後編假設。",h2:"Preregistration means ___. It prevents ___.",m:"Preregistration means publicly recording hypotheses, methods, and planned sample size before conducting the study (e.g., on osf.io). It prevents HARKing (Hypothesizing After Results are Known) and p-hacking, increasing research transparency and credibility.",r:"Definition (1pt) + purpose (1pt) = 2"},
{id:68,t:"A",w:"W5",title:"Power analysis",q:"What is a power analysis? Why should researchers do it before an experiment?",h1:"📖 Power analysis＝計算偵測特定效果量所需的最小樣本數。樣本太小 → 可能錯過真實效果（Type II error）。\n\n確保樣本量足以檢測效果。樣本太小 → Type II error。",h2:"A power analysis determines ___. Without it, a study might ___.",m:"A power analysis determines the minimum sample size needed to detect an effect of a given size. Without sufficient power, a study might fail to find a real effect (Type II error), wasting time and resources.",r:"Definition (1pt) + why important (1pt) = 2"},
{id:69,t:"A",w:"W1",title:"Golden hammer fallacy",q:"What is the 'golden hammer' fallacy in research methods?",h1:"📖 Golden hammer fallacy＝「手上只有錘子，所有東西看起來都像釘子」。只會一種方法就用它解決所有問題。應根據研究問題選方法。\n\n「當你手上只有錘子，所有東西看起來都像釘子。」",h2:"The golden hammer fallacy means ___. In research, this happens when ___.",m:"The golden hammer fallacy means relying on one familiar method for every problem, like 'when all you have is a hammer, everything looks like a nail.' In research, this happens when a scholar always uses only one method regardless of the research question.",r:"Definition (1pt) + application (1pt) = 2"},
{id:70,t:"B",w:"W1",title:"Characteristics of science",q:"List at least five characteristics of science from Keyton (p. 10-11).",h1:"📖 Keyton (p.10-11) 科學十大特徵：evidence-based、testable、replicable、public record、self-correcting、measurement/observation、error control、objectivity、skepticism、generalizability、heuristic。\n\n證據、可檢驗、可重複、公開、自我修正、測量、控制誤差、客觀、懷疑、可推廣、啟發性。",h2:"(1) ___; (2) ___; (3) ___; (4) ___; (5) ___.",m:"(1) Evidence-based. (2) Testable/falsifiable. (3) Replicable and part of the public record. (4) Relies on measurement and observation. (5) Self-correcting. Other valid answers: objective, skeptical, generalizable, heuristic, acknowledges error.",r:"5 correct characteristics (1pt each) = 5"},
{id:71,t:"B",w:"W1",title:"Sources of research questions",q:"What are the three sources of research questions according to Keyton? Which are necessary?",h1:"📖 研究問題三來源 (Keyton p.12)：(1) Theoretical significance 理論重要性（必要）(2) Social importance 社會重要性（必要）(3) Personal interest 個人興趣（推薦但非必要）。\n\n理論重要性、社會重要性、個人興趣。哪兩個是必要的？",h2:"The three sources are: (1) ___; (2) ___; (3) ___. ___ and ___ are necessary.",m:"The three sources are: (1) theoretical significance, (2) social importance, and (3) personal interest. Theoretical significance and social importance are necessary. Personal interest is recommended but not required.",r:"Three sources (1pt each) + which necessary (1pt) = 4"},
{id:72,t:"A",w:"W2",title:"Spurious correlation",q:"What is a spurious correlation? Give the shoe size / math ability example.",h1:"📖 Spurious correlation＝兩個變數看似相關，但實際是第三變數同時影響兩者。例：鞋子大小 vs 數學能力 → 第三變數：年齡。控制第三變數後相關消失。\n\n兩個變項看似相關但實際上是由第三個變項造成的。",h2:"A spurious correlation occurs when ___. For example, shoe size and math ability correlate because ___.",m:"A spurious correlation occurs when two variables appear related but the relationship is caused by a third variable. For example, shoe size and math ability correlate because both are influenced by age — older children have bigger feet AND better math skills. Controlling for age, the correlation disappears.",r:"Definition (1pt) + example (1pt) = 2"},
{id:73,t:"B",w:"W4",title:"Total Survey Error Framework",q:"Describe the Total Survey Error Framework. What are the two main categories?",h1:"📖 Total Survey Error = Representation errors（覆蓋偏差、抽樣誤差、無回應偏差）+ Measurement errors（問題措辭、引導性問題、社會期望性偏差）。\n\n調查總誤差 = 代表性誤差 + 測量誤差。",h2:"Total survey error = ___ + ___. Representation errors include ___. Measurement errors include ___.",m:"Total survey error = representation errors + measurement errors. Representation errors (who responds): coverage bias, sampling error, nonresponse bias. Measurement errors (how questions are asked): question wording effects, social desirability bias, leading questions.",r:"Two categories (1pt) + examples of each (1pt each) = 3"},
{id:74,t:"B",w:"W2",title:"Enron recursive quality",q:"Explain 'recursive quality' in social science using the Enron example from Babbie.",h1:"📖 Recursive quality（Babbie p.9-11）＝社會科學研究的結果會反過來影響被研究對象的行為。Enron 例：研究發表後高管改變語言行為，使原始發現不再有用。\n\n研究結果會反過來影響被研究對象的行為。",h2:"Recursive quality means ___. The Enron example showed ___. Once published, ___.",m:"Recursive quality means social science findings can change the behavior being studied. The Enron example showed executives who lied used exaggerated emotions ('fantastic' instead of 'good') and fewer references to shareholders. Once published, executives would change their behavior to avoid detection, making original findings less useful.",r:"Definition (1pt) + Enron details (1pt) + implication (1pt) = 3"},
{id:75,t:"C",w:"W5",title:"Jungherr & Rauchfleisch 2025 study",q:"Describe the Jungherr & Rauchfleisch (2025) AI deliberation study. What was the design and the 'AI penalty'?",h1:"📖 Jungherr & Rauchfleisch (2025)：Within-subject design。每人做 3 個 AI moderator + 3 個 human moderator 任務。AI penalty = 參與意願低 0.30 分。與 AI risk/benefit perception 有 interaction effects。\n\nWithin-subject 設計，比較 AI 和人類主持。AI penalty = 0.30 分差。",h2:"The study compared ___. The design was ___. The 'AI penalty' refers to ___.",m:"The study compared AI moderation vs. human moderation in deliberation. It used a within-subject design: each participant did 3 tasks with AI moderator and 3 with human moderator. The 'AI penalty' is that participants rated AI moderation 0.30 points lower on willingness to participate. They also found interaction effects with AI risk/benefit perceptions.",r:"Design (1pt) + within-subject explanation (1pt) + AI penalty (1pt) + interaction (1pt) = 4"},
{id:76,t:"D",w:"W4",title:"R: mean() and sd()",q:"What is the output of this R code?\n\nx <- c(10, 20, 30, 40, 50)\nmean(x)\nsd(x)",h1:"📖 R 基本函式：mean() 計算平均數、sd() 計算標準差、c() 組合物件、str() 查看結構。\n\nmean() 算平均，sd() 算標準差。",h2:"mean(x) returns ___ because ___. sd(x) returns approximately ___.",m:"mean(x) returns 30 because (10+20+30+40+50)/5 = 30. sd(x) returns approximately 15.81 (the standard deviation measuring how spread out values are around the mean).",r:"Correct mean (1pt) + correct SD approximation (1pt) + explanation (1pt) = 3"},
{id:77,t:"B",w:"W4",title:"Sampling frame",q:"What is a sampling frame? Why is it important? What happens if it's incomplete?",h1:"📖 Sampling frame＝用來抽樣的名單/清冊。如果不完整 → coverage bias。例：Literary Digest 用電話/汽車名冊 → 遺漏窮人。\n\n抽樣框架 = 用來抽樣的名單。不完整就造成覆蓋偏差。",h2:"A sampling frame is ___. If incomplete, it leads to ___ bias. For example, ___.",m:"A sampling frame is the list of units from which a sample is selected. If incomplete, it leads to coverage bias — parts of the target population are excluded. For example, the Literary Digest used telephone/car records as a sampling frame, missing lower-income voters who had neither.",r:"Definition (1pt) + coverage bias (1pt) + example (1pt) = 3"},
{id:78,t:"B",w:"W4",title:"Question order effects",q:"Why does question order matter in questionnaires? What is the recommended order?",h1:"📖 Question order effects：前面的問題影響後面的回答（context effects）。建議順序：最有趣的先放、無聊的後放、人口統計最後、敏感問題不放第一。\n\n最有趣的放前面，人口統計放後面，敏感問題不要放第一。",h2:"Question order matters because ___. The recommended order is: first ___, then ___, finally ___.",m:"Question order matters because earlier questions influence how respondents interpret later ones (context effects). The recommended order is: most interesting items first, duller questions later, demographics at the end. Sensitive questions should not be placed first.",r:"Why order matters (1pt) + recommended sequence (1pt) + sensitive Q note (1pt) = 3"},
{id:79,t:"C",w:"W5",title:"Design a 2x2 experiment",q:"Design a 2x2 factorial experiment testing whether (1) AI-labeled articles reduce sharing and (2) this effect differs for politically concordant content. Identify factors, levels, and conditions.",h1:"📖 Factorial design：兩個以上 IV 的組合。2×2 = 兩個 IV 各兩個水準 = 4 個條件。Interaction effect＝一個 IV 的效果取決於另一個 IV 的水準。\n\n兩個自變項各有兩個水準 → 2×2 = 4 個條件。",h2:"Factor 1: ___ (levels: ___). Factor 2: ___ (levels: ___). This creates 4 conditions: ___.",m:"Factor 1: labeling (AI-labeled vs. no label). Factor 2: political concordance (concordant vs. discordant). 4 conditions: (1) AI-labeled + concordant, (2) AI-labeled + discordant, (3) no label + concordant, (4) no label + discordant. The interaction effect tests whether the AI label effect differs by concordance.",r:"Factors/levels (1pt) + conditions listed (1pt) + interaction explained (1pt) = 3"},
{id:80,t:"B",w:"W6",title:"Codebook vs code sheet",q:"What is the difference between a codebook and a code sheet in content analysis?",h1:"📖 Codebook＝指導手冊（Word），定義變數和編碼規則。Code sheet＝資料記錄表（Excel），編碼者填入數據。Codebook 定義規則，code sheet 記錄資料。\n\nCodebook = 指導手冊（Word）。Code sheet = 資料記錄表（Excel）。",h2:"A codebook is ___ that ___. A code sheet is ___ where ___.",m:"A codebook is an instruction document that defines variables, categories, and coding rules for coders. A code sheet is the structured data recording form (e.g., Excel spreadsheet) where coders enter their coded values. The codebook defines the rules; the code sheet records the data.",r:"Codebook definition (1pt) + code sheet definition (1pt) + distinction (1pt) = 3"},
{id:81,t:"B",w:"W6",title:"Automated content analysis methods",q:"Name three approaches to automated content analysis from the slides.",h1:"📖 自動內容分析方法（從簡單到複雜）：Dictionary-based（關鍵字頻率）→ Topic models（LDA/BERTopic）→ Word embeddings（BERT）→ Open source LLMs（Llama）→ Commercial LLMs（ChatGPT）。都需要人工驗證。\n\n字典法、主題模型、Transformer/BERT、LLM。",h2:"Three approaches: (1) ___, which ___; (2) ___, which ___; (3) ___, which ___.",m:"(1) Dictionary-based approaches — count predefined word frequencies. (2) Transformer models like BERT — use context-aware word embeddings. (3) Large Language Models like ChatGPT — classify text using prompts. Each still requires validation against human-coded samples.",r:"Three approaches named + described (1pt each) = 3"},
{id:82,t:"A",w:"W3",title:"NOIR: Temperature Celsius",q:"Is temperature in Celsius interval or ratio? Why?",h1:"📖 Interval vs Ratio 的關鍵區別：有沒有「絕對零點」。攝氏 0°C ≠ 沒有溫度（只是水的冰點）→ Interval。Kelvin 0K = 絕對零度 → Ratio。\n\n0°C 代表「沒有溫度」嗎？絕對零度在哪個溫標？",h2:"Temperature in Celsius is ___ because ___. Zero degrees does not mean ___.",m:"Temperature in Celsius is interval because differences between degrees are equal, but 0°C does not represent absolute zero (it's just the freezing point of water). Temperature in Kelvin would be ratio because 0K is absolute zero.",r:"Correct level (1pt) + explanation (1pt) = 2"},
{id:83,t:"C",w:"W5",title:"Mixed design identification",q:"In Pennycook et al. (2021), participants were randomly assigned to control or treatment. All rated 24 headlines (12 true, 12 false). Identify the between- and within-subjects factors.",h1:"📖 Mixed design＝結合 between-subjects 和 within-subjects。Pennycook：Between = accuracy prompt vs control（不同人不同組）。Within = true vs false headlines（每人都看兩種）。\n\nBetween = 是否被問準確性。Within = 真假標題。",h2:"Between-subjects factor: ___ because ___. Within-subjects factor: ___ because ___. This is called a mixed design because ___.",m:"Between-subjects: accuracy treatment (control vs. prompt) because each participant is in only one condition. Within-subjects: headline veracity (true vs. false) because every participant rates both types. This is a mixed design because it combines both factors.",r:"Between factor (1pt) + within factor (1pt) + mixed explanation (1pt) = 3"},
{id:84,t:"D",w:"W4",title:"R: Interpret full t.test output",q:"Interpret this R output:\n\nt = 2.45, df = 98, p-value = 0.016\n95% CI: [0.12, 1.08]\nmean of x: 4.10, mean of y: 3.50",h1:"📖 R t.test 輸出解讀：看 p-value（< 0.05？）、95% CI（包含 0？）、group means（哪組高？）。CI 不包含 0 → 確認顯著性。\n\np < 0.05 嗎？CI 有沒有包含 0？",h2:"The difference ___ significant because p = ___. The CI [___] does not include ___. Group x scored ___ than group y.",m:"The difference is statistically significant (p = 0.016 < 0.05), so we reject H₀. The 95% CI [0.12, 1.08] does not include 0, confirming the significance. Group x (M=4.10) scored higher than group y (M=3.50), a difference of 0.60.",r:"Significance (1pt) + CI interpretation (1pt) + group comparison (1pt) = 3"},
{id:85,t:"B",w:"W2",title:"Three causation requirements",q:"What are the three requirements for establishing causation? Why is correlation alone insufficient?",h1:"📖 Nomothetic causality 三要件：(1) Association 兩變數有相關 (2) Time order 因在果之前 (3) Nonspuriousness 非虛假（排除第三變數）。Correlation alone ≠ causation。\n\n(1) 相關 (2) 時間先後 (3) 非虛假關係。想想冰淇淋和溺水的例子。",h2:"The three requirements are: (1) ___; (2) ___; (3) ___. Correlation alone is insufficient because ___.",m:"The three requirements are: (1) association — variables must be correlated, (2) time order — cause precedes effect, (3) nonspuriousness — no third variable explains the relationship. Correlation alone is insufficient because two variables might be related only through a confound (e.g., ice cream sales and drowning both caused by hot weather).",r:"Three requirements (1pt each) + example (1pt) = 4"},
{id:86,t:"B",w:"W4",title:"Stratified sampling",q:"What is stratified sampling? When is it useful?",h1:"📖 Stratified sampling＝先按特定變數（性別、年齡、地區）把母體分成同質子群體（strata），再從每組分別隨機抽樣。比 SRS 更精確，確保各群體都有代表。\n\n先分成同質子群，再從每組隨機抽樣。",h2:"Stratified sampling involves ___. It is useful when ___.",m:"Stratified sampling involves dividing the population into homogeneous subgroups (strata), then drawing random samples from each. It is useful when the population has known subgroups that differ on the variable of interest, ensuring each subgroup is adequately represented and producing more precise estimates.",r:"Definition (1pt) + when useful (1pt) + benefit (1pt) = 3"},
{id:87,t:"A",w:"W5",title:"History threat",q:"What is the 'history' threat to internal validity? Give an example.",h1:"📖 History threat＝實驗期間發生外部事件影響 DV，與 treatment 無關。其他威脅：Maturation（自然成熟）、Testing（前測影響後測）、Selection（選擇偏差）、Differential attrition（差異性流失）。\n\n實驗期間發生了外部事件，影響了結果。",h2:"The history threat occurs when ___. For example, ___.",m:"The history threat occurs when external events during the experiment affect the DV independently of the treatment. For example, if studying media literacy training over 4 weeks and a major fake news scandal occurs during week 3, participants' awareness might increase regardless of the training.",r:"Definition (1pt) + example (1pt) = 2"},
{id:88,t:"C",w:"W4",title:"Design a sampling strategy",q:"You want to study how Taiwanese newspaper journalists use AI tools. Propose a sampling strategy and identify potential problems.",h1:"📖 設計抽樣策略時考慮：(1) 定義母體 (2) 選擇/建立 sampling frame (3) 選擇抽樣方法 (4) 預見 coverage bias、nonresponse bias (5) 操作定義的挑戰（如「記者」怎麼定義）。\n\n如何定義和找到所有記者？名單從哪來？會遺漏誰？",h2:"Sampling frame: ___. Method: ___. Problems: ___.",m:"Sampling frame: journalism association membership lists or newspaper employee directories. Method: stratified sampling by newspaper to ensure representation across outlets. Problems: not all journalists are association members (coverage bias), freelancers excluded, low response rates from busy professionals (nonresponse bias), and defining who counts as a 'journalist' (operational definition challenge).",r:"Frame (1pt) + method (1pt) + problems (2pts) = 4"},
{id:89,t:"D",w:"W1",title:"R: c() mixed types",q:'What is the output of c(TRUE, "University", 3, 9.33) in R? What data type is the result?',h1:"📖 R 向量型別優先順序：character > numeric > logical。有 character 就全變 character。c(TRUE, \"University\", 3, 9.33) → [\"TRUE\", \"University\", \"3\", \"9.33\"]。\n\n向量只能有一種型態。character > numeric > logical。",h2:'The output is ___. The type is ___ because ___.',m:'The output is ["TRUE", "University", "3", "9.33"] — all character strings. Because R vectors can only hold one type and follow the hierarchy character > numeric > logical, everything is coerced to character since "University" is present.',r:"Correct output (1pt) + type (1pt) + coercion rule (1pt) = 3"},
{id:90,t:"B",w:"W1",title:"Five types of research questions",q:"Name the five types of research questions from Keyton (p. 12-13). Give one example for any two types.",h1:"📖 五種研究問題類型 (Keyton p.12-13)：(1) Definition 定義（是什麼）(2) Relationships 關係（有沒有關聯）(3) Cause & effect 因果（X 是否導致 Y）(4) Value 價值（應該怎麼做）(5) Policy 政策（介入有沒有效）。\n\n定義、關係、因果、價值、政策。",h2:"(1) Questions of ___ ask ___. (2) ___ (3) ___ (4) ___ (5) ___. Example of type ___: ___.",m:"(1) Definition — describe a phenomenon. (2) Relationships — associations between variables. (3) Cause and effect — does X cause Y? (4) Value — what should be done? (5) Policy — does an intervention work? Example definition: 'What are alternative media?' Example cause/effect: 'Does exposure to disinformation lower trust?'",r:"5 types named (1pt each, cap at 3) + 2 examples (1pt) = 4"},
];

const TYPES = {A:"Type A: Judge+Explain 判斷+解釋",B:"Type B: Short Answer 簡答",C:"Type C: Apply 應用",D:"Type D: R Code"};
let currentQid=1;
let activeType="All";

function getRecords(){try{return JSON.parse(localStorage.getItem('coreme_sa_records')||'{}')}catch{return {}}}
function saveRecords(r){localStorage.setItem('coreme_sa_records',JSON.stringify(r))}
function getApiKey(){return localStorage.getItem('coreme_api_key')||''}

function initTypeFilters(){
  const el=document.getElementById('typeFilters');
  ['All','A','B','C','D'].forEach(t=>{
    const btn=document.createElement('button');
    btn.textContent=t==='All'?'All':t;
    btn.className=t===activeType?'active':'';
    btn.onclick=()=>{activeType=t;document.querySelectorAll('.type-filters button').forEach(b=>b.classList.remove('active'));btn.classList.add('active');renderSidebar()};
    el.appendChild(btn);
  });
}

function renderSidebar(){
  const records=getRecords();
  const filtered=activeType==='All'?Q:Q.filter(q=>q.t===activeType);
  document.getElementById('qList').innerHTML=filtered.map(q=>{
    const rec=records[q.id];
    let badge='';
    if(rec&&rec.grades&&rec.grades.length>0){const s=rec.grades[rec.grades.length-1].score;badge=`<span class="q-badge graded">${s}pts</span>`}
    else if(rec&&rec.draft)badge='<span class="q-badge draft">Draft</span>';
    return `<li class="${q.id===currentQid?'active':''}" onclick="selectQ(${q.id})"><span class="type-tag ${q.t}">${q.t}</span>Q${q.id} ${q.title} ${badge}</li>`;
  }).join('');
}

function selectQ(id){saveDraft();currentQid=id;renderSidebar();renderMain()}

function renderMain(){
  const q=Q.find(x=>x.id===currentQid);
  const rec=getRecords()[q.id]||{};
  const draft=rec.draft||'';
  const grades=rec.grades||[];
  const isCode=q.t==='D';
  const qText=isCode?formatCodeInQ(q.q):esc(q.q);

  let hist='';
  if(grades.length>0){
    hist='<div class="history-section"><h4>Past Attempts ('+grades.length+')</h4>';
    grades.slice().reverse().forEach(g=>{
      hist+=`<div class="history-item"><span class="h-date">${g.date}</span> — <span class="h-score">${g.score}pts</span><details style="margin-top:4px"><summary style="cursor:pointer;color:#64748b;font-size:11px">Details</summary><div style="margin-top:6px;font-size:12px;color:#94a3b8"><b>Your answer:</b><pre style="white-space:pre-wrap;color:#d1d5db;margin:4px 0 6px">${esc(g.answer)}</pre><b>Feedback:</b><pre style="white-space:pre-wrap;color:#d1d5db;margin-top:4px">${esc(g.feedback)}</pre></div></details></div>`;
    });
    hist+='</div>';
  }

  document.getElementById('mainArea').innerHTML=`
    <div class="question-card">
      <div class="q-header">
        <span class="q-number">Q${q.id}/${Q.length}</span>
        <span class="type-tag ${q.t}" style="font-size:11px">${TYPES[q.t]}</span>
        <span class="q-week">${q.w}</span>
      </div>
      <div class="q-text">${qText}</div>
      <div class="q-word-target">Target: ${q.t==='A'?'1-2 sentences':q.t==='D'?'2-4 sentences':'3-5 sentences'}</div>
      <div class="hint-section">
        <button class="hint-toggle" onclick="toggleHint()">💡 Hint</button>
        <div class="hint-box" id="hintBox">
          <div class="hint-strategy">📌 策略：${esc(q.h1)}</div>
          <div class="hint-scaffold">✏️ English scaffold:\n${esc(q.h2)}</div>
        </div>
      </div>
    </div>
    <div class="answer-area">
      <label>Your Answer:</label>
      <textarea id="answerInput" placeholder="Write ${q.t==='A'?'1-2':q.t==='D'?'2-4':'3-5'} sentences in English...">${esc(draft)}</textarea>
      <div class="meta"><span id="charCount">${draft.length} chars</span><span>${q.t==='A'?'~20-40 words':q.t==='D'?'~30-60 words':'~40-80 words'}</span></div>
    </div>
    <div class="action-bar">
      <button class="btn btn-blue" onclick="submitGrade()" id="gradeBtn">🤖 AI Grade</button>
      <button class="btn btn-gray" onclick="saveDraft()">💾 Save</button>
      <button class="btn btn-green" onclick="toggleModel()">📖 Model Answer</button>
      <button class="btn btn-gray" onclick="nextQ()">Next →</button>
    </div>
    <div class="grade-result" id="gradeResult"></div>
    <div class="model-answer" id="modelAnswer"><h4>📖 Model Answer</h4>${esc(q.m)}</div>
    ${hist}`;
  document.getElementById('answerInput').addEventListener('input',e=>{document.getElementById('charCount').textContent=e.target.value.length+' chars'});
}

function formatCodeInQ(text){
  return esc(text).replace(/^(&gt;.*)$/gm,'<code>$1</code>').replace(/\n\n/g,'</p><p>');
}
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function toggleHint(){document.getElementById('hintBox').classList.toggle('show')}
function toggleModel(){document.getElementById('modelAnswer').classList.toggle('show')}
function saveDraft(){const ta=document.getElementById('answerInput');if(!ta)return;const r=getRecords();if(!r[currentQid])r[currentQid]={};r[currentQid].draft=ta.value;saveRecords(r);renderSidebar()}
function nextQ(){saveDraft();const i=Q.findIndex(q=>q.id===currentQid);const filtered=activeType==='All'?Q:Q.filter(q=>q.t===activeType);const ci=filtered.findIndex(q=>q.id===currentQid);if(ci<filtered.length-1)selectQ(filtered[ci+1].id)}

async function submitGrade(){
  const ans=document.getElementById('answerInput').value.trim();
  if(!ans){alert('Write an answer first!');return}
  const key=getApiKey();
  if(!key){showApiModal();return}
  const q=Q.find(x=>x.id===currentQid);
  const el=document.getElementById('gradeResult');
  const btn=document.getElementById('gradeBtn');
  btn.disabled=true;btn.textContent='⏳...';
  el.className='grade-result show';
  el.innerHTML='<div class="loading"><div class="spinner"></div> AI grading...</div>';

  const sys=`You are grading a COREME midterm exam (Communication Research Methods, NTU). This is a SHORT ANSWER exam.

RUBRIC: ${q.r}
MODEL ANSWER: ${q.m}

GRADING CRITERIA:
- Correct use of English terminology (MOST important)
- Conceptual accuracy
- Concrete example when required
- Concise expression is IDEAL — do NOT penalize brief answers if correct

DO NOT penalize for: grammar mistakes (if meaning is clear), short answers (if key terms are correct)

RESPOND IN THIS FORMAT:
SCORE: [number] / [total from rubric]

STRENGTHS: (1-2 bullet points in Chinese)

MISSING: (key English terms or concepts the student should have included, in Chinese)

IMPROVED VERSION: (Write a corrected/improved version of the student's answer in English, keeping their structure but fixing errors and adding missing terms)`;

  try{
    const resp=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','x-api-key':key,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},body:JSON.stringify({model:'claude-haiku-4-5-20251001',max_tokens:800,system:sys,messages:[{role:'user',content:`QUESTION: ${q.q}\n\nSTUDENT ANSWER:\n${ans}`}]})});
    if(!resp.ok){const err=await resp.json().catch(()=>({}));throw new Error(err.error?.message||'API error '+resp.status)}
    const data=await resp.json();
    const fb=data.content[0].text;
    const sm=fb.match(/SCORE:\s*(\d+)/i);
    const score=sm?sm[1]:'?';
    const r=getRecords();if(!r[currentQid])r[currentQid]={};if(!r[currentQid].grades)r[currentQid].grades=[];
    r[currentQid].grades.push({date:new Date().toLocaleString('zh-TW'),answer:ans,score,feedback:fb});
    r[currentQid].draft='';saveRecords(r);
    const sc=parseInt(score);const color=sc>=3?'#4ade80':sc>=2?'#fbbf24':'#f87171';
    el.innerHTML=`<div class="grade-score"><span class="sn" style="color:${color}">${score}</span><span class="st"> pts</span></div><div class="grade-feedback">${esc(fb)}</div>`;
    renderSidebar();
  }catch(err){el.innerHTML=`<div style="color:#f87171;padding:12px">Error: ${esc(err.message)}</div>`}
  finally{btn.disabled=false;btn.textContent='🤖 AI Grade'}
}

function showApiModal(){document.getElementById('apiModal').classList.add('show')}
function closeApiModal(){document.getElementById('apiModal').classList.remove('show')}
function saveApiKey(){const k=document.getElementById('apiKeyInput').value.trim();if(k){localStorage.setItem('coreme_api_key',k);updateApi();closeApiModal()}}
function updateApi(){const el=document.getElementById('apiStatus');if(getApiKey()){el.className='api-status ok';el.textContent='✓ API Key Set'}else{el.className='api-status no';el.textContent='Set API Key'}}

function exportHistory(){
  const r=getRecords();let md='# COREME Short Answer Records\n\n';
  Q.forEach(q=>{const rec=r[q.id];if(rec&&rec.grades&&rec.grades.length>0){md+=`## Q${q.id}: ${q.title}\n\n`;rec.grades.forEach((g,i)=>{md+=`### Attempt ${i+1} — ${g.date} — ${g.score}pts\n\n**Answer:**\n${g.answer}\n\n**Feedback:**\n${g.feedback}\n\n---\n\n`})}});
  const blob=new Blob([md],{type:'text/markdown'});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download=`coreme_practice_${new Date().toISOString().slice(0,10)}.md`;a.click();URL.revokeObjectURL(url);
}

function initTheme(){const t=localStorage.getItem('coreme_theme')||'light';document.body.classList.toggle('light',t==='light');updateThemeBtn()}
function toggleTheme(){const on=document.body.classList.toggle('light');localStorage.setItem('coreme_theme',on?'light':'dark');updateThemeBtn()}
function updateThemeBtn(){const btn=document.getElementById('themeToggle');if(btn)btn.textContent=document.body.classList.contains('light')?'🌙':'☀️'}

initTheme();updateApi();initTypeFilters();renderSidebar();renderMain();
</script>
</body>
</html>
